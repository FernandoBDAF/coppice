# ExternalSecret CRs (patch 3), replacing the postgres Secret that
# scripts/cluster/init-secrets.sh seeds on kind. SAME Secret name and keys
# (postgres-credentials / POSTGRES_PASSWORD / AUTH_DB_PASSWORD) so every
# consumer wires to it unchanged.
#
# WP1 CONTRACT (binding): Secrets Manager holds exactly ONE secret,
#   id = "coppice-lab/session/postgres-credentials"
#   JSON keys = POSTGRES_PASSWORD, AUTH_DB_PASSWORD
# and the external-secrets IRSA role is scoped to ONLY that secret's ARN.
# POSTGRES_PASSWORD == RDS master password; AUTH_DB_PASSWORD == the password
# the rds-bootstrap Job assigns to the auth_user role.
#
# ClusterSecretStore auth: no `auth:` block → the external-secrets controller's
# own credentials are used. WP1 runs the controller as ServiceAccount
# `external-secrets` in namespace `external-secrets`, IRSA-annotated with the
# scoped role above.
#
# NOT synced here (see wp2 notes — DO NOT add without WP1 widening the IRSA
# scope, or these ExternalSecrets AccessDenied): rabbitmq-credentials,
# mongodb-credentials, auth-service-secrets. On AWS those still need a source
# (init-secrets.sh path, or extend the SM secret set + IRSA scope to
# coppice-lab/session/* and re-add ExternalSecrets for them). lab-obs's own
# postgres-credentials is the obs stack's responsibility, not this overlay.
#
# CRD apiVersion: external-secrets.io/v1 — verified against chart pin 2.8.0
# (helm template --include-crds: v1 served+storage, v1beta1 served:false).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: AWS_REGION_PLACEHOLDER
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: lab-infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: coppice-lab/session/postgres-credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: lab-core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: coppice-lab/session/postgres-credentials
