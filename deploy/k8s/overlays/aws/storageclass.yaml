# gp3 StorageClass for EBS-backed PVCs on EKS (patch 5). The in-cluster
# stateful stores that keep local disk on AWS are rabbitmq and mongodb
# (postgres → RDS, minio → S3, both removed by this overlay). Marked the
# overlay default so any unqualified PVC lands on gp3; the statefulset
# volumeClaimTemplates are ALSO patched to name it explicitly (deterministic).
#
# NOTE for WP1: EKS ships a `gp2` StorageClass from the EBS-CSI addon that is
# often flagged default too. Two defaults is undefined behavior — WP1 must
# either remove the is-default-class annotation from gp2 or accept that the
# explicit storageClassName patches below carry the load.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
