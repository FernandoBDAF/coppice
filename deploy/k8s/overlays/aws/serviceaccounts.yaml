# IRSA ServiceAccounts (patch 2). Both api-service and graphrag-service read
# and write the documents S3 bucket, so both need an IRSA role. The role-arn
# is session-specific — a placeholder that `make aws-up` substitutes from the
# session stack's terraform output (see wp2 integration notes).
#
# WP1 EXPECTATION: the session stack must create an IAM role per SA, trust
# policy bound to system:serviceaccount:lab-core:<sa> via the EKS OIDC
# provider, granting s3:GetObject/PutObject/DeleteObject/ListBucket on the
# documents bucket. HANDOFF §5.4 names only api-service — graphrag-service's
# role is an ADDITION this overlay requires (graphrag also touches the bucket).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service
  namespace: lab-core
  labels:
    app: api-service
  annotations:
    eks.amazonaws.com/role-arn: IRSA_API_ROLE_ARN_PLACEHOLDER
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: graphrag-service
  namespace: lab-core
  labels:
    app: graphrag-service
  annotations:
    eks.amazonaws.com/role-arn: IRSA_GRAPHRAG_ROLE_ARN_PLACEHOLDER
