# Lab CA chain (ADR-009.4): a self-signed root lives in cert-manager's
# namespace; the `lab-ca` ClusterIssuer signs per-host ingress certs
# requested through the cert-manager.io/cluster-issuer annotations below.
# Trust it locally (optional): export the CA per deploy/k8s/README.md
# ("Hostnames & TLS") — or just curl -k.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: lab-root-ca
  secretName: lab-root-ca
  duration: 87600h # 10y — it's a lab CA; rotation drills come with v4 JWKS work
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca
spec:
  ca:
    secretName: lab-root-ca
