# image-worker — env mirrors compose (RABBITMQ_URL only, CONTRACTS.md §4).
# Kept at 1 replica; scale drills use `make cluster-scale S=image-worker N=`.
apiVersion: v1
kind: Service
metadata:
  name: image-worker
  namespace: lab-core
  labels:
    app: image-worker
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: image-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-worker
  namespace: lab-core
  labels:
    app: image-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-worker
  template:
    metadata:
      labels:
        app: image-worker
        lab.local/role: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      # runAsNonRoot only — each image defines its own non-root user; forcing
      # a UID broke graphrag's pip --user layout (see that manifest's note)
      securityContext:
        runAsNonRoot: true
      containers:
        - name: image-worker
          image: localhost:5001/image-worker:dev
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_URL
              value: amqp://guest:$(RABBITMQ_PASSWORD)@rabbitmq.lab-infra:5672/
            # idempotency guard (ADR-008.2); netpol egress allow lives in
            # netpols/lab-core.yaml (workers → redis)
            - name: REDIS_ADDR
              value: redis.lab-infra:6379
            # OpenTelemetry (ADR-003.2): OTLP/http to tempo in lab-obs —
            # netpol egress allow lives in netpols/lab-core.yaml
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.lab-obs:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_SERVICE_NAME
              value: image-worker
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
