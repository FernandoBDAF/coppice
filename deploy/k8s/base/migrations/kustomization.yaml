apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - jobs.yaml
configMapGenerator:
  # single source with the services' own migration dirs (ADR-002.4);
  # only *.up.sql for api (compose applies the same subset)
  - name: api-migrations
    namespace: lab-infra
    files:
      - ../../../../api-service/migrations/000001_create_profiles.up.sql
      - ../../../../api-service/migrations/000002_create_documents.up.sql
      - ../../../../api-service/migrations/000003_create_outbox.up.sql
  - name: auth-migrations
    namespace: lab-infra
    files:
      - ../../../../auth-service/migrations/001_create_users_table.sql
      - ../../../../auth-service/migrations/002_sessions_roles.sql
