# rabbitmq — mirrors compose `rabbitmq`: same image, same enabled_plugins and
# per-object-metrics conf (single-sourced from scripts/compose/rabbitmq/ via
# the configMapGenerator — kustomize builds need LoadRestrictionsNone, see
# deploy/k8s/README.md). Default user stays `guest` (the api-service viper
# default); the password is generated into Secret rabbitmq-credentials.
# Healthcheck is check_port_connectivity, not ping — the node answers ping
# before the AMQP listener accepts (caught by the v1.1 exit run, EXP-01).
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: lab-infra
  labels:
    app: rabbitmq
spec:
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
    - name: metrics
      port: 15692
      targetPort: metrics
  selector:
    app: rabbitmq
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: lab-infra
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "15692"
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
            - name: metrics
              containerPort: 15692
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
          volumeMounts:
            - name: rabbitmqdata
              mountPath: /var/lib/rabbitmq
            - name: config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
            - name: config
              mountPath: /etc/rabbitmq/conf.d/20-lab.conf
              subPath: rabbitmq.conf
          # Probe economics (found live, EXP-20): rabbitmq-diagnostics spawns
          # an Erlang VM per call — >10s under a tight CPU limit, so
          # status/check_port_connectivity probes put the broker in a
          # liveness-kill loop. Readiness = TCP on 5672 (the exact property
          # consumers need, ~free); liveness = `ping` (lightest diagnostic)
          # with generous timeout.
          readinessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
      volumes:
        - name: config
          configMap:
            name: rabbitmq-config
  volumeClaimTemplates:
    - metadata:
        name: rabbitmqdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
