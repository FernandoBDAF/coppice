---
# OTLP ingest: instrumented services in lab-core push spans to tempo :4317/
# :4318 (matching egress allows live in deploy/k8s/base/netpols/lab-core.yaml).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tempo-otlp-ingress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-core
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
---
# The apiserver calls the operator's admission webhook (:10250) from the
# node network — not selectable, so ipBlock.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: operator-webhook-ingress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app: kube-prometheus-stack-operator
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 10250
