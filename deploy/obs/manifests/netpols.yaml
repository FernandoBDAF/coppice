# Zero-trust for lab-obs, same model as deploy/k8s/base/netpols/: default-
# deny both directions, DNS opened for all pods, explicit allows. One
# namespace-wide relaxation on purpose: intra-namespace traffic is open,
# because the kube-prometheus-stack wiring (grafana->prometheus->operator->
# exporters->alertmanager->relay->ntfy, fluent-bit->opensearch) is dense and
# chart-owned pod labels are not a stable per-edge contract.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lab-obs
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: lab-obs
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: lab-obs
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-obs
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-obs
---
# API-server egress for the whole namespace: the operator, prometheus service
# discovery, kube-state-metrics, grafana's sidecars, fluent-bit's kubernetes
# filter and the chart's webhook-certgen jobs all watch the API. The
# apiserver sits on the node network (kind: node-IP:6443), so this is an
# ipBlock, not a selector.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: lab-obs
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
# prometheus: scrapes the app metrics ports in lab-core, rabbitmq's plugin
# port in lab-infra, and node-level targets (kubelet/cadvisor :10250,
# node-exporter :9100) which live on node IPs — ipBlock again.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape-egress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-core
      ports:
        - protocol: TCP
          port: 8081 # api-service / graphrag-service metrics
        - protocol: TCP
          port: 3000 # auth-service (metrics on the app port)
        - protocol: TCP
          port: 8080 # workers
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-infra
          podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 15692
    # Guests (HOST_CONTRACT §2): every guest namespace is labeled
    # lab.local/tier: guest and components serve /metrics on :8080 (§1.3
    # component ports). Without this egress the guest-side allow is moot —
    # zero-trust cuts both ends. Caught live by EXP-34 (targets "down").
    - to:
        - namespaceSelector:
            matchLabels:
              lab.local/tier: guest
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 9100
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-exporter-egress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus-postgres-exporter
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-infra
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-exporter-egress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus-redis-exporter
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-infra
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
---
# fluent-bit -> opensearch (explicit even though intra-namespace is open:
# this is the edge EXP-31 depends on).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fluent-bit-egress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app: fluent-bit
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: opensearch
      ports:
        - protocol: TCP
          port: 9200
---
# relay -> ntfy in-cluster, plus 443 out for the ntfy.sh variant
# (NTFY_URL=https://ntfy.sh in ntfy-relay.yaml).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ntfy-relay-egress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app: ntfy-relay
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ntfy
      ports:
        - protocol: TCP
          port: 80
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
# UIs reached through ingress-nginx (ports are container ports — nginx
# connects to pods directly).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-ui-ingress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-ui-ingress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9090
---
apiVersion: networking.k8s.io/v1
