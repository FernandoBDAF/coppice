---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ntfy-ui-ingress
  namespace: lab-obs
spec:
  podSelector:
    matchLabels:
      app: ntfy
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
