# Observability manifests (ADR-003) — everything that is NOT a Helm chart:
# scrape config (ServiceMonitors), alert rules, the log pipeline
# (OpenSearch + fluent-bit), ntfy + relay, ingresses, lab-obs netpols and
# the Grafana lab dashboard. Applied by scripts/cluster/obs-up.sh AFTER the
# charts (the monitoring.coreos.com CRDs come from kube-prometheus-stack).
# Deliberately not referenced from deploy/k8s/base — the app lab must build
# and run without the obs stack.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - servicemonitors.yaml
  - prometheusrule.yaml
  - ntfy.yaml
  - ntfy-relay.yaml
  - ingress.yaml
  - netpols.yaml
# The log pipeline (OpenSearch + fluent-bit + index-template Job) lives in
# logs/ as its own kustomization: AWS sessions may skip it (OBS_LOGS=0,
# v5 HANDOFF §7). obs-up.sh applies both; kind behavior is unchanged.

# Lab Overview dashboard, single-sourced from deploy/obs/dashboards/ (needs
# LoadRestrictionsNone, same as the base tree). The grafana_dashboard label
# is what the kube-prometheus-stack Grafana sidecar watches for.
configMapGenerator:
  - name: grafana-dashboard-lab-overview
    namespace: lab-obs
    files:
      - ../dashboards/lab-overview.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
