# One-shot Job: install the lab-logs index template before fluent-bit's
# first bulk write creates the index with guessed mappings. trace_id/level
# must be keyword (exact-match filters, the EXP-31 workflow); replicas 0
# because the cluster is single-node (ADR-003.3) and would otherwise sit
# yellow forever. Jobs are immutable — obs-up.sh deletes it before re-apply
# (same pattern as the migration jobs in scripts/cluster/up.sh).
apiVersion: batch/v1
kind: Job
metadata:
  name: lab-logs-index-template
  namespace: lab-obs
  labels:
    app: lab-logs-index-template
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: lab-logs-index-template
    spec:
      restartPolicy: OnFailure
      containers:
        - name: curl
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -ec
            - |
              until curl -sf http://opensearch:9200 >/dev/null; do
                echo "waiting for opensearch"; sleep 5
              done
              curl -sf -XPUT http://opensearch:9200/_index_template/lab-logs \
                -H 'Content-Type: application/json' -d @- <<'EOF'
              {
                "index_patterns": ["lab-logs-*"],
                "template": {
                  "settings": {
                    "number_of_shards": 1,
                    "number_of_replicas": 0
                  },
                  "mappings": {
                    "properties": {
                      "@timestamp": { "type": "date" },
                      "time":       { "type": "date" },
                      "ts":         { "type": "keyword" },
                      "level":      { "type": "keyword" },
                      "msg":        { "type": "text" },
                      "message":    { "type": "text" },
                      "trace_id":   { "type": "keyword" },
                      "span_id":    { "type": "keyword" },
                      "service":    { "type": "keyword" },
                      "kubernetes": {
                        "properties": {
                          "namespace_name": { "type": "keyword" },
                          "pod_name":       { "type": "keyword" },
                          "container_name": { "type": "keyword" }
                        }
                      }
                    }
                  }
                }
              }
              EOF
              echo "lab-logs index template installed"
              # The template PUT races fluent-bit's first successful bulk
              # (both wait on opensearch readiness); an index created before
              # the template wins carries guessed mappings — zap's float `ts`
              # then rejects every ISO-`ts` doc (mapper_parsing_exception)
              # and fluent-bit drops whole chunks. Lab logs are disposable
              # (ADR-003.3): drop any pre-template index so the next bulk
              # recreates it under the template. Caught live by EXP-31.
              for idx in $(curl -sf 'http://opensearch:9200/_cat/indices/lab-logs-*?h=index'); do
                if ! curl -sf "http://opensearch:9200/$idx/_mapping" | grep -q '"ts":{"type":"keyword"}'; then
                  echo "deleting pre-template index $idx"
                  curl -sf -XDELETE "http://opensearch:9200/$idx" >/dev/null
                fi
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
