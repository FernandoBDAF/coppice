# Log pipeline (ADR-003) — OpenSearch + fluent-bit + the index-template
# Job. Split from ../ in v5 so AWS sessions can skip it (OBS_LOGS=0 —
# RAM/cost per HANDOFF §7); obs-up.sh applies it only when logs are on.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - opensearch.yaml
  - opensearch-dashboards.yaml
  - fluent-bit.yaml
  - index-template-job.yaml
