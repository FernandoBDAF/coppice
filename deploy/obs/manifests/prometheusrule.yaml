# Lab alert set (ADR-003.4, phase brief §4). Every alert carries a runbook
# annotation pointing at the matching drill in EXPERIMENTS.md — an alert you
# can't act on teaches nothing. Node-pressure alerts are NOT duplicated here:
# kube-prometheus-stack's default rules already ship KubeNodePressure /
# NodeMemoryHighUtilization / NodeFilesystemSpaceFillingUp et al.
# Discovered via ruleSelectorNilUsesHelmValues=false (no release label).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lab-alerts
  namespace: lab-obs
  labels:
    lab.local/tier: observability
spec:
  groups:
    - name: lab.rules
      rules:
        - alert: QueueDepthSustained
          # Calibrated 2026-07-19 and deliberately kept at 500: steady-state
          # peak was 6, but the worksheet's peak-x2 formula (12) would page on
          # every intentional flood drill (EXP-04/32 push 300-600 by design).
          # 500 held for 5m separates "consumers stuck" from "drill running";
          # EXP-32 proved the full fire->page->resolve loop at this value.
          expr: rabbitmq_queue_messages{queue=~".*-processing"} > 500
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Queue {{ $labels.queue }} depth over 500 for 5m"
            description: >-
              {{ $labels.queue }} has held {{ $value }} messages for 5
              minutes — consumers are absent or can't keep up. Scale the
              matching worker or find out why it stopped consuming.
            runbook_url: https://github.com/FernandoBDAF/coppice/blob/main/EXPERIMENTS.md#exp-04--burst-absorption--drain
        - alert: DLQGrowth
          expr: increase(rabbitmq_queue_messages{queue=~".+\\.dlq"}[10m]) > 0
          labels:
            severity: warning
          annotations:
            summary: "DLQ {{ $labels.queue }} is growing"
            description: >-
              {{ $labels.queue }} gained messages in the last 10 minutes —
              something is poisoning or failing. Triage the payloads
              (Grafana DLQ panel -> trace_id -> OpenSearch).
            runbook_url: https://github.com/FernandoBDAF/coppice/blob/main/EXPERIMENTS.md#exp-05--poison-messages--dlq-triage
        - alert: AuthBreakerOpen
          # api_auth_breaker_state: 0=closed 1=half-open 2=open (v3 metric,
          # added with the breaker instrumentation).
          expr: api_auth_breaker_state == 2
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "API->auth circuit breaker is open"
            description: >-
              api-service has opened its breaker to auth-service: token
              validation is failing fast. Check auth-service health and the
              rate-limit path.
            runbook_url: https://github.com/FernandoBDAF/coppice/blob/main/EXPERIMENTS.md#exp-08--incident-reproduction-rate-limit--breaker--outage
        - alert: APIP99OverSLO
          # SLO from the 2026-07-19 calibration (SLO-BASELINE.md): measured
          # p99 0.97s at 10 VUs through the TLS ingress on the reference
          # laptop cluster; SLO = baseline x3 margin = 3s (ADR-003.6).
          expr: histogram_quantile(0.99, sum by (le) (rate(api_http_request_duration_seconds_bucket[5m]))) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "API p99 latency over SLO (3s, calibrated 2026-07-19)"
            description: >-
              p99 across all API routes is {{ $value }}s, over the SLO
              threshold. Check saturation (CPU throttling, queue backlogs,
              DB pool) before blaming the network.
            runbook_url: https://github.com/FernandoBDAF/coppice/blob/main/EXPERIMENTS.md#exp-03--steady-load
        - alert: APIAvailabilityBelowSLO
          # SLO from the 2026-07-19 calibration (SLO-BASELINE.md): measured
          # 5xx ratio 0 over the run; SLO = 99.5% non-5xx (baseline -0.5pp,
          # ADR-003.6). Empty result (no 5xx at all) means healthy: the
          # ratio only exists once 5xx series appear.
          expr: sum(rate(api_http_requests_total{status=~"5.."}[5m])) / sum(rate(api_http_requests_total[5m])) > 0.005
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "API 5xx ratio over SLO (99.5% non-5xx, calibrated 2026-07-19)"
            description: >-
              {{ $value | humanizePercentage }} of API requests are 5xx over
              the last 5 minutes — the availability SLO is 99.5%. Find the
              failing route/dependency before it becomes an outage.
            runbook_url: https://github.com/FernandoBDAF/coppice/blob/main/EXPERIMENTS.md#exp-03--steady-load
        - alert: ScrapeTargetDown
          expr: up == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Scrape target {{ $labels.job }}/{{ $labels.instance }} down"
            description: >-
              Prometheus has failed to scrape {{ $labels.instance }}
              (job {{ $labels.job }}, namespace {{ $labels.namespace }}) for
              2 minutes — the pod is gone, not ready, or netpol-blocked.
            runbook_url: https://github.com/FernandoBDAF/coppice/blob/main/EXPERIMENTS.md#exp-06--worker-outage--recovery
