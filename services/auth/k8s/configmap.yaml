apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-auth-config
data:
  # Service Configuration
  SERVICE_NAME: "profile-auth"
  SERVICE_PORT: "8080"
  METRICS_PORT: "9090"

  # # Redis Configuration
  # REDIS_HOST: "redis-master"
  # REDIS_PORT: "6379"
  # REDIS_POOL_SIZE: "10"
  # REDIS_MIN_IDLE_CONNS: "5"

  # # PostgreSQL Configuration
  # POSTGRES_HOST: "postgres"
  # POSTGRES_PORT: "5432"
  # POSTGRES_DB: "auth_db"
  # POSTGRES_USER: "auth_user"

  # JWT Configuration
  JWT_EXPIRATION: "24h"
  JWT_REFRESH_EXPIRATION: "168h" # 7 days

  # Rate Limiting
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_DURATION: "1m"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Environment
  ENVIRONMENT: "production"
