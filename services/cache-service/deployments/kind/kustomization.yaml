apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: cache-service-kind
  annotations:
    config.kubernetes.io/local-config: "true"

# Base resources from the main deployment directory
resources:
  - ../deployments/k8s/secret.yaml
  - ../deployments/k8s/configmap.yaml
  - ../deployments/k8s/service.yaml
  - ../deployments/k8s/deployment.yaml
  - redis-dependencies.yaml # Kind-specific Redis for development

# Kind-specific patches for local development
patches:
  # Patch cache service deployment for reduced resources
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: cache-service

  # Patch cache service for NodePort access
  - path: service-patch.yaml
    target:
      kind: Service
      name: cache-service

# ConfigMap generator for Kind-specific configuration
configMapGenerator:
  - name: cache-service-local-config
    literals:
      - CACHE_LOGGING_LEVEL=debug
      - CACHE_LOGGING_DEVELOPMENT=true
      - CACHE_REDIS_POOL_SIZE=10
      - CACHE_REDIS_MIN_IDLE_CONNS=2
      - CACHE_REDIS_MAX_IDLE_CONNS=5

# Secret generator for development (with well-known values for testing)
secretGenerator:
  - name: cache-service-dev-secret
    literals:
      - CACHE_REDIS_PASSWORD="dev-redis-password"
      - JWT_SECRET_KEY="dev-jwt-secret-key-change-in-production"

# Common labels for Kind deployment
commonLabels:
  app.kubernetes.io/instance: cache-service-kind
  app.kubernetes.io/managed-by: kustomize
  environment: development
  deployment-method: kind

# Common annotations
commonAnnotations:
  config.kubernetes.io/local-config: "true"
  deployment.kubernetes.io/environment: "kind-local"

# Namespace for Kind deployment (optional)
namespace: default

# Image transformations for local development
images:
  - name: cache-service
    newTag: latest
    # Note: For Kind, you'll typically load images using:
    # kind load docker-image cache-service:latest --name your-cluster-name

# Name prefix for Kind resources
namePrefix: kind-

# Resource ordering - deploy dependencies first
sortOptions:
  order: fifo

# Replace Redis host reference in ConfigMap
replacements:
  - source:
      kind: Service
      name: redis-service
      fieldPath: metadata.name
    targets:
      - select:
          kind: ConfigMap
          name: cache-service-config
        fieldPaths:
          - data.CACHE_REDIS_HOST
        options:
          create: true
