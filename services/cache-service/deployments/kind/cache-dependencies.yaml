# Cache Service Dependencies for Kind Local Development
# Simplified Redis setup optimized for development and testing

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-dev-config
  labels:
    app: redis-dev
    component: config
    environment: development
data:
  redis.conf: |
    # Redis Development Configuration for Kind
    # Optimized for local development and testing

    # Network and Security
    bind 0.0.0.0
    port 6379
    protected-mode yes
    requirepass dev-redis-password

    # Memory Configuration (reduced for development)
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence (minimal for development)
    save 300 10    # Save if 10 keys changed in 300 seconds
    save 60 1000   # Save if 1000 keys changed in 60 seconds

    # AOF persistence (disabled for speed in development)
    appendonly no

    # Logging
    loglevel notice
    logfile ""

    # Client Configuration
    timeout 300
    tcp-keepalive 60
    maxclients 1000  # Reduced for development

    # Performance tuning for development
    tcp-backlog 128
    databases 1  # Single database for simplicity

    # Development-friendly settings
    stop-writes-on-bgsave-error no
    rdbcompression yes
    rdbchecksum yes

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-dev
  labels:
    app: redis-dev
    component: cache-backend
    environment: development
spec:
  replicas: 1 # Single instance for development
  selector:
    matchLabels:
      app: redis-dev
  template:
    metadata:
      labels:
        app: redis-dev
        component: cache-backend
        environment: development
      annotations:
        config.kubernetes.io/local-config: "true"
    spec:
      containers:
        - name: redis
          image: redis:7.0-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          # Development-friendly resource limits
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          # Use ConfigMap for Redis configuration
          command:
            - redis-server
            - /usr/local/etc/redis/redis.conf

          volumeMounts:
            - name: redis-config
              mountPath: /usr/local/etc/redis/
              readOnly: true
            - name: redis-data
              mountPath: /data

          # Fast health checks for development
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - dev-redis-password
                - ping
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 2

          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - dev-redis-password
                - ping
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 2

          # Development-friendly environment
          env:
            - name: REDIS_PASSWORD
              value: "dev-redis-password"

      volumes:
        - name: redis-config
          configMap:
            name: redis-dev-config
            defaultMode: 0644
        - name: redis-data
          emptyDir: {} # No persistence for development

      # Fast restart for development
      restartPolicy: Always
      terminationGracePeriodSeconds: 5

      # Relaxed security for easier debugging
      securityContext:
        runAsNonRoot: false
        runAsUser: 0

---
apiVersion: v1
kind: Service
metadata:
  name: redis-dev
  labels:
    app: redis-dev
    component: service
    environment: development
spec:
  type: ClusterIP
  selector:
    app: redis-dev
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  sessionAffinity: None

---
# Optional: Redis Commander for GUI access during development
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-commander
  labels:
    app: redis-commander
    component: development-tools
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-commander
  template:
    metadata:
      labels:
        app: redis-commander
        component: development-tools
        environment: development
    spec:
      containers:
        - name: redis-commander
          image: rediscommander/redis-commander:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"

          env:
            - name: REDIS_HOSTS
              value: "dev:redis-dev:6379:0:dev-redis-password"
            - name: HTTP_USER
              value: "admin"
            - name: HTTP_PASSWORD
              value: "admin"

---
apiVersion: v1
kind: Service
metadata:
  name: redis-commander
  labels:
    app: redis-commander
    component: development-tools
spec:
  type: NodePort
  selector:
    app: redis-commander
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30082 # Access Redis Commander at http://localhost:30082
      protocol: TCP
