apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-service
spec:
  # Single replica for Kind
  replicas: 1

  template:
    spec:
      containers:
        - name: cache-service
          # Reduced resources for local development
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          # Kind-specific environment variables
          env:
            # Redis connection for local development
            - name: CACHE_REDIS_HOST
              value: "redis-service.default.svc.cluster.local"
            - name: CACHE_REDIS_PORT
              value: "6379"

            # Debug settings for local development
            - name: CACHE_LOGGING_LEVEL
              value: "debug"
            - name: CACHE_LOGGING_DEVELOPMENT
              value: "true"

            # Reduced connection pool for Kind
            - name: CACHE_REDIS_POOL_SIZE
              value: "10"
            - name: CACHE_REDIS_MIN_IDLE_CONNS
              value: "2"
            - name: CACHE_REDIS_MAX_IDLE_CONNS
              value: "5"

            # Relaxed timeouts for Kind
            - name: CACHE_CIRCUIT_BREAKER_TIMEOUT
              value: "5000"
            - name: CACHE_HEALTH_CHECK_TIMEOUT
              value: "10s"

      # Remove production-specific scheduling
      affinity: null
      nodeSelector: null
      tolerations: null

      # Use default service account for Kind
      serviceAccountName: default
