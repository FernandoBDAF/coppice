apiVersion: v1
kind: Service
metadata:
  name: cache-service
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30082 # Cache service accessible at localhost:30082
    - port: 8081
      targetPort: metrics
      protocol: TCP
      name: metrics
      nodePort: 30083 # Metrics accessible at localhost:30083
