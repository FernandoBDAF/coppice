# Redis StatefulSet for Kind development
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    app: redis
    component: cache-backend
    temporary: "true"
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          # Kind-optimized configuration
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          # Redis configuration for development
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - "everysec"
            - --maxmemory
            - "100mb"
            - --maxmemory-policy
            - "allkeys-lru"
          # Basic persistence for development
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
    component: cache-backend
    temporary: "true"
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP

---
# Redis configuration for development
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  labels:
    app: redis
    temporary: "true"
data:
  redis.conf: |
    # Redis configuration for Kind development
    bind 0.0.0.0
    port 6379

    # Persistence
    appendonly yes
    appendfsync everysec

    # Memory management
    maxmemory 100mb
    maxmemory-policy allkeys-lru

    # Logging
    loglevel notice

    # Performance
    tcp-keepalive 300
    timeout 0
