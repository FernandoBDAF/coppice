apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-service
  namespace: default
  labels:
    app: cache-service
    version: v1.0.0
    component: cache
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cache-service
  template:
    metadata:
      labels:
        app: cache-service
        version: v1.0.0
        component: cache
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cache-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: cache-service
          image: cache-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
          env:
            # Environment variables from ConfigMap
            - name: CACHE_SERVER_HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_SERVER_HTTP_PORT
            - name: CACHE_SERVER_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_SERVER_GRPC_PORT
            - name: CACHE_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_REDIS_HOST
            - name: CACHE_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_REDIS_PORT
            - name: CACHE_REDIS_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_REDIS_POOL_SIZE
            - name: CACHE_LOGGING_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_LOGGING_LEVEL
            - name: CACHE_METRICS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_METRICS_ENABLED
            # Sensitive data from Secret
            - name: CACHE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cache-service-secret
                  key: CACHE_REDIS_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cache-service-secret
                  key: JWT_SECRET_KEY
          envFrom:
            # Load all environment variables from ConfigMap
            - configMapRef:
                name: cache-service-config
            # Load sensitive environment variables from Secret
            - secretRef:
                name: cache-service-secret
          volumeMounts:
            - name: config-volume
              mountPath: /app/configs
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
            - name: var-cache
              mountPath: /var/cache
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config-volume
          configMap:
            name: cache-service-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tmp-volume
          emptyDir: {}
        - name: var-cache
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cache-service
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - cache-optimized
            - weight: 30
              preference:
                matchExpressions:
                  - key: zone
                    operator: In
                    values:
                      - high-performance
      tolerations:
        - key: "cache-service"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"

---
# ServiceAccount for cache-service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cache-service
  namespace: default
  labels:
    app: cache-service
    component: serviceaccount
automountServiceAccountToken: false

---
# ClusterRole for cache-service (minimal permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cache-service-role
  labels:
    app: cache-service
    component: rbac
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
    resourceNames: []

---
# ClusterRoleBinding for cache-service
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cache-service-binding
  labels:
    app: cache-service
    component: rbac
subjects:
  - kind: ServiceAccount
    name: cache-service
    namespace: default
roleRef:
  kind: ClusterRole
  name: cache-service-role
  apiGroup: rbac.authorization.k8s.io
