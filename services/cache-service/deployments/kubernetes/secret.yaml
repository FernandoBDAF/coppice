apiVersion: v1
kind: Secret
metadata:
  name: cache-service-secret
  namespace: default
  labels:
    app: cache-service
    component: secret
type: Opaque
data:
  # Redis password (base64 encoded)
  # Default: "redis-password" -> cmVkaXMtcGFzc3dvcmQ=
  # Production: Replace with actual base64 encoded password
  CACHE_REDIS_PASSWORD: cmVkaXMtcGFzc3dvcmQ=

  # JWT signing key for token validation (base64 encoded)
  # Default: "jwt-secret-key-change-in-production" -> and0LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24=
  # Production: Replace with actual base64 encoded JWT secret
  JWT_SECRET_KEY: and0LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24=

  # Database connection string for metrics storage (if needed)
  # Base64 encoded connection string
  METRICS_DB_CONNECTION: ""

  # TLS certificates for secure communication (if needed)
  TLS_CERT: ""
  TLS_KEY: ""

  # API keys for external services (if needed)
  EXTERNAL_API_KEY: ""

---
# Instructions for secret management in production
#
# 1. Generate secure passwords:
#    Redis Password: openssl rand -base64 32 | base64
#    JWT Secret: openssl rand -base64 64 | base64
#
# 2. Apply secrets securely:
#    kubectl create secret generic cache-service-secret \
#      --from-literal=CACHE_REDIS_PASSWORD="$(echo -n 'your-redis-password' | base64)" \
#      --from-literal=JWT_SECRET_KEY="$(echo -n 'your-jwt-secret' | base64)" \
#      --namespace=default
#
# 3. Enable secret encryption at rest:
#    - Configure etcd encryption in Kubernetes cluster
#    - Use external secret management (HashiCorp Vault, AWS Secrets Manager)
#
# 4. Secret rotation:
#    - Implement automated secret rotation
#    - Update secrets without service downtime
#    - Monitor secret expiration and renewal
#
# 5. Access control:
#    - Limit RBAC permissions for secret access
#    - Use service accounts with minimal permissions
#    - Audit secret access and modifications
