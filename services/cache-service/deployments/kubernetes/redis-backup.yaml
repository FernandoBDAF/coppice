apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  namespace: default
  labels:
    app: redis
    component: backup
spec:
  schedule: "0 2 * * *" # Daily at 2 AM UTC
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600 # 1 hour timeout
      template:
        metadata:
          labels:
            app: redis
            component: backup-job
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
          containers:
            - name: redis-backup
              image: redis:7.0-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Starting Redis backup process..."

                  # Generate timestamp for backup
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_DIR="/backup/redis-backup-$TIMESTAMP"

                  # Create backup directory
                  mkdir -p "$BACKUP_DIR"

                  # Perform backup for each Redis instance
                  for i in 0 1 2; do
                    REDIS_HOST="redis-$i.redis-headless.default.svc.cluster.local"
                    echo "Backing up Redis instance $i at $REDIS_HOST..."
                    
                    # Create RDB backup
                    redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning BGSAVE
                    
                    # Wait for background save to complete
                    while [ "$(redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning LASTSAVE)" = "$(redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning LASTSAVE)" ]; do
                      sleep 5
                    done
                    
                    # Copy the RDB file
                    redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning --rdb "$BACKUP_DIR/redis-$i-dump.rdb"
                    
                    # Backup AOF file if enabled
                    redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning CONFIG GET appendonly | grep -q yes && {
                      echo "Backing up AOF file for instance $i..."
                      redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning BGREWRITEAOF
                      sleep 10
                      scp "$REDIS_HOST:/data/appendonly.aof" "$BACKUP_DIR/redis-$i-appendonly.aof" || true
                    }
                    
                    # Create backup metadata
                    cat > "$BACKUP_DIR/redis-$i-metadata.json" <<EOF
                  {
                    "instance": "$i",
                    "host": "$REDIS_HOST",
                    "timestamp": "$TIMESTAMP",
                    "backup_type": "full",
                    "rdb_file": "redis-$i-dump.rdb",
                    "aof_file": "redis-$i-appendonly.aof",
                    "redis_version": "$(redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning INFO server | grep redis_version | cut -d: -f2 | tr -d '\r')"
                  }
                  EOF
                  done

                  # Create compressed archive
                  cd /backup
                  tar -czf "redis-backup-$TIMESTAMP.tar.gz" "redis-backup-$TIMESTAMP/"

                  # Calculate checksum
                  sha256sum "redis-backup-$TIMESTAMP.tar.gz" > "redis-backup-$TIMESTAMP.sha256"

                  # Upload to cloud storage (placeholder - implement based on your cloud provider)
                  # aws s3 cp "redis-backup-$TIMESTAMP.tar.gz" "s3://your-backup-bucket/redis/"
                  # gsutil cp "redis-backup-$TIMESTAMP.tar.gz" "gs://your-backup-bucket/redis/"

                  # Cleanup old local backups (keep last 3 days)
                  find /backup -name "redis-backup-*.tar.gz" -mtime +3 -delete
                  find /backup -name "redis-backup-*" -type d -mtime +3 -exec rm -rf {} \;

                  echo "Backup completed successfully: redis-backup-$TIMESTAMP.tar.gz"
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: cache-service-secret
                      key: CACHE_REDIS_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: redis-backup-pvc

---
# PersistentVolumeClaim for backup storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-backup-pvc
  namespace: default
  labels:
    app: redis
    component: backup-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 100Gi

---
# Redis Recovery Job (run manually when needed)
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-recovery
  namespace: default
  labels:
    app: redis
    component: recovery
  annotations:
    # To use this job:
    # 1. Set BACKUP_FILE environment variable to the backup file name
    # 2. Apply the job: kubectl apply -f redis-recovery.yaml
    # 3. Monitor progress: kubectl logs -f job/redis-recovery
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 7200 # 2 hours timeout
  template:
    metadata:
      labels:
        app: redis
        component: recovery-job
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis-recovery
          image: redis:7.0-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting Redis recovery process..."

              # Validate backup file
              if [ -z "$BACKUP_FILE" ]; then
                echo "Error: BACKUP_FILE environment variable not set"
                exit 1
              fi

              if [ ! -f "/backup/$BACKUP_FILE" ]; then
                echo "Error: Backup file /backup/$BACKUP_FILE not found"
                exit 1
              fi

              # Verify checksum if available
              if [ -f "/backup/$BACKUP_FILE.sha256" ]; then
                echo "Verifying backup file integrity..."
                cd /backup
                sha256sum -c "$BACKUP_FILE.sha256"
              fi

              # Extract backup
              echo "Extracting backup file..."
              cd /backup
              tar -xzf "$BACKUP_FILE"

              BACKUP_DIR=$(basename "$BACKUP_FILE" .tar.gz)

              # Recovery process for each Redis instance
              for i in 0 1 2; do
                REDIS_HOST="redis-$i.redis-headless.default.svc.cluster.local"
                echo "Recovering Redis instance $i at $REDIS_HOST..."
                
                # Check if Redis instance is running
                if ! redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning ping > /dev/null 2>&1; then
                  echo "Warning: Redis instance $i is not accessible, skipping..."
                  continue
                fi
                
                # Stop writes to Redis
                redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning CONFIG SET stop-writes-on-bgsave-error no
                
                # Flush existing data (WARNING: This will delete all data)
                echo "WARNING: About to flush all data on Redis instance $i"
                redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning FLUSHALL
                
                # Load RDB backup
                if [ -f "/backup/$BACKUP_DIR/redis-$i-dump.rdb" ]; then
                  echo "Loading RDB backup for instance $i..."
                  redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning --pipe < "/backup/$BACKUP_DIR/redis-$i-dump.rdb"
                fi
                
                # Load AOF backup if available
                if [ -f "/backup/$BACKUP_DIR/redis-$i-appendonly.aof" ]; then
                  echo "Loading AOF backup for instance $i..."
                  # Note: AOF recovery requires Redis restart with the AOF file in place
                  echo "AOF recovery requires manual intervention - copy AOF file to Redis data directory and restart"
                fi
                
                # Re-enable writes
                redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning CONFIG SET stop-writes-on-bgsave-error yes
                
                echo "Recovery completed for Redis instance $i"
              done

              echo "Redis recovery process completed"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cache-service-secret
                  key: CACHE_REDIS_PASSWORD
            - name: BACKUP_FILE
              value: "" # Set this to the backup file name when running recovery
          volumeMounts:
            - name: backup-storage
              mountPath: /backup
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: redis-backup-pvc

---
# Redis Monitoring and Health Check Job
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-health-check
  namespace: default
  labels:
    app: redis
    component: health-check
spec:
  schedule: "*/15 * * * *" # Every 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: redis
            component: health-check-job
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
          containers:
            - name: redis-health-check
              image: redis:7.0-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Starting Redis health check..."

                  FAILED_INSTANCES=0

                  for i in 0 1 2; do
                    REDIS_HOST="redis-$i.redis-headless.default.svc.cluster.local"
                    echo "Checking Redis instance $i at $REDIS_HOST..."
                    
                    # Basic connectivity test
                    if redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG; then
                      echo "✓ Instance $i is responding"
                    else
                      echo "✗ Instance $i is not responding"
                      FAILED_INSTANCES=$((FAILED_INSTANCES + 1))
                      continue
                    fi
                    
                    # Memory usage check
                    MEMORY_USAGE=$(redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning INFO memory | grep used_memory_human | cut -d: -f2 | tr -d '\r')
                    echo "  Memory usage: $MEMORY_USAGE"
                    
                    # Connection count
                    CONNECTED_CLIENTS=$(redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning INFO clients | grep connected_clients | cut -d: -f2 | tr -d '\r')
                    echo "  Connected clients: $CONNECTED_CLIENTS"
                    
                    # Check for slow queries
                    SLOW_QUERIES=$(redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning SLOWLOG LEN)
                    if [ "$SLOW_QUERIES" -gt 10 ]; then
                      echo "  Warning: $SLOW_QUERIES slow queries detected"
                    fi
                    
                    # Check persistence status
                    LAST_SAVE=$(redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" --no-auth-warning LASTSAVE)
                    echo "  Last save: $LAST_SAVE"
                  done

                  if [ $FAILED_INSTANCES -gt 0 ]; then
                    echo "Health check failed: $FAILED_INSTANCES instances are unhealthy"
                    exit 1
                  else
                    echo "All Redis instances are healthy"
                  fi
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: cache-service-secret
                      key: CACHE_REDIS_PASSWORD
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
                capabilities:
                  drop:
                    - ALL

---
# Instructions for Redis Backup and Recovery
#
# 1. Automated Backups:
#    - Daily backups run at 2 AM UTC
#    - Backups include both RDB and AOF files
#    - Compressed and checksummed for integrity
#    - Local retention: 3 days
#
# 2. Manual Backup:
#    kubectl create job --from=cronjob/redis-backup redis-backup-manual
#
# 3. Recovery Process:
#    a. Identify the backup file:
#       kubectl exec -it redis-backup-pvc-pod -- ls /backup
#
#    b. Set the backup file and run recovery:
#       kubectl patch job redis-recovery -p '{"spec":{"template":{"spec":{"containers":[{"name":"redis-recovery","env":[{"name":"BACKUP_FILE","value":"redis-backup-20240101_020000.tar.gz"}]}]}}}}'
#       kubectl apply -f redis-recovery.yaml
#
#    c. Monitor recovery:
#       kubectl logs -f job/redis-recovery
#
# 4. Health Monitoring:
#    - Automated health checks every 15 minutes
#    - Monitor with: kubectl logs -f cronjob/redis-health-check
#
# 5. Backup to Cloud Storage:
#    - Uncomment and configure cloud storage commands in backup script
#    - For AWS S3: Install aws-cli in backup container
#    - For GCS: Install gcloud in backup container
#    - Configure appropriate IAM roles and permissions
