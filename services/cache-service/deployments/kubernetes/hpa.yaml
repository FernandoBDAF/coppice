apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cache-service-hpa
  namespace: default
  labels:
    app: cache-service
    component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cache-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # CPU utilization target
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Memory utilization target
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Custom metric: Cache hit ratio (optional, requires custom metrics API)
    - type: Pods
      pods:
        metric:
          name: cache_hit_ratio
        target:
          type: AverageValue
          averageValue: "0.85"
    # Custom metric: Request rate (optional, requires custom metrics API)
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "1000"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # 5 minutes
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60 # 1 minute
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

---
# Additional HPA configuration for metrics-based scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cache-service-advanced-hpa
  namespace: default
  labels:
    app: cache-service
    component: advanced-autoscaler
  annotations:
    # Enable only if custom metrics server is available
    autoscaling.alpha.kubernetes.io/conditions: '[{"type":"AbleToScale","status":"True","reason":"SucceededGetScale"}]'
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cache-service
  minReplicas: 3
  maxReplicas: 30
  metrics:
    # CPU utilization (primary scaling metric)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    # Memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
    # External metric: Redis connection pool utilization
    - type: External
      external:
        metric:
          name: redis_connection_pool_utilization
          selector:
            matchLabels:
              service: cache-service
        target:
          type: AverageValue
          averageValue: "80"
    # Object metric: Custom cache performance
    - type: Object
      object:
        metric:
          name: cache_performance_index
        describedObject:
          apiVersion: v1
          kind: Service
          name: cache-service
        target:
          type: Value
          value: "0.9"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600 # 10 minutes for production stability
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30 # Quick response to load spikes
      policies:
        - type: Percent
          value: 200
          periodSeconds: 60
        - type: Pods
          value: 6
          periodSeconds: 60
      selectPolicy: Max

---
# HPA Configuration Notes and Best Practices
#
# 1. Resource Requirements:
#    - Ensure metrics-server is deployed in the cluster
#    - For custom metrics, deploy custom metrics API server
#    - Configure resource requests/limits in Deployment
#
# 2. Scaling Policies:
#    - Conservative scale-down to prevent flapping
#    - Aggressive scale-up for performance demands
#    - Stabilization windows prevent rapid oscillation
#
# 3. Monitoring and Alerting:
#    - Monitor HPA events: kubectl get events --field-selector involvedObject.name=cache-service-hpa
#    - Set up alerts for scaling events and failures
#    - Track scaling frequency and effectiveness
#
# 4. Custom Metrics Setup:
#    - Deploy Prometheus Adapter for custom metrics
#    - Configure ServiceMonitor for Prometheus scraping
#    - Validate metric availability: kubectl get --raw "/apis/custom.metrics.k8s.io/v1beta1"
#
# 5. Production Tuning:
#    - Start with basic CPU/Memory metrics
#    - Add custom metrics gradually
#    - Adjust thresholds based on actual traffic patterns
#    - Consider vertical pod autoscaling (VPA) for right-sizing
#
# 6. Testing:
#    - Load test with stress testing tools
#    - Verify scaling behavior under different load patterns
#    - Test scaling limits and resource constraints
