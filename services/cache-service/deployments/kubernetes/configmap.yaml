apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-service-config
  namespace: default
  labels:
    app: cache-service
    component: config
data:
  # Server Configuration
  CACHE_SERVER_HTTP_PORT: "8080"
  CACHE_SERVER_GRPC_PORT: "9090"
  CACHE_SERVER_READ_TIMEOUT: "30s"
  CACHE_SERVER_WRITE_TIMEOUT: "30s"
  CACHE_SERVER_SHUTDOWN_TIMEOUT: "10s"

  # Redis Configuration
  CACHE_REDIS_HOST: "redis-service"
  CACHE_REDIS_PORT: "6379"
  CACHE_REDIS_DATABASE: "0"
  CACHE_REDIS_MAX_RETRIES: "3"
  CACHE_REDIS_DIAL_TIMEOUT: "5s"
  CACHE_REDIS_READ_TIMEOUT: "3s"
  CACHE_REDIS_WRITE_TIMEOUT: "3s"
  CACHE_REDIS_POOL_SIZE: "100"
  CACHE_REDIS_MIN_IDLE_CONNS: "25"
  CACHE_REDIS_MAX_IDLE_CONNS: "50"
  CACHE_REDIS_CONN_MAX_LIFETIME: "300s"
  CACHE_REDIS_ENABLED: "true"

  # Logging Configuration
  CACHE_LOGGING_LEVEL: "info"
  CACHE_LOGGING_FORMAT: "json"
  CACHE_LOGGING_DEVELOPMENT: "false"

  # Metrics Configuration
  CACHE_METRICS_ENABLED: "true"
  CACHE_METRICS_PATH: "/metrics"
  CACHE_METRICS_PORT: "8081"

  # Circuit Breaker Configuration
  CACHE_CIRCUIT_BREAKER_MAX_REQUESTS: "100"
  CACHE_CIRCUIT_BREAKER_INTERVAL: "10s"
  CACHE_CIRCUIT_BREAKER_TIMEOUT: "60s"
  CACHE_CIRCUIT_BREAKER_READY_TO_TRIP: "5"

  # Cache Configuration
  CACHE_CACHE_DEFAULT_TTL: "1h"
  CACHE_CACHE_PROFILE_TTL: "30m"
  CACHE_CACHE_TASK_TTL: "15m"
  CACHE_CACHE_SESSION_TTL: "30m"
  CACHE_CACHE_QUEUE_METRICS_TTL: "2m"
  CACHE_CACHE_WORKER_STATUS_TTL: "10m"
  CACHE_CACHE_MAX_KEY_SIZE: "512"
  CACHE_CACHE_MAX_VALUE_SIZE: "1048576"
  CACHE_CACHE_BATCH_SIZE: "100"
  CACHE_CACHE_JSON_COMPRESSION: "false"

  # Application Configuration
  config.yaml: |
    server:
      http_port: 8080
      grpc_port: 9090
      read_timeout: 30s
      write_timeout: 30s
      shutdown_timeout: 10s

    redis:
      host: redis-service
      port: 6379
      database: 0
      max_retries: 3
      dial_timeout: 5s
      read_timeout: 3s
      write_timeout: 3s
      pool_size: 100
      min_idle_conns: 25
      max_idle_conns: 50
      conn_max_lifetime: 300s
      enabled: true

    logging:
      level: info
      format: json
      development: false

    metrics:
      enabled: true
      path: /metrics
      port: 8081

    circuit_breaker:
      max_requests: 100
      interval: 10s
      timeout: 60s
      ready_to_trip: 5

    cache:
      default_ttl: 1h
      profile_ttl: 30m
      task_ttl: 15m
      session_ttl: 30m
      queue_metrics_ttl: 2m
      worker_status_ttl: 10m
      max_key_size: 512
      max_value_size: 1048576
      batch_size: 100
      json_compression: false
