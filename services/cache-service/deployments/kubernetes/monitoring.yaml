# Cache Service Monitoring Configuration
# Task 4.3: Comprehensive monitoring and alerting

---
# ServiceMonitor for Cache Service Metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cache-service-metrics
  namespace: default
  labels:
    app: cache-service
    component: monitoring
spec:
  selector:
    matchLabels:
      app: cache-service
      component: metrics
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      honorLabels: true
    - port: http
      interval: 30s
      path: /health
      honorLabels: true

---
# Prometheus Rules for Cache Service Alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cache-service-alerts
  namespace: default
  labels:
    app: cache-service
    component: alerting
spec:
  groups:
    - name: cache-service.rules
      interval: 30s
      rules:
        # SLI/SLO Metrics
        - record: cache:sli:availability:5m
          expr: |
            (
              sum(rate(cache_operations_total{result="success"}[5m])) /
              sum(rate(cache_operations_total[5m]))
            ) * 100

        - record: cache:sli:latency:p99:5m
          expr: |
            histogram_quantile(0.99, 
              sum(rate(cache_operation_duration_seconds_bucket[5m])) by (le)
            )

        - record: cache:sli:error_rate:5m
          expr: |
            (
              sum(rate(cache_operations_total{result="error"}[5m])) /
              sum(rate(cache_operations_total[5m]))
            ) * 100

        - record: cache:sli:hit_ratio:5m
          expr: |
            (
              sum(rate(cache_hits_total[5m])) /
              (sum(rate(cache_hits_total[5m])) + sum(rate(cache_misses_total[5m])))
            ) * 100

        # High Priority Alerts
        - alert: CacheServiceDown
          expr: up{job="cache-service"} == 0
          for: 1m
          labels:
            severity: critical
            service: cache-service
          annotations:
            summary: "Cache service is down"
            description: "Cache service {{ $labels.instance }} has been down for more than 1 minute."
            runbook: "https://runbooks.example.com/cache-service-down"

        - alert: CacheHighErrorRate
          expr: cache:sli:error_rate:5m > 5
          for: 2m
          labels:
            severity: critical
            service: cache-service
          annotations:
            summary: "High error rate in cache service"
            description: "Cache service error rate is {{ $value }}% over the last 5 minutes, exceeding the 5% threshold."
            runbook: "https://runbooks.example.com/cache-high-error-rate"

        - alert: CacheHighLatency
          expr: cache:sli:latency:p99:5m > 0.005
          for: 3m
          labels:
            severity: critical
            service: cache-service
          annotations:
            summary: "High latency in cache service"
            description: "Cache service 99th percentile latency is {{ $value }}s, exceeding 5ms threshold."
            runbook: "https://runbooks.example.com/cache-high-latency"

        - alert: CacheLowAvailability
          expr: cache:sli:availability:5m < 99.9
          for: 2m
          labels:
            severity: critical
            service: cache-service
          annotations:
            summary: "Cache service availability below SLO"
            description: "Cache service availability is {{ $value }}%, below the 99.9% SLO."
            runbook: "https://runbooks.example.com/cache-low-availability"

        # Medium Priority Alerts
        - alert: CacheLowHitRatio
          expr: cache:sli:hit_ratio:5m < 80
          for: 5m
          labels:
            severity: warning
            service: cache-service
          annotations:
            summary: "Low cache hit ratio"
            description: "Cache hit ratio is {{ $value }}%, below the 80% threshold."
            runbook: "https://runbooks.example.com/cache-low-hit-ratio"

        - alert: CacheHighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{pod=~"cache-service-.*"} /
              container_spec_memory_limit_bytes{pod=~"cache-service-.*"}
            ) * 100 > 85
          for: 5m
          labels:
            severity: warning
            service: cache-service
          annotations:
            summary: "High memory usage in cache service"
            description: "Cache service memory usage is {{ $value }}% of limit."

        - alert: CacheHighCPUUsage
          expr: |
            (
              rate(container_cpu_usage_seconds_total{pod=~"cache-service-.*"}[5m]) /
              container_spec_cpu_quota{pod=~"cache-service-.*"} * container_spec_cpu_period{pod=~"cache-service-.*"}
            ) * 100 > 80
          for: 5m
          labels:
            severity: warning
            service: cache-service
          annotations:
            summary: "High CPU usage in cache service"
            description: "Cache service CPU usage is {{ $value }}% of limit."

        - alert: RedisConnectionPoolExhaustion
          expr: redis_connected_clients / redis_config_maxclients * 100 > 90
          for: 3m
          labels:
            severity: warning
            service: cache-service
            component: redis
          annotations:
            summary: "Redis connection pool near exhaustion"
            description: "Redis connection pool utilization is {{ $value }}%."

        # Redis-specific Alerts
        - alert: RedisDown
          expr: up{job="redis"} == 0
          for: 1m
          labels:
            severity: critical
            service: cache-service
            component: redis
          annotations:
            summary: "Redis instance is down"
            description: "Redis instance {{ $labels.instance }} has been down for more than 1 minute."

        - alert: RedisHighMemoryUsage
          expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
          for: 3m
          labels:
            severity: warning
            service: cache-service
            component: redis
          annotations:
            summary: "Redis memory usage is high"
            description: "Redis memory usage is {{ $value }}% of configured maximum."

        - alert: RedisSlowLogGrowing
          expr: increase(redis_slowlog_length[5m]) > 10
          for: 2m
          labels:
            severity: warning
            service: cache-service
            component: redis
          annotations:
            summary: "Redis slow log is growing"
            description: "Redis slow log has grown by {{ $value }} entries in the last 5 minutes."

---
# Grafana Dashboard ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-service-dashboard
  namespace: default
  labels:
    app: cache-service
    component: grafana-dashboard
data:
  cache-service-dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Cache Service Dashboard",
        "tags": ["cache", "redis", "microservices"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Service Overview",
            "type": "stat",
            "targets": [
              {
                "expr": "cache:sli:availability:5m",
                "legendFormat": "Availability %"
              },
              {
                "expr": "cache:sli:hit_ratio:5m", 
                "legendFormat": "Hit Ratio %"
              },
              {
                "expr": "sum(rate(cache_operations_total[5m]))",
                "legendFormat": "Operations/sec"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Request Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(cache_operations_total[5m])) by (operation)",
                "legendFormat": "{{ operation }}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 3,
            "title": "Latency Percentiles",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.50, sum(rate(cache_operation_duration_seconds_bucket[5m])) by (le))",
                "legendFormat": "p50"
              },
              {
                "expr": "histogram_quantile(0.95, sum(rate(cache_operation_duration_seconds_bucket[5m])) by (le))",
                "legendFormat": "p95"
              },
              {
                "expr": "histogram_quantile(0.99, sum(rate(cache_operation_duration_seconds_bucket[5m])) by (le))",
                "legendFormat": "p99"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          },
          {
            "id": 4,
            "title": "Cache Hit/Miss Ratio",
            "type": "piechart",
            "targets": [
              {
                "expr": "sum(rate(cache_hits_total[5m]))",
                "legendFormat": "Hits"
              },
              {
                "expr": "sum(rate(cache_misses_total[5m]))",
                "legendFormat": "Misses"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 0, "y": 16}
          },
          {
            "id": 5,
            "title": "Error Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "cache:sli:error_rate:5m",
                "legendFormat": "Error Rate %"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 8, "y": 16}
          },
          {
            "id": 6,
            "title": "Memory Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "container_memory_working_set_bytes{pod=~\"cache-service-.*\"} / 1024 / 1024",
                "legendFormat": "{{ pod }}"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 16, "y": 16}
          },
          {
            "id": 7,
            "title": "Redis Metrics",
            "type": "graph",
            "targets": [
              {
                "expr": "redis_connected_clients",
                "legendFormat": "Connected Clients"
              },
              {
                "expr": "redis_memory_used_bytes / 1024 / 1024",
                "legendFormat": "Memory Used (MB)"
              },
              {
                "expr": "rate(redis_commands_processed_total[5m])",
                "legendFormat": "Commands/sec"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24}
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "10s"
      }
    }

---
# SLI/SLO Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-service-slo
  namespace: default
  labels:
    app: cache-service
    component: slo-config
data:
  slo-config.yaml: |
    # Cache Service SLI/SLO Configuration
    slos:
      - name: cache-availability
        description: "Cache service availability"
        sli:
          query: "cache:sli:availability:5m"
        objectives:
          - target: 99.9
            window: "30d"
          - target: 99.5
            window: "7d"
      
      - name: cache-latency
        description: "Cache operation latency"
        sli:
          query: "cache:sli:latency:p99:5m"
        objectives:
          - target: 0.005  # 5ms
            window: "30d"
          - target: 0.003  # 3ms
            window: "7d"
      
      - name: cache-error-rate
        description: "Cache operation error rate"
        sli:
          query: "cache:sli:error_rate:5m"
        objectives:
          - target: 1.0    # < 1%
            window: "30d"
          - target: 0.5    # < 0.5%
            window: "7d"
      
      - name: cache-hit-ratio
        description: "Cache hit ratio"
        sli:
          query: "cache:sli:hit_ratio:5m"
        objectives:
          - target: 85.0   # > 85%
            window: "30d"
          - target: 80.0   # > 80%
            window: "7d"

    alerts:
      - name: SLOBurn-CacheAvailability-Critical
        severity: critical
        condition: "cache:sli:availability:5m < 99.0"
        for: "2m"
        
      - name: SLOBurn-CacheLatency-Critical  
        severity: critical
        condition: "cache:sli:latency:p99:5m > 0.010"
        for: "3m"

---
# Network Policy for Monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-service-monitoring-policy
  namespace: default
  labels:
    app: cache-service
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: cache-service
  policyTypes:
    - Ingress
  ingress:
    # Allow Prometheus to scrape metrics
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8080
    # Allow Grafana to query
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - protocol: TCP
          port: 8080
