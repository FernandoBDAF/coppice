apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cache-service
  labels:
    app: cache-service
    component: cache
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      app: cache-service
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      # Cache-specific metric relabeling
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "cache_.*"
          targetLabel: service
          replacement: "cache-service"
  namespaceSelector:
    matchNames:
      - default

---
# PrometheusRule for cache-service alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cache-service-alerts
  labels:
    app: cache-service
    component: cache
    monitoring: prometheus
spec:
  groups:
    - name: cache-service.rules
      rules:
        # High cache miss rate
        - alert: CacheHighMissRate
          expr: |
            (
              rate(cache_operations_total{status="miss"}[5m]) /
              rate(cache_operations_total[5m])
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            service: cache-service
          annotations:
            summary: "High cache miss rate detected"
            description: "Cache miss rate is {{ $value | humanizePercentage }} for the last 5 minutes"

        # High cache latency
        - alert: CacheHighLatency
          expr: |
            histogram_quantile(0.95, 
              rate(cache_latency_seconds_bucket[5m])
            ) > 0.01
          for: 2m
          labels:
            severity: warning
            service: cache-service
          annotations:
            summary: "High cache latency detected"
            description: "95th percentile cache latency is {{ $value }}s"

        # Redis connection failures
        - alert: CacheRedisConnectionFailure
          expr: |
            rate(cache_redis_connection_errors_total[5m]) > 0.1
          for: 1m
          labels:
            severity: critical
            service: cache-service
          annotations:
            summary: "Redis connection failures detected"
            description: "Redis connection error rate is {{ $value }} errors/second"

        # Circuit breaker open
        - alert: CacheCircuitBreakerOpen
          expr: |
            cache_circuit_breaker_state == 1
          for: 1m
          labels:
            severity: warning
            service: cache-service
          annotations:
            summary: "Cache circuit breaker is open"
            description: "Cache service circuit breaker has been open for more than 1 minute"
