apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-service-config
  labels:
    app: storage-service
    service: storage-service
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080
      grpc_port: 9090
      read_timeout: 30s
      write_timeout: 30s
      idle_timeout: 120s
      shutdown_timeout: 30s

    database:
      max_connections: 100
      idle_connections: 20
      max_lifetime: 3600s
      connection_timeout: 30s
      query_timeout: 30s
      migration_timeout: 300s

    queue:
      prefetch_count: 5
      process_timeout: 30s
      max_retries: 3
      reconnect_delay: 5s
      exchange_name: "tasks-exchange"
      queue_name: "storage-processing"
      routing_key: "storage.*"
      consumer_tag: "storage-service-consumer"
      
    dlq:
      enabled: true
      exchange_name: "storage-dlq"
      queue_name: "storage-dlq"
      max_retries: 3
      retry_delay: 5s
      max_retry_delay: 300s
      backoff_factor: 2.0

    metrics:
      enabled: true
      port: 8080
      path: "/metrics"
      collection_interval: 15s
      histogram_buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]

    logging:
      level: "info"
      format: "json"
      output: "stdout"
      enable_caller: true
      enable_stacktrace: false
      sampling:
        initial: 100
        thereafter: 100

    circuit_breaker:
      enabled: true
      timeout: 10s
      max_requests: 100
      interval: 30s
      ratio: 0.6
      min_requests: 20

    auth:
      enabled: true
      password_min_length: 8
      password_require_special: true
      max_login_attempts: 5
      account_lockout_duration: 900s
      session_timeout: 3600s
      bcrypt_cost: 12

    batch:
      max_batch_size: 1000
      max_concurrent_batches: 10
      default_timeout: 300s
      enable_progress_tracking: true
      enable_rollback: true
      auto_tuning: true

    performance:
      enable_optimization: true
      monitoring_interval: 30s
      memory_threshold_mb: 512
      cpu_threshold_percent: 80.0
      auto_tuning_interval: 300s
      connection_pool_auto_tuning: true
      query_cache_enabled: true
      query_cache_size: 1000
      query_cache_ttl: 300s

    health:
      check_interval: 30s
      timeout: 5s
      database_check: true
      queue_check: true
      auth_service_check: true
      batch_service_check: true
      memory_check: true

    tracing:
      enabled: false
      service_name: "storage-service"
      sample_rate: 0.1
      jaeger_endpoint: ""
      zipkin_endpoint: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-service-env-config
  labels:
    app: storage-service
    service: storage-service
data:
  # Application Configuration
  SERVICE_NAME: "storage-service"
  SERVICE_VERSION: "1.0.0"
  ENVIRONMENT: "production"

  # Server Configuration
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  GRPC_PORT: "9090"

  # Database Configuration
  DB_MAX_OPEN_CONNS: "100"
  DB_MAX_IDLE_CONNS: "20"
  DB_CONN_MAX_LIFETIME: "3600s"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "profiles"
  DB_USER: "profile_user"

  # Queue Configuration
  RABBITMQ_QUEUE: "storage-processing"
  RABBITMQ_EXCHANGE: "tasks-exchange"
  RABBITMQ_ROUTING_KEY: "storage.*"
  RABBITMQ_CONSUMER_TAG: "storage-service-consumer"
  RABBITMQ_PREFETCH: "10"
  RABBITMQ_RECONNECT_DELAY: "5s"
  RABBITMQ_PROCESS_TIMEOUT: "30s"

  # Feature Flags
  QUEUE_ENABLED: "true"
  METRICS_ENABLED: "true"
  CIRCUIT_BREAKER_ENABLED: "true"
  AUTH_DATA_ENABLED: "true"
  BATCH_OPERATIONS_ENABLED: "true"
  PERFORMANCE_OPTIMIZATION_ENABLED: "true"

  # Dead Letter Queue
  DLQ_ENABLED: "true"
  DLQ_EXCHANGE_NAME: "storage-dlq"
  DLQ_QUEUE_NAME: "storage-dlq"
  DLQ_MAX_RETRIES: "3"

  # Logging
  LOG_LEVEL: "info"
  LOG_ENVIRONMENT: "production"
  LOG_FORMAT: "json"

  # Health Checks
  HEALTH_CHECK_INTERVAL: "30s"
  HEALTH_CHECK_TIMEOUT: "5s"

  # Queue processing configuration
  QUEUE_MAX_BATCH_SIZE: "100"
  QUEUE_BATCH_TIMEOUT: "30s"
