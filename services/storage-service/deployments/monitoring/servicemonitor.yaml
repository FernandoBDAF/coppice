apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: storage-service
  labels:
    app: storage-service
    service: storage-service
    release: prometheus
  annotations:
    description: "Prometheus ServiceMonitor for Storage Service"
spec:
  selector:
    matchLabels:
      app: storage-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "go_.*"
          action: drop
        - sourceLabels: [__name__]
          regex: "promhttp_.*"
          action: drop
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
  namespaceSelector:
    matchNames:
      - default
  targetLabels:
    - app
    - service
    - version

---
# PrometheusRule for alerting (optional)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: storage-service-alerts
  labels:
    app: storage-service
    service: storage-service
    release: prometheus
spec:
  groups:
    - name: storage-service.rules
      rules:
        # High Error Rate Alert
        - alert: StorageServiceHighErrorRate
          expr: |
            (
              rate(http_requests_total{job="storage-service",code=~"5.."}[5m]) /
              rate(http_requests_total{job="storage-service"}[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            service: storage-service
          annotations:
            summary: "Storage Service has high error rate"
            description: "Storage Service error rate is {{ $value | humanizePercentage }} for more than 5 minutes"

        # High Response Time Alert
        - alert: StorageServiceHighLatency
          expr: |
            histogram_quantile(0.95,
              rate(http_request_duration_seconds_bucket{job="storage-service"}[5m])
            ) > 1.0
          for: 5m
          labels:
            severity: warning
            service: storage-service
          annotations:
            summary: "Storage Service has high response time"
            description: "Storage Service 95th percentile latency is {{ $value }}s for more than 5 minutes"

        # Database Connection Issues
        - alert: StorageServiceDatabaseDown
          expr: |
            storage_database_connection_errors_total > 0
          for: 2m
          labels:
            severity: critical
            service: storage-service
          annotations:
            summary: "Storage Service cannot connect to database"
            description: "Storage Service has database connection errors for more than 2 minutes"

        # Queue Connection Issues
        - alert: StorageServiceQueueDown
          expr: |
            storage_queue_connection_errors_total > 0
          for: 2m
          labels:
            severity: critical
            service: storage-service
          annotations:
            summary: "Storage Service cannot connect to message queue"
            description: "Storage Service has queue connection errors for more than 2 minutes"

        # High Memory Usage
        - alert: StorageServiceHighMemoryUsage
          expr: |
            (
              container_memory_usage_bytes{pod=~"storage-service-.*"} /
              container_spec_memory_limit_bytes{pod=~"storage-service-.*"}
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            service: storage-service
          annotations:
            summary: "Storage Service has high memory usage"
            description: "Storage Service memory usage is {{ $value | humanizePercentage }} of limit for more than 10 minutes"

        # High CPU Usage
        - alert: StorageServiceHighCPUUsage
          expr: |
            (
              rate(container_cpu_usage_seconds_total{pod=~"storage-service-.*"}[5m]) /
              container_spec_cpu_quota{pod=~"storage-service-.*"} * container_spec_cpu_period{pod=~"storage-service-.*"}
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            service: storage-service
          annotations:
            summary: "Storage Service has high CPU usage"
            description: "Storage Service CPU usage is {{ $value | humanizePercentage }} of limit for more than 10 minutes"

        # Pod Restart Alert
        - alert: StorageServicePodRestarting
          expr: |
            rate(kube_pod_container_status_restarts_total{pod=~"storage-service-.*"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
            service: storage-service
          annotations:
            summary: "Storage Service pods are restarting"
            description: "Storage Service pod {{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes"

        # Service Down Alert
        - alert: StorageServiceDown
          expr: |
            up{job="storage-service"} == 0
          for: 1m
          labels:
            severity: critical
            service: storage-service
          annotations:
            summary: "Storage Service is down"
            description: "Storage Service has been down for more than 1 minute"

        # Batch Processing Failures
        - alert: StorageServiceBatchFailures
          expr: |
            rate(storage_batch_operations_failed_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
            service: storage-service
          annotations:
            summary: "Storage Service has high batch failure rate"
            description: "Storage Service batch failure rate is {{ $value }} operations/sec for more than 5 minutes"

        # Queue Processing Lag
        - alert: StorageServiceQueueLag
          expr: |
            storage_queue_messages_pending > 1000
          for: 10m
          labels:
            severity: warning
            service: storage-service
          annotations:
            summary: "Storage Service has high queue lag"
            description: "Storage Service has {{ $value }} pending messages in queue for more than 10 minutes"
