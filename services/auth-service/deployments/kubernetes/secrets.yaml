apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  labels:
    app: auth-service
    component: authentication
type: Opaque
stringData:
  # JWT Keys (Base64 encoded RSA keys)
  JWT_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    # REPLACE WITH ACTUAL PRIVATE KEY
    # Generate with: openssl genrsa -out private.pem 2048
    -----END RSA PRIVATE KEY-----

  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    # REPLACE WITH ACTUAL PUBLIC KEY
    # Generate with: openssl rsa -in private.pem -pubout -out public.pem
    -----END PUBLIC KEY-----

  # Service Authentication (if needed)
  SERVICE_API_KEY: "REPLACE_WITH_ACTUAL_API_KEY"

  # Monitoring and Observability
  METRICS_AUTH_TOKEN: "REPLACE_WITH_METRICS_TOKEN"

---
# Template for production secrets
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets-template
  labels:
    app: auth-service
    component: authentication
    template: "true"
type: Opaque
stringData:
  # Instructions for production deployment
  INSTRUCTIONS: |
    This is a template for auth-service secrets.

    Before deploying to production:
    1. Generate RSA key pair:
       openssl genrsa -out private.pem 2048
       openssl rsa -in private.pem -pubout -out public.pem

    2. Replace JWT_PRIVATE_KEY and JWT_PUBLIC_KEY with actual keys

    3. Generate secure API keys:
       SERVICE_API_KEY: openssl rand -hex 32
       METRICS_AUTH_TOKEN: openssl rand -hex 16

    4. Apply the updated secret:
       kubectl apply -f secrets.yaml

    5. Delete this template:
       kubectl delete secret auth-service-secrets-template
