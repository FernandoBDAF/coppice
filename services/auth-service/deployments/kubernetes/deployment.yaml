apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
    component: authentication
    tier: backend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        component: authentication
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: auth-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
          env:
            # Service Integration Configuration
            - name: STORAGE_SERVICE_URL
              value: "http://storage-service:8080"
            - name: CACHE_SERVICE_URL
              value: "http://cache-service:8080"
            - name: SERVICE_TIMEOUT
              value: "5000"
            - name: SERVICE_RETRIES
              value: "3"

            # Circuit Breaker Configuration
            - name: CIRCUIT_BREAKER_TIMEOUT
              value: "3000"
            - name: CIRCUIT_BREAKER_ERROR_THRESHOLD
              value: "50"
            - name: CIRCUIT_BREAKER_RESET_TIMEOUT
              value: "30000"

            # Security Configuration
            - name: RATE_LIMIT_WINDOW_MS
              value: "900000" # 15 minutes
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "5"
            - name: ACCOUNT_LOCKOUT_ATTEMPTS
              value: "5"
            - name: ACCOUNT_LOCKOUT_DURATION_MS
              value: "1800000" # 30 minutes

            # Health Check Configuration
            - name: HEALTH_CHECK_INTERVAL
              value: "30s"
            - name: HEALTH_CHECK_TIMEOUT
              value: "5s"

            # Logging Configuration
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_FORMAT
              value: "json"
            - name: NODE_ENV
              value: "production"

            # Server Configuration
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "8081"

          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secrets

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL

      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - auth-service
                topologyKey: kubernetes.io/hostname

      # Node selection for production workloads
      nodeSelector:
        node-type: application

      # Tolerations for dedicated nodes
      tolerations:
        - key: "application-workload"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  labels:
    app: auth-service
    component: authentication
