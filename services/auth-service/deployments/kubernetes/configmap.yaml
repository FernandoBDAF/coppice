apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  labels:
    app: auth-service
    component: authentication
data:
  # Service Integration
  STORAGE_SERVICE_URL: "http://storage-service:8080"
  CACHE_SERVICE_URL: "http://cache-service:8080"
  SERVICE_TIMEOUT: "5000"
  SERVICE_RETRIES: "3"

  # Circuit Breaker Configuration
  CIRCUIT_BREAKER_TIMEOUT: "3000"
  CIRCUIT_BREAKER_ERROR_THRESHOLD: "50"
  CIRCUIT_BREAKER_RESET_TIMEOUT: "30000"

  # Security Configuration
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "5"
  ACCOUNT_LOCKOUT_ATTEMPTS: "5"
  ACCOUNT_LOCKOUT_DURATION_MS: "1800000"

  # Health Check Configuration
  HEALTH_CHECK_INTERVAL: "30s"
  HEALTH_CHECK_TIMEOUT: "5s"

  # Logging Configuration
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  NODE_ENV: "production"

  # Server Configuration
  PORT: "8080"
  METRICS_PORT: "8081"

  # JWT Configuration (non-sensitive)
  JWT_ALGORITHM: "RS256"
  JWT_ISSUER: "auth-service"
  JWT_AUDIENCE: "microservices-ecosystem"
  JWT_ACCESS_TOKEN_EXPIRY: "3600"
  JWT_REFRESH_TOKEN_EXPIRY: "86400"
