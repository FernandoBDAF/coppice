# Storage Service dependency for Kind
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  labels:
    app: storage-service
    component: storage
    temporary: "true"
spec:
  selector:
    app: storage-service
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP

---
# Cache Service dependency for Kind
apiVersion: v1
kind: Service
metadata:
  name: cache-service
  labels:
    app: cache-service
    component: cache
    temporary: "true"
spec:
  selector:
    app: cache-service
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP

---
# Note: This file assumes storage-service and cache-service are already deployed
# If not deployed, add their deployments here or deploy them first
