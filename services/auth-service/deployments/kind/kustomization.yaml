apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests
resources:
  - ../kubernetes/configmap.yaml
  - ../kubernetes/secrets.yaml
  - ../kubernetes/deployment.yaml
  - ../kubernetes/service.yaml
  - auth-dependencies.yaml # Storage and Cache services

# Kind-specific patches
patchesStrategicMerge:
  - deployment-patch.yaml
  - service-patch.yaml

# Use local secrets for Kind
replacements:
  - source:
      kind: Secret
      name: auth-service-secrets-local
    targets:
      - select:
          kind: Deployment
          name: auth-service
        fieldPaths:
          - spec.template.spec.containers.[name=auth-service].envFrom.[secretRef.name=auth-service-secrets].secretRef.name

namespace: default

commonLabels:
  environment: local-kind
  deployment-tool: kustomize

# Kind-specific configurations
configMapGenerator:
  - name: auth-service-local-config
    literals:
      - LOG_LEVEL=debug
      - NODE_ENV=development
      - CIRCUIT_BREAKER_TIMEOUT=5000
      - HEALTH_CHECK_INTERVAL=10s

secretGenerator:
  - name: auth-service-secrets-local
    literals:
      - JWT_PRIVATE_KEY=LS0tLS1CRUdJTi... # Base64 encoded test key
      - JWT_PUBLIC_KEY=LS0tLS1CRUdJTi... # Base64 encoded test key
      - SERVICE_API_KEY=test-api-key-for-kind-only
      - METRICS_AUTH_TOKEN=test-metrics-token
