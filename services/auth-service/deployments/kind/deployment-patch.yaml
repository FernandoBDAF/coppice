apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  # Single replica for Kind
  replicas: 1

  template:
    spec:
      containers:
        - name: auth-service
          # Reduced resources for local development
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          # Kind-specific environment variables
          env:
            # Service URLs for Kind cluster
            - name: STORAGE_SERVICE_URL
              value: "http://storage-service.default.svc.cluster.local:8080"
            - name: CACHE_SERVICE_URL
              value: "http://cache-service.default.svc.cluster.local:8080"

            # Debug settings for local development
            - name: LOG_LEVEL
              value: "debug"
            - name: NODE_ENV
              value: "development"

            # Relaxed timeouts for Kind
            - name: SERVICE_TIMEOUT
              value: "10000"
            - name: CIRCUIT_BREAKER_TIMEOUT
              value: "5000"
            - name: HEALTH_CHECK_TIMEOUT
              value: "10s"

            # Reduced rate limiting for testing
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "100"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000" # 1 minute

      # Remove production-specific scheduling
      affinity: null
      nodeSelector: null
      tolerations: null

      # Use default service account for Kind
      serviceAccountName: default
