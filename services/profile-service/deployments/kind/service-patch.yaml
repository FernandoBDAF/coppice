apiVersion: v1
kind: Service
metadata:
  name: profile-service
  annotations:
    # Add annotation for local development
    local.dev/kind-cluster: "true"
spec:
  # Change to NodePort for easier local access during development
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      # nodePort: 30080 # Fixed port for consistent local access
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: 8080
      # nodePort: 30081 # Fixed port for metrics access
      protocol: TCP

---
# Disable HPA for kind (metrics server might not be available)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: profile-service-hpa
spec:
  # Disable scaling in kind
  minReplicas: 1
  maxReplicas: 1
  metrics: []
  behavior: null

---
# Simplified Network Policy for kind
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: profile-service-netpol
spec:
  podSelector:
    matchLabels:
      app: profile-service
  policyTypes:
    - Ingress
    - Egress
  # Allow all traffic for local development
  ingress:
    - {}
  egress:
    - {}
