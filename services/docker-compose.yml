version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=profiles
      - POSTGRES_USER=profile_user
      - POSTGRES_PASSWORD=profile_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/profile-service/internal/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - profile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profile_user -d profiles"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: ["postgres", "-c", "listen_addresses=*"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - profile-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=profile_user
      - RABBITMQ_DEFAULT_PASS=profile_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - profile-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  profile-network:
    driver: bridge
