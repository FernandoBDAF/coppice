# CI phase 1 (ADR-010.2): verify + image builds + compose⇄kustomize drift
# check on every push. Phase 2 (scored smoke experiments) lands after v4;
# phase 3 (OIDC→ECR→EKS) inside v5.
name: ci

# push is filtered to main so PR commits run once (via pull_request), not twice
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            api-service/go.sum
            graph-worker/operational-workers/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            auth-service/package-lock.json
            mission-control/status-page/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd auth-service && npm ci
      - run: make verify
      - run: cd mission-control/status-page && npm ci && npm run build

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # build-only (no push): proves every Dockerfile still assembles;
      # the local registry push path is exercised by `make images` locally
      - run: docker build -t ci/api-service api-service
      - run: docker build -t ci/auth-service auth-service
      - run: docker build -t ci/graphrag-service graph-worker/graphrag-service
      - run: docker build -t ci/email-worker -f graph-worker/operational-workers/Dockerfile.email graph-worker/operational-workers
      - run: docker build -t ci/image-worker -f graph-worker/operational-workers/Dockerfile.image graph-worker/operational-workers
      - run: docker build -t ci/profile-worker -f graph-worker/operational-workers/Dockerfile.profile graph-worker/operational-workers
      - run: docker build -t ci/loadgen -f graph-worker/operational-workers/Dockerfile.loadgen graph-worker/operational-workers
      - run: docker build -t ci/ntfy-relay scripts/obs/ntfy-relay
      - run: docker build -t ci/hello-guest-web --build-arg CMD=web guests/hello-guest
      - run: docker build -t ci/hello-guest-worker --build-arg CMD=worker guests/hello-guest

  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # generator output must be committed: definitions.json + both routing-key
      # tables regenerate byte-identically (ADR-008.4)
      - name: rabbitmq definitions + routing-keys committed
        run: |
          make routing-keys
          git diff --exit-code \
            deploy/rabbitmq/definitions.json \
            deploy/rabbitmq/ROUTING_KEYS.generated.md \
            graph-worker/shared/contracts/ROUTING_KEYS.md
      # scored-experiment no-stack gates (fast lane): schema-validate every
      # experiments/*.yaml, run the runner's pure-logic unit tests, and check the
      # generated EXPERIMENTS.md index is committed (ADR-004.1)
      - name: experiments validate + unit tests + index
        run: |
          python3 scripts/experiments/run.py --validate
          python3 -m unittest discover -s scripts/experiments
          python3 scripts/experiments/gen-index.py --check
      - name: install kustomize
        run: |
          curl -sfLo /tmp/kustomize.tgz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tgz -C /usr/local/bin kustomize
      - run: python3 scripts/check-kustomize-drift.py
      # v3 additions render standalone (not part of the drift-checked overlay)
      - run: kustomize build --load-restrictor LoadRestrictionsNone deploy/obs/manifests > /dev/null
      - run: kustomize build guests/hello-guest/k8s/base > /dev/null
      - run: kustomize build guests/hello-guest/k8s/obs > /dev/null

  # CI phase 2 (ADR-010.2): scored smoke experiments on main only (PRs stay
  # fast). Runs the compose stack and a small set of scored experiments; junit
  # XML (.experiment-results/, written by scripts/experiments/run.py) uploads
  # as an artifact.
  scored-smoke:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # run.py writes junit XML to $EXPERIMENT_REPORT_DIR (default
    # .experiment-results/ at the repo root); pinned explicitly so the upload
    # glob and .gitignore stay in lockstep even if the default moves
    env:
      EXPERIMENT_REPORT_DIR: .experiment-results
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - run: make up
      - run: for e in exp-01 exp-02 exp-05; do make experiment E=$e || exit 1; done
      # Diagnostics on a scored failure: without these, a red run only prints
      # "actual N" with no way to tell WHICH target/service is at fault (this
      # gap once left a graphrag cold-start crash-loop undiagnosable). Dump
      # container health, the down scrape targets, and the logs of anything not
      # running/healthy.
      - name: diagnostics on failure
        if: failure()
        run: |
          echo "── docker compose ps ──"; docker compose ps || true
          echo "── prometheus targets with up==0 (queried from host) ──"
          # Query the mapped host port with curl rather than exec-ing wget into
          # the prometheus container: no dependency on wget being present in that
          # image, and it still works when prometheus itself is the unhealthy one.
          curl -s 'http://localhost:9090/api/v1/query?query=up==0' || true
          echo "── logs of non-running/unhealthy containers ──"
          for c in $(docker compose ps -a --format '{{.Name}} {{.State}} {{.Health}}' \
            | awk '$2!="running" || ($3!="" && $3!="healthy") {print $1}'); do
            echo "==== $c ===="; docker logs --tail 60 "$c" 2>&1 || true
          done
      - run: make down
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: experiment-junit
          path: .experiment-results/*.xml
