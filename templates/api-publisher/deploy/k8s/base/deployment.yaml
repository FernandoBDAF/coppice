# api-publisher — minimal k8s base. Conventions mirror the lab deploy shapes:
# named ports, `app:` selector labels, startup/readiness/liveness probes,
# resource requests+limits, non-root + dropped capabilities, a preStop drain
# sleep, and a PodDisruptionBudget. Passwords come from Secrets you create in
# the consuming repo ($(VAR) expansion for the DSN). Adjust namespace/image.
apiVersion: v1
kind: Service
metadata:
  name: api-publisher
  labels:
    app: api-publisher
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: api-publisher
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-publisher
  labels:
    app: api-publisher
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-publisher
  template:
    metadata:
      labels:
        app: api-publisher
      annotations:
        # /metrics is served on the main http port in this template.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api-publisher
          image: localhost:5001/api-publisher:dev
          imagePullPolicy: IfNotPresent
          # Endpoints propagation lags SIGTERM; without this a rolling update
          # can briefly route new connections to a terminating pod.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DSN
              value: postgres://postgres:$(POSTGRES_PASSWORD)@postgres:5432/api_db?sslmode=disable
            - name: RABBITMQ_HOSTS
              value: rabbitmq:5672
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: AUTH_URL
              value: http://auth-service:3000
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-publisher
  labels:
    app: api-publisher
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-publisher
