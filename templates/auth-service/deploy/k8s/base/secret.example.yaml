# EXAMPLE ONLY — do not apply as-is, and never commit real secret values.
# Copy this to a file your secret tooling manages (sealed-secrets, SOPS, an
# external secret store, or `kubectl create secret`) and fill in real values.
#
# JWT_SECRET must be >= 32 characters (HS256 fallback + zod constraint).
# For RS256, add the auth-service-keys Secret via:
#     scripts/gen-keys.sh --k8s <namespace> | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  labels:
    app: auth-service
type: Opaque
stringData:
  DATABASE_PASSWORD: "change-me"
  JWT_SECRET: "change-me-to-at-least-32-characters-long"
  # Optional admin bootstrap (ADR-009.7): set both to seed an admin on startup.
  # SEED_ADMIN_EMAIL: "admin@example.com"
  # SEED_ADMIN_PASSWORD: "change-me"
