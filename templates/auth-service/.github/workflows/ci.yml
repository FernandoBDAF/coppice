# Minimal CI for the auth-service template — runnable as-is in a consuming repo.
# Assumes the service lives at the repository root (the copy-then-own default).
# If you nest it (e.g. services/auth/), set `defaults.run.working-directory`
# below and adjust the `paths` filter.
name: auth-service-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
