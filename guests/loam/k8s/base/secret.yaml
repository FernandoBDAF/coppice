# PLACEHOLDER Secret (ADR-007.6). Agent Jobs read the Claude Code OAuth token
# from here via secretKeyRef (see agent-job.example.yaml). The value below is a
# CLEARLY-FAKE stand-in so `kubectl apply -k` works on a bare kind cluster; the
# REAL token is supplied out-of-band by the lab's init-secrets flow (AWS Secrets
# Manager in production, ADR-007.6) and must NEVER be committed here.
#
# ⚠️  Rotate the live token in loam/.env (step 0, guest-side) BEFORE any real
#     run — see README + LOAM_DEPLOYMENT_PLAN. This file is scaffolding only.
apiVersion: v1
kind: Secret
metadata:
  name: loam-agent-token
  namespace: loam
  labels:
    lab.local/guest: loam
type: Opaque
stringData:
  # NOT A REAL TOKEN — replaced at deploy time by init-secrets / Secrets Manager.
  CLAUDE_CODE_OAUTH_TOKEN: "REPLACE_ME_fake-placeholder-not-a-real-token"
