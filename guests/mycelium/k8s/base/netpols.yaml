# Guest isolation (ADR-007.2): same zero-trust model as lab-core —
# default-deny both directions, DNS opened for all pods, then exactly the holes
# mycelium needs: the shared obs stack scraping /metrics, the shared ingress
# controller reaching the UI, and egress to the shared stores it opted into
# (ADR-007.1: Mongo db `mycelium`, RabbitMQ vhost `mycelium`).
#
# ┌─ SPEND-PROOF (EXP-70) ────────────────────────────────────────────────┐
# │ There is DELIBERATELY NO egress rule to api.openai.com (LLM) or        │
# │ api.voyageai.com (embeddings). A pod that cannot route to the          │
# │ providers cannot spend, whatever keys leak into its env — the ABSENCE  │
# │ of that egress rule is the netpol-level spend-proof. NOTE: a working   │
# │ deterministic fake mode (LLM_MODE=fake) is UNBUILT in mycelium today   │
# │ (KM-1, greenfield) — so until KM-1 lands the LLM/embed stages cannot   │
# │ complete here at all (no keys+egress, no fake). That is acceptable for │
# │ EXP-70's structural proof; adding a provider-egress rule is the        │
# │ deliberate, reviewable act that turns real-key mode on (EXP-71).       │
# └───────────────────────────────────────────────────────────────────────┘
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: mycelium
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: mycelium
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# The shared observability stack (lab-obs) may scrape mycelium's /metrics on
# 8080 — this is how a netpol-isolated guest stays visible (HOST_CONTRACT §2).
# mycelium's stages+graph are one consolidated FastAPI process; /metrics is
# scraped once via the stages surface (:8080). The UI (:3000) exposes no
# /metrics.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-obs-scrape
  namespace: mycelium
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-obs
      ports:
        - protocol: TCP
          port: 8080
---
# Both StagesUI and stages-api are reachable from the shared ingress controller
# only (hostname mycelium.lab.local): the ingress routes / → StagesUI (:3000)
# and /api → stages-api (:8080), so stages-api IS on the ingress path and needs
# its own hole below (a parallel policy, not merged with the UI one — merging
# selectors+ports would wrongly open :3000 on the API pod and :8080 on the UI
# pod). graph-api (:8081) has NO ingress path (GraphDash was retired in
# mycelium's phase 4; graph exploration now lives inside StagesUI at /explore),
# so it stays reachable only by the obs scrape. kubelet probes bypass
# NetworkPolicy by design.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-uis
  namespace: mycelium
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [mycelium-stages-ui]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
# stages-api's /api surface, routed from the shared ingress controller
# (mycelium.lab.local/api → :8080). Same-origin with StagesUI; without this hole
# every /api call is dropped by default-deny and nginx returns 504. Only
# ingress-nginx is admitted here — graph-api (:8081) is deliberately NOT opened.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: mycelium
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [mycelium-stages-api]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
# Shared-infra egress (ADR-007.1): the pipeline/APIs reach the lab's Mongo
# (27017) and RabbitMQ (5672) in lab-infra. Stage handoff today = Mongo
# collections (in-process); mycelium also dispatches whole runs on arq/Redis,
# not deployed in this lab rehearsal. The 5672 hole is for the KM-4 queue-mode
# migration onto the `mycelium` vhost (ADR-007.4 — the migration is the
# exercise), the lab's target topology. These are the ONLY egress holes besides
# DNS — note the absence of any LLM-provider rule above.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-shared-infra
  namespace: mycelium
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-infra
      ports:
        - protocol: TCP
          port: 27017 # MongoDB (db `mycelium`)
        - protocol: TCP
          port: 5672 # RabbitMQ (vhost `mycelium`) — KM-4 queue-mode target
