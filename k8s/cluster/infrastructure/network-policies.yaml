# =============================================================================
# NETWORK POLICIES FOR KIND MICROSERVICES CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# Network Policies in Kubernetes act as a firewall at the pod level, controlling
# which pods can communicate with each other. They implement "Zero Trust" networking
# where all traffic is denied by default, and only explicitly allowed traffic flows.
#
# 🔒 SECURITY MODEL:
# 1. Default Deny All - Block all traffic by default
# 2. Explicit Allow Rules - Only permit required communication paths
# 3. Service Isolation - Each microservice has its own network policy
# 4. Infrastructure Access - Separate policies for databases and messaging
#
# 🏗️ ARCHITECTURE PATTERN:
# This implements a "Defense in Depth" strategy where:
# - Application-level authentication (JWT tokens)
# - Network-level access control (these policies)
# - Service-level authorization (API permissions)
# work together to secure the microservices ecosystem.
#
# 💡 KIND CONSIDERATIONS:
# - Kind uses the kindnet CNI which supports NetworkPolicy
# - All policies target the 'default' namespace where our services run
# - External access (NodePort) requires special 'from: []' rules
# - DNS resolution requires UDP port 53 egress to kube-system
# =============================================================================

# -----------------------------------------------------------------------------
# DEFAULT DENY ALL POLICY
# -----------------------------------------------------------------------------
# 🛡️ PURPOSE: Implements "Zero Trust" networking by blocking ALL traffic
# 📖 CONCEPT: This is a foundational security practice - start with no access,
#            then explicitly grant only what's needed
# ⚠️  CRITICAL: Without this policy, pods can communicate freely (insecure)
# 🔧 BEHAVIOR: Blocks both ingress (incoming) and egress (outgoing) traffic
#            for all pods in the default namespace unless overridden
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default
spec:
  # Empty podSelector {} means "apply to all pods in this namespace"
  podSelector: {}
  # Specify both policy types to block ingress AND egress
  # Without egress, pods couldn't even do DNS lookups
  policyTypes:
    - Ingress # Block incoming connections to pods
    - Egress # Block outgoing connections from pods
  # No ingress/egress rules specified = complete block
---
# -----------------------------------------------------------------------------
# CACHE SERVICE NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Allows cache service to communicate with Redis and serve requests
# 📊 SERVICE ROLE: Acts as a high-performance caching layer for other services
# 🔄 COMMUNICATION PATTERN:
#    - Receives requests from auth, profile, worker services
#    - Connects to Redis for data storage
#    - Exposes NodePort 30081 for external access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cache-service
  namespace: default
spec:
  # 🏷️ Target pods with label "app=cache-service"
  # Labels are the primary method for service identification in K8s
  podSelector:
    matchLabels:
      app: cache-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔗 MICROSERVICE-TO-MICROSERVICE COMMUNICATION
    # Allow specific services to access cache service
    # This implements the "Principle of Least Privilege"
    - from:
        # 🔐 Using podSelector ensures only pods with these exact labels can connect
        # This prevents rogue pods from accessing the cache
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: profile-service
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        # 📡 Restrict to specific port - defense in depth
        # Even if a pod gets the right label, it can only access port 8080
        - protocol: TCP
          port: 8080
    # 🌐 EXTERNAL ACCESS (NodePort)
    # 'from: []' means "from anywhere" - required for NodePort services
    # This allows traffic from outside the cluster to reach the service
    - from: []
      ports:
        - protocol: TCP
          port: 8080
    # 📊 METRICS ACCESS (Port 8081)
    # Allow access to metrics endpoint for monitoring and testing
    # Pods with app=cache-service label can access metrics (for testing)
    - from:
        - podSelector:
            matchLabels:
              app: cache-service
      ports:
        - protocol: TCP
          port: 8081
    # 🌉 INGRESS CONTROLLER ACCESS
    # Allow ingress controller from ingress-nginx namespace to reach cache service
    # This enables external traffic routed through ingress to reach the service
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 🗄️ DATABASE ACCESS
    # Cache service needs to connect to Redis for data operations
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379 # Standard Redis port
    # 🔍 DNS RESOLUTION
    # 📚 CRITICAL: All pods need DNS to resolve service names
    # Without this, "redis-service" wouldn't resolve to an IP
    # 'to: []' means "to anywhere" - DNS servers are in kube-system namespace
    - to: []
      ports:
        - protocol: UDP
          port: 53 # Standard DNS port
---
# -----------------------------------------------------------------------------
# STORAGE SERVICE NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Data persistence layer connecting to PostgreSQL database
# 📊 SERVICE ROLE: Provides CRUD operations for user data, authentication records
# 🔄 COMMUNICATION PATTERN: Similar to cache but connects to PostgreSQL instead of Redis
# 💾 DATA FLOW: Receives API requests → Translates to SQL → Returns structured data
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-storage-service
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: storage-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔗 MICROSERVICE ACCESS
    # Auth service needs storage for user credentials and session data
    # Profile service needs storage for user profile information
    # Worker service needs storage for processing state and results
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: profile-service
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        - protocol: TCP
          port: 8080
    # 🌐 EXTERNAL ACCESS (NodePort 30082)
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 🗄️ DATABASE CONNECTION
    # PostgreSQL connection for persistent data storage
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432 # Standard PostgreSQL port
    # 🔍 DNS RESOLUTION
    - to: []
      ports:
        - protocol: UDP
          port: 53
---
# -----------------------------------------------------------------------------
# AUTH SERVICE NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Authentication and authorization service (JWT token management)
# 📊 SERVICE ROLE: Central security hub - validates users, issues tokens
# 🔄 COMMUNICATION PATTERN: Consumes cache + storage, serves profile + worker
# 🔐 SECURITY NOTE: This is a critical service - extra care in network isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔗 AUTHENTICATION CONSUMERS
    # Profile service needs auth for user validation
    # Worker service needs auth for task authorization
    - from:
        - podSelector:
            matchLabels:
              app: profile-service
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        - protocol: TCP
          port: 8080
    # 🌐 EXTERNAL ACCESS (NodePort 30083)
    # Direct access for login/register operations
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 🔄 DEPENDENCY SERVICES
    # Auth service uses both cache (for session data) and storage (for user data)
    # This creates a service dependency chain: Auth → Cache + Storage
    - to:
        - podSelector:
            matchLabels:
              app: cache-service
        - podSelector:
            matchLabels:
              app: storage-service
      ports:
        - protocol: TCP
          port: 8080
    # 🔍 DNS RESOLUTION
    - to: []
      ports:
        - protocol: UDP
          port: 53
---
# -----------------------------------------------------------------------------
# QUEUE SERVICE NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Asynchronous message processing with RabbitMQ backend
# 📊 SERVICE ROLE: Enables decoupled, scalable task processing
# 🔄 MESSAGING PATTERN: Producer-Consumer model for background jobs
# 📨 USE CASES: Email sending, image processing, data export jobs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-queue-service
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: queue-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔗 TASK PUBLISHERS
    # Profile service publishes user-related tasks (email notifications)
    # Worker service publishes and consumes various job types
    - from:
        - podSelector:
            matchLabels:
              app: profile-service
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        - protocol: TCP
          port: 8080
    # 🌐 EXTERNAL ACCESS (NodePort 30084)
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 🐰 MESSAGE BROKER CONNECTION
    # RabbitMQ provides reliable message queuing with persistence
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672 # AMQP protocol port
        - protocol: TCP
          port: 15672 # Management UI (monitoring/debugging)
    # 🔍 DNS RESOLUTION
    - to: []
      ports:
        - protocol: UDP
          port: 53
---
# -----------------------------------------------------------------------------
# PROFILE SERVICE NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: User profile management and orchestration service
# 📊 SERVICE ROLE: High-level business logic coordinator
# 🔄 ORCHESTRATION PATTERN: Calls multiple services to complete user operations
# 🎭 COMPLEXITY: Most connected service - integrates with all others
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-profile-service
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: profile-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔗 SERVICE CONSUMERS
    # Worker service may need profile data for processing tasks
    - from:
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        - protocol: TCP
          port: 8080
    # 🌐 EXTERNAL ACCESS (NodePort 30085)
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 🌐 FULL SERVICE MESH ACCESS
    # Profile service is an orchestrator - needs access to all services
    # This represents a "facade" or "BFF" (Backend for Frontend) pattern
    - to:
        # Authentication for user validation
        - podSelector:
            matchLabels:
              app: auth-service
        # Cache for performance optimization
        - podSelector:
            matchLabels:
              app: cache-service
        # Storage for profile data persistence
        - podSelector:
            matchLabels:
              app: storage-service
        # Queue for background task submission
        - podSelector:
            matchLabels:
              app: queue-service
      ports:
        - protocol: TCP
          port: 8080
    # 🔍 DNS RESOLUTION
    - to: []
      ports:
        - protocol: UDP
          port: 53
---
# -----------------------------------------------------------------------------
# WORKER SERVICE NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Background task processor (multi-worker architecture)
# 📊 SERVICE ROLE: Handles async jobs (email, image processing, data tasks)
# 🔄 WORKER PATTERN: Multiple worker types in single service
# ⚡ SCALABILITY: Designed for horizontal scaling based on queue depth
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-service
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: worker-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🌐 EXTERNAL ACCESS ONLY (NodePort 30086)
    # Workers primarily consume from queues, minimal direct API access
    # External access mainly for health checks and monitoring
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 🔄 FULL SERVICE ACCESS FOR TASK PROCESSING
    # Workers need access to all services to complete various task types:
    # - Auth: Validate tokens for user tasks
    # - Cache: Store/retrieve temporary processing data
    # - Storage: Persist task results and state
    # - Queue: Get tasks and send completion notifications
    # - Profile: Update user profiles based on task results
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: cache-service
        - podSelector:
            matchLabels:
              app: storage-service
        - podSelector:
            matchLabels:
              app: queue-service
        - podSelector:
            matchLabels:
              app: profile-service
      ports:
        - protocol: TCP
          port: 8080
    # 🔍 DNS RESOLUTION
    - to: []
      ports:
        - protocol: UDP
          port: 53
---
# =============================================================================
# INFRASTRUCTURE SERVICES NETWORK POLICIES
# =============================================================================
# 📚 PURPOSE: Database and messaging infrastructure access control
# 🏗️ PATTERN: Infrastructure services only accept connections from their consumers
# 🔒 SECURITY: Prevents direct access to databases from unauthorized services
# =============================================================================

# -----------------------------------------------------------------------------
# REDIS ACCESS POLICY (Cache Infrastructure)
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Allow only cache service to access Redis database
# 📊 REDIS ROLE: High-performance in-memory data store
# 🔐 ISOLATION: Prevents other services from bypassing cache service logic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-infrastructure
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    # 🔗 CACHE SERVICE ONLY
    # Only the cache service should directly access Redis
    # This enforces proper data access patterns and caching logic
    - from:
        - podSelector:
            matchLabels:
              app: cache-service
      ports:
        - protocol: TCP
          port: 6379 # Redis default port
---
# -----------------------------------------------------------------------------
# POSTGRESQL ACCESS POLICY (Storage Infrastructure)
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Allow only storage service to access PostgreSQL database
# 📊 POSTGRESQL ROLE: Persistent data storage for user and application data
# 🔐 ISOLATION: Enforces data access through proper service layer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # 🔗 STORAGE SERVICE ONLY
    # Direct database access is restricted to the storage service
    # This implements the Repository pattern at the network level
    - from:
        - podSelector:
            matchLabels:
              app: storage-service
      ports:
        - protocol: TCP
          port: 5432 # PostgreSQL default port
---
# -----------------------------------------------------------------------------
# RABBITMQ ACCESS POLICY (Messaging Infrastructure)
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Allow only queue service to access RabbitMQ message broker
# 📊 RABBITMQ ROLE: Reliable message queuing for asynchronous processing
# 🔐 ISOLATION: Ensures message flow goes through proper queue management
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    # 🔗 QUEUE SERVICE ONLY
    # Message broker access is limited to the queue service
    # This centralizes message routing and queue management logic
    - from:
        - podSelector:
            matchLabels:
              app: queue-service
      ports:
        - protocol: TCP
          port: 5672 # AMQP messaging protocol
        - protocol: TCP
          port: 15672 # Management interface (monitoring)
---
# -----------------------------------------------------------------------------
# INGRESS CONTROLLER ACCESS POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Enable NGINX ingress controller to reach backend services
# ⚠️  CRITICAL: Without this policy, ingress resources won't work!
# 🌐 CROSS-NAMESPACE: Allows traffic from ingress-nginx namespace to default
#
# 📚 TECHNICAL DETAILS:
# - Uses namespaceSelector instead of podSelector for cross-namespace access
# - No port restrictions because ingress needs to reach various service ports
# - This is the "bridge" between external traffic and internal services
#
# 🔧 KIND SPECIFIC:
# - Kind automatically creates ingress-nginx namespace with proper labels
# - This policy matches the namespace label "app.kubernetes.io/name=ingress-nginx"
# - External traffic: Internet → Kind host → Ingress Controller → Services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: default
spec:
  # 🎯 Target ALL pods in default namespace (empty selector)
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # 🌉 CROSS-NAMESPACE ACCESS
    # Allow traffic from any pod in the ingress-nginx namespace
    # The namespaceSelector matches the namespace label, not pod labels
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      # 📡 No port restrictions specified
      # Ingress controller needs flexibility to reach different service ports
      # (8080 for APIs, 6379 for Redis health checks, etc.)

---
# -----------------------------------------------------------------------------
# QUEUE SERVICE NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Message queuing and asynchronous task distribution
# 📊 SERVICE ROLE: Central message broker - publishes tasks to workers
# 🔄 COMMUNICATION PATTERN: Serves profile + worker, consumes RabbitMQ
# 🐰 DEPENDENCY: Requires RabbitMQ for message persistence and routing
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-queue-service
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: queue-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔗 MESSAGE PUBLISHERS
    # Profile service publishes user-related tasks
    # Worker service may publish inter-worker messages
    - from:
        - podSelector:
            matchLabels:
              app: profile-service
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        - protocol: TCP
          port: 8080
    # 📊 METRICS ACCESS
    # Allow access to metrics endpoint for monitoring
    - from:
        - podSelector:
            matchLabels:
              app: queue-service  # Self-access for testing
      ports:
        - protocol: TCP
          port: 9090
    # 🌐 EXTERNAL ACCESS (NodePort 30084)
    # Direct access for testing and management
    - from: []
      ports:
        - protocol: TCP
          port: 8080
    # 🌉 INGRESS CONTROLLER ACCESS
    # Allow ingress controller to reach queue service
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 🐰 RABBITMQ DEPENDENCY
    # Queue service requires RabbitMQ for all message operations
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672   # AMQP protocol
        - protocol: TCP
          port: 15672  # Management UI
        - protocol: TCP
          port: 15692  # Metrics
    # 🌐 DNS RESOLUTION
    # Required for service discovery and external dependencies
    - to: []
      ports:
        - protocol: UDP
          port: 53

---
# -----------------------------------------------------------------------------
# RABBITMQ NETWORK POLICY
# -----------------------------------------------------------------------------
# 🎯 PURPOSE: Message broker backend for queue service
# 📊 SERVICE ROLE: Persistent message storage and routing
# 🔄 COMMUNICATION PATTERN: Serves queue service, isolated from direct access
# 🔐 SECURITY NOTE: RabbitMQ should only be accessible by queue service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔗 QUEUE SERVICE ACCESS
    # Only queue service should connect to RabbitMQ
    - from:
        - podSelector:
            matchLabels:
              app: queue-service
      ports:
        - protocol: TCP
          port: 5672   # AMQP protocol
        - protocol: TCP
          port: 15672  # Management UI
        - protocol: TCP
          port: 15692  # Metrics
    # 📊 METRICS ACCESS
    # Allow access to metrics for monitoring (internal only)
    - from:
        - podSelector:
            matchLabels:
              app: rabbitmq  # Self-access for health checks
      ports:
        - protocol: TCP
          port: 15692  # Metrics endpoint
  egress:
    # 🌐 DNS RESOLUTION
    # RabbitMQ may need DNS for clustering (not used in single-node Kind)
    - to: []
      ports:
        - protocol: UDP
          port: 53
