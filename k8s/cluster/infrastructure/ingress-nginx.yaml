# =============================================================================
# NGINX INGRESS CONTROLLER FOR KIND CLUSTERS
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# The Ingress Controller acts as a "smart load balancer" that routes external
# HTTP/HTTPS traffic to internal Kubernetes services based on rules (host, path).
# It's the bridge between the outside world and your microservices.
#
# 🌐 TRAFFIC FLOW:
# Internet → Kind Host → NodePort → Ingress Controller → Service → Pod
# Example: curl -H "Host: api.local" http://localhost:80/users → profile-service
#
# 🏗️ ARCHITECTURE COMPONENTS:
# 1. Controller Pod - Runs NGINX + Controller logic
# 2. Admission Webhook - Validates ingress resources before creation
# 3. NodePort Service - Exposes controller to host (ports 80, 443)
# 4. IngressClass - Defines which controller handles which ingress resources
#
# 🔧 KIND OPTIMIZATIONS:
# - Single replica (not HA) for resource efficiency
# - NodePort service instead of LoadBalancer (Kind doesn't support LB)
# - Self-signed certificates for admission webhook (no cert-manager needed)
# - Control-plane node placement (ingress-ready=true label)
# - Reduced resource requests/limits for development
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production uses 2+ replicas for high availability
# - LoadBalancer service type with cloud provider integration
# - cert-manager for automatic TLS certificate management
# - Higher resource limits and anti-affinity rules
# =============================================================================

# 🏷️ DEDICATED NAMESPACE
# Ingress controller runs in its own namespace for isolation and security
# This namespace has special labels that our network policies reference
apiVersion: v1
kind: Namespace
metadata:
  labels:
    # 🔗 NETWORK POLICY TARGET: These labels are used by network policies
    # to allow cross-namespace traffic from ingress-nginx to default
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
  name: ingress-nginx
---
# =============================================================================
# ADMISSION WEBHOOK TLS SECRET - CRITICAL FOR KIND!
# =============================================================================
# 🎯 PURPOSE: Provides TLS certificates for the admission webhook
# 🚨 PROBLEM: Without this secret, ingress controller fails with:
#    "MountVolume.SetUp failed for volume 'webhook-cert': secret not found"
#
# 📚 WEBHOOK CONCEPT:
# Admission webhooks are a Kubernetes extension mechanism that allows
# external services to validate or modify resources before they're stored.
# The ingress controller uses this to validate ingress resource syntax.
#
# 🔒 TLS REQUIREMENT:
# All admission webhooks MUST use TLS encryption for security
# The API server won't communicate with non-TLS webhooks
#
# 🔧 KIND vs PRODUCTION:
# - KIND: We manually create self-signed certificates (this approach)
# - PRODUCTION: Use cert-manager or external CA for proper certificates
#
# 💡 CERTIFICATE DETAILS:
# - CN=ingress-nginx-controller-admission (must match service name)
# - Self-signed with 1-year validity (sufficient for development)
# - Base64 encoded in the secret data fields
apiVersion: v1
kind: Secret
metadata:
  name: ingress-nginx-admission
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
    app.kubernetes.io/component: admission-webhook
type: kubernetes.io/tls
data:
  # 🔐 TLS CERTIFICATE (Base64 encoded)
  # Generated with: openssl req -x509 -newkey rsa:2048 -keyout tls.key -out tls.crt
  #                 -days 365 -nodes -subj "/CN=ingress-nginx-controller-admission"
  tls.crt: 
  # 🔑 PRIVATE KEY (Base64 encoded)
  # SECURITY NOTE: In production, store private keys in secure key management systems
  tls.key: 
---
# =============================================================================
# SERVICE ACCOUNTS FOR RBAC
# =============================================================================
# 📚 SERVICE ACCOUNT CONCEPT:
# Service Accounts provide identity to pods, similar to user accounts for humans.
# They're used with RBAC (Role-Based Access Control) to grant specific
# permissions to pods for accessing Kubernetes APIs.
#
# 🔐 RBAC PATTERN:
# ServiceAccount → RoleBinding/ClusterRoleBinding → Role/ClusterRole → Permissions
#
# 💡 DUAL SERVICE ACCOUNTS:
# 1. ingress-nginx: Main controller service account (broad cluster permissions)
# 2. ingress-nginx-admission: Webhook service account (limited admission permissions)

# 🎯 MAIN CONTROLLER SERVICE ACCOUNT
# This service account runs the ingress controller pod
# It needs extensive permissions to watch services, endpoints, ingresses, etc.
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
    app.kubernetes.io/version: 1.8.2
  name: ingress-nginx
  namespace: ingress-nginx
automountServiceAccountToken: true # Required for API access
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: admission-webhook
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
    app.kubernetes.io/version: 1.8.2
  name: ingress-nginx-admission
  namespace: ingress-nginx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
    app.kubernetes.io/version: 1.8.2
  name: ingress-nginx
  namespace: ingress-nginx
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - configmaps
      - pods
      - secrets
      - endpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses/status
    verbs:
      - update
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingressclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    resourceNames:
      - ingress-nginx-leader
    verbs:
      - get
      - update
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - list
      - watch
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
    app.kubernetes.io/version: 1.8.2
  name: ingress-nginx
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - endpoints
      - nodes
      - pods
      - secrets
      - namespaces
    verbs:
      - list
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses/status
    verbs:
      - update
  - apiGroups:
