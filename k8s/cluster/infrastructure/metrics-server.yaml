# =============================================================================
# METRICS SERVER FOR KIND CLUSTERS
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# The Metrics Server is a cluster-wide aggregator of resource usage data.
# It collects CPU and memory metrics from kubelet on each node and makes
# them available through the Kubernetes API for consumption by:
# - kubectl top (commands like `kubectl top nodes`, `kubectl top pods`)
# - Horizontal Pod Autoscaler (HPA) for automatic scaling decisions
# - Vertical Pod Autoscaler (VPA) for resource recommendation
# - Custom monitoring dashboards and alerting systems
#
# 🏗️ ARCHITECTURE:
# kubelet (collects metrics) → Metrics Server → Kubernetes API → Consumers
#
# 📊 METRICS TYPES:
# - Node metrics: CPU/memory usage per node, allocatable resources
# - Pod metrics: CPU/memory usage per pod/container, resource requests/limits
# - All metrics are collected every 15-60 seconds (configurable)
#
# 🔧 KIND SPECIFIC CHALLENGES:
# Kind clusters have unique certificate and authentication configurations
# that require special arguments to work properly:
# 1. TLS verification bypassed (--kubelet-insecure-tls)
# 2. Special authentication headers for API server communication
# 3. Additional logging for troubleshooting authentication issues
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production uses proper TLS certificates from kubelet
# - No --kubelet-insecure-tls flag (security risk)
# - Integration with monitoring systems like Prometheus
# - Higher resource limits for larger clusters
# - Multiple replicas for high availability
# =============================================================================

# Metrics Server Deployment with Kind-specific optimizations
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    k8s-app: metrics-server
  name: metrics-server
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    k8s-app: metrics-server
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  name: system:aggregated-metrics-reader
rules:
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    k8s-app: metrics-server
  name: system:metrics-server
rules:
  - apiGroups:
      - ""
    resources:
      - nodes/metrics
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    k8s-app: metrics-server
  name: metrics-server-auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    k8s-app: metrics-server
  name: metrics-server:system:auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    k8s-app: metrics-server
  name: system:metrics-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:metrics-server
subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: kube-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    k8s-app: metrics-server
  name: metrics-server
  namespace: kube-system
spec:
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: https
  selector:
    k8s-app: metrics-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k8s-app: metrics-server
  name: metrics-server
  namespace: kube-system
spec:
  # Kind optimization: Single replica for simplicity
  replicas: 1
  selector:
    matchLabels:
      k8s-app: metrics-server
  strategy:
    rollingUpdate:
      maxUnavailable: 0
  template:
    metadata:
      labels:
        k8s-app: metrics-server
    spec:
      containers:
        - args:
            # 📁 CERTIFICATE MANAGEMENT
            # Store TLS certificates in temporary directory (Kind doesn't need persistent certs)
            - --cert-dir=/tmp
            # 🔒 SECURE PORT CONFIGURATION
            # Metrics server API port - clients connect here for metrics data
            - --secure-port=4443
            # 🏷️ KUBELET ADDRESS RESOLUTION
            # How metrics server finds and connects to kubelet on each node
            # InternalIP preferred for Kind (cluster-internal communication)
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            # 📊 KUBELET CONNECTION OPTIMIZATION
            # Use kubelet's status port for more efficient metric collection
            - --kubelet-use-node-status-port
            # ⏱️ METRIC COLLECTION FREQUENCY
            # Collect metrics every 15 seconds (good balance for development)
            - --metric-resolution=15s

            # =================================================================
            # KIND-SPECIFIC AUTHENTICATION AND TLS CONFIGURATIONS
            # =================================================================
            # 🚨 CRITICAL: These settings are required for Kind clusters
            # Without them, metrics server fails with authentication errors

            # 🔓 TLS BYPASS (Development Only)
            # Skip TLS verification when connecting to kubelet
            # ⚠️ SECURITY WARNING: Never use in production!
            - --kubelet-insecure-tls

            # 🔐 API SERVER AUTHENTICATION HEADERS
            # These configure how metrics server authenticates with API server
            # Kind clusters require specific certificate and header configurations

            # CA certificate file for validating client certificates
            - --requestheader-client-ca-file=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            # HTTP header containing authenticated username
            - --requestheader-username-headers=X-Remote-User
            # HTTP header containing user group memberships
            - --requestheader-group-headers=X-Remote-Group
            # Prefix for additional user attributes in headers
            - --requestheader-extra-headers-prefix=X-Remote-Extra-

            # 🔧 KIND-SPECIFIC AUTHENTICATION FIXES
            # These additional settings resolve "FailedDiscoveryCheck" errors
            # that are common in Kind cluster environments

            # Allow front-proxy-client certificate for authentication
            # This is the certificate used by Kind's API server front proxy
            - --requestheader-allowed-names=front-proxy-client
            # Enable detailed logging to stderr for troubleshooting
            - --logtostderr=true
            # Set log verbosity level (2 = info level, shows auth decisions)
            - --v=2

          # 🐳 CONTAINER IMAGE
          # Using official metrics server image with known compatibility
          image: registry.k8s.io/metrics-server/metrics-server:v0.6.4
          # 🔄 PULL POLICY: Only pull if image not present locally (Kind optimization)
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /livez
              port: https
              scheme: HTTPS
            periodSeconds: 10
          name: metrics-server
          ports:
            - containerPort: 4443
              name: https
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 10
          # Kind optimization: Reduced resource requirements
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 200m
              memory: 400Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir
      nodeSelector:
        kubernetes.io/os: linux
      priorityClassName: system-cluster-critical
      serviceAccountName: metrics-server
      volumes:
        - emptyDir: {}
          name: tmp-dir
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  labels:
    k8s-app: metrics-server
  name: v1beta1.metrics.k8s.io
spec:
  group: metrics.k8s.io
  groupPriorityMinimum: 100
  insecureSkipTLSVerify: true
  service:
    name: metrics-server
    namespace: kube-system
  version: v1beta1
  versionPriority: 100
