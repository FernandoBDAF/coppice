# =============================================================================
# STORAGE CLASS AND LOCAL PATH PROVISIONER FOR KIND
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# Storage Classes define "types" of storage available in your cluster.
# They work with Dynamic Volume Provisioning to automatically create
# Persistent Volumes (PVs) when applications request Persistent Volume Claims (PVCs).
#
# 🏗️ STORAGE ARCHITECTURE:
# StorageClass → Provisioner → PersistentVolume → PersistentVolumeClaim → Pod
#
# 📊 STORAGE FLOW:
# 1. Developer creates PVC requesting 1GB storage
# 2. Kubernetes finds matching StorageClass (local-storage)
# 3. Provisioner (local-path) creates actual storage directory on node
# 4. PV is created pointing to that directory
# 5. Pod mounts the PV and can read/write data
#
# 🔧 KIND STORAGE CHARACTERISTICS:
# - Uses host directories (not network/cloud storage)
# - Storage persists between pod restarts but not cluster recreation
# - Perfect for development, not suitable for production
# - Single-node storage (no replication)
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Cloud providers use network-attached storage (EBS, Persistent Disks)
# - Production storage classes offer replication, snapshots, encryption
# - Different performance tiers (SSD, HDD) and access modes
# - Storage distributed across multiple nodes/zones for availability
#
# 💡 LOCAL PATH PROVISIONER:
# This is a Rancher project that provides dynamic local storage for K8s
# It creates directories on the node's filesystem for each PVC
# Storage location: /opt/local-path-provisioner/ (inside Kind container)
# =============================================================================

# 🏷️ DEFAULT STORAGE CLASS
# This defines the default storage available to applications
# When a PVC doesn't specify a storageClassName, this one is used
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
  annotations:
    # 🎯 DEFAULT DESIGNATION: This annotation makes this the default StorageClass
    # Any PVC without explicit storageClassName will use this class
    storageclass.kubernetes.io/is-default-class: "true"
    # 📝 DESCRIPTION: Human-readable description for kubectl describe
    description: "Local path provisioner for Kind development clusters"
# 🔧 PROVISIONER: Specifies which component creates the actual storage
# This must match the provisioner name in the local-path-provisioner deployment
provisioner: rancher.io/local-path
# 🔄 RECLAIM POLICY: What happens to data when PVC is deleted
# Delete = remove storage immediately (good for development)
reclaimPolicy: Delete
# 📱 VOLUME BINDING MODE: When to create the actual volume
# WaitForFirstConsumer = delay creation until pod is scheduled
# This ensures storage is created on the same node as the pod
volumeBindingMode: WaitForFirstConsumer
# 🚀 VOLUME EXPANSION: Allow PVCs to be expanded after creation
allowVolumeExpansion: true
---
# =============================================================================
# LOCAL PATH PROVISIONER DEPLOYMENT
# =============================================================================
# 📚 PROVISIONER ROLE:
# The provisioner is a controller that watches for PVCs and automatically
# creates Persistent Volumes by making directories on the host filesystem.
# It runs as a deployment and needs broad permissions to manage storage.

# 🏷️ DEDICATED NAMESPACE
# Isolates provisioner from other components for security and organization
apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
  labels:
    # 📝 COMPONENT IDENTIFICATION
    name: local-path-storage
    app: local-path-provisioner
---
# 🔐 SERVICE ACCOUNT FOR PROVISIONER
# Provides identity for the provisioner pod to access Kubernetes APIs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-path-provisioner-service-account
  namespace: local-path-storage
---
# 🔑 CLUSTER ROLE: PROVISIONER PERMISSIONS
# Defines what actions the provisioner can perform cluster-wide
# These permissions are required for dynamic volume provisioning
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-path-provisioner-role
rules:
  # 📊 READ ACCESS: Monitor cluster state for provisioning decisions
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumeclaims", "configmaps"]
    verbs: ["get", "list", "watch"]
  # 🔄 FULL ACCESS: Manage storage resources and helper pods
  # provisioner needs to create/delete PVs and helper pods for cleanup
  - apiGroups: [""]
    resources: ["endpoints", "persistentvolumes", "pods"]
    verbs: ["*"] # All verbs: create, delete, get, list, watch, update, patch
  # 📝 EVENT LOGGING: Report provisioning activities for troubleshooting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # 🏷️ STORAGE CLASS ACCESS: Read storage class definitions
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
# 🔗 BIND SERVICE ACCOUNT TO CLUSTER ROLE
# Grants the defined permissions to the provisioner service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-path-provisioner-bind
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-path-provisioner-role
subjects:
  - kind: ServiceAccount
    name: local-path-provisioner-service-account
    namespace: local-path-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-path-provisioner
  namespace: local-path-storage
spec:
  # Kind optimization: Single replica for simplicity
  replicas: 1
  selector:
    matchLabels:
      app: local-path-provisioner
  template:
    metadata:
      labels:
        app: local-path-provisioner
    spec:
      serviceAccountName: local-path-provisioner-service-account
      containers:
        - name: local-path-provisioner
          image: rancher/local-path-provisioner:v0.0.24
          imagePullPolicy: IfNotPresent
          command:
            - local-path-provisioner
            - --debug
            - start
            - --config
            - /etc/config/config.json
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config/
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          # Kind optimization: Reduced resource requirements
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config-volume
          configMap:
            name: local-path-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: local-path-storage
data:
  config.json: |-
    {
      "nodePathMap":[
        {
          "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths":["/var/local-path-provisioner"]
        }
      ]
    }
  setup: |-
    #!/bin/sh
    set -eu
    mkdir -m 0777 -p "$VOL_DIR"
  teardown: |-
    #!/bin/sh
    set -eu
    rm -rf "$VOL_DIR"
  helperPod.yaml: |-
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      # Kind optimization: Run helper pods on any node
      tolerations:
      - operator: Exists
      containers:
      - name: helper-pod
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        # Reduced resource requirements for helper pods
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
