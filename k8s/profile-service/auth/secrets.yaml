apiVersion: v1
kind: Secret
metadata:
  name: profile-auth-secrets
type: Opaque
data:
  # PostgreSQL Password (base64 encoded)
  # POSTGRES_PASSWORD: cG9zdGdyZXNfcGFzc3dvcmQ= # Replace with actual base64 encoded password

  # JWT Secret (base64 encoded)
  JWT_SECRET: am10X3NlY3JldA== # base64 encoded "jwt_secret"

  # Redis Password (base64 encoded)
  REDIS_PASSWORD: "" # base64 encoded empty string
