apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-auth-config
data:
  # Service Configuration
  SERVICE_NAME: "profile-auth"
  SERVER_PORT: "8080"
  GRPC_PORT: "9090"

  # # Redis Configuration
  REDIS_ADDR: "redis:6379"
  REDIS_DB: "0"

  # # PostgreSQL Configuration
  # POSTGRES_HOST: "postgres"
  # POSTGRES_PORT: "5432"
  # POSTGRES_DB: "auth_db"
  # POSTGRES_USER: "auth_user"

  # JWT Configuration
  JWT_EXPIRATION: "24h"
  JWT_REFRESH_EXPIRATION: "168h" # 7 days

  # Rate Limiting
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_DURATION: "1m"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Environment
  ENVIRONMENT: "production"
