apiVersion: v1
kind: Service
metadata:
  name: profile-auth
  labels:
    app: profile-auth
spec:
  selector:
    app: profile-auth
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  type: ClusterIP
