apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-storage-config
data:
  server_port: "8080"
  grpc_port: "50051"
  db_host: "postgres"
  db_port: "5432"
  db_name: "profiles"
  db_max_open_conns: "25"
  db_max_idle_conns: "5"
  db_conn_max_lifetime: "5m"
  db_conn_max_idle_time: "1m"
  db_conn_retry_attempts: "10"
  db_conn_retry_interval: "5s"
  transaction_timeout: "30s"
