apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-storage
  labels:
    app: profile-storage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-storage
  template:
    metadata:
      labels:
        app: profile-storage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: profile-storage
          image: profile-storage:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: server_port
            - name: GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: grpc_port
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: profile-storage-secrets
                  key: db_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: profile-storage-secrets
                  key: db_password
            - name: DB_MAX_OPEN_CONNS
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_max_open_conns
            - name: DB_MAX_IDLE_CONNS
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_max_idle_conns
            - name: DB_CONN_MAX_LIFETIME
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_conn_max_lifetime
            - name: DB_CONN_MAX_IDLE_TIME
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_conn_max_idle_time
            - name: DB_CONN_RETRY_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_conn_retry_attempts
            - name: DB_CONN_RETRY_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: db_conn_retry_interval
            - name: TRANSACTION_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: profile-storage-config
                  key: transaction_timeout
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: profile-storage
spec:
  selector:
    app: profile-storage
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 50051
      targetPort: grpc
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-storage-config
data:
  server_port: "8080"
  grpc_port: "50051"
  db_host: "postgres"
  db_port: "5432"
  db_name: "profiles"
  db_max_open_conns: "25"
  db_max_idle_conns: "5"
  db_conn_max_lifetime: "5m"
  db_conn_max_idle_time: "1m"
  db_conn_retry_attempts: "10"
  db_conn_retry_interval: "5s"
  transaction_timeout: "30s"
---
apiVersion: v1
kind: Secret
metadata:
  name: profile-storage-secrets
type: Opaque
data:
  db_user: cHJvZmlsZV91c2Vy
  db_password: cHJvZmlsZV9wYXNzd29yZA==
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: profile-storage-network-policy
spec:
  podSelector:
    matchLabels:
      app: profile-storage
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: profile-api
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
