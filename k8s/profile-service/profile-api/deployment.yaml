apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-api
  labels:
    app: profile-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-api
  template:
    metadata:
      labels:
        app: profile-api
    spec:
      containers:
        - name: profile-api
          image: profile-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: profile-api-config
                  key: REDIS_ADDR
            - name: REDIS_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: profile-api-config
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: profile-api-config
                  key: REDIS_DB
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: profile-api-config
                  key: AUTH_SERVICE_URL
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: profile-api-config
                  key: SERVER_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: profile-api-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: profile-api
spec:
  selector:
    app: profile-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
