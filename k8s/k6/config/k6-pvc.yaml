apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k6-test-results
  namespace: default
  labels:
    app: k6
    purpose: load-testing
    component: results-storage
  annotations:
    description: "Storage for k6 load test results and metrics"
    managed-by: "k6-operator"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi # Increased for storing all test results
