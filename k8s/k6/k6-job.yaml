apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: microservice
spec:
  template:
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          command: ["k6", "run", "/scripts/profile-api-test.js"]
          env:
            - name: BASE_URL
              value: "http://profile-api" # This should match your service name
          volumeMounts:
            - name: k6-test-script
              mountPath: /scripts
      volumes:
        - name: k6-test-script
          configMap:
            name: k6-test-script
      restartPolicy: Never
  backoffLimit: 1
