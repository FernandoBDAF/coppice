apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-api-stress-configmap
data:
  API_URL: "http://profile-api:8080"
  TEST_SCRIPT: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { randomString } from 'https://jslib.k6.io/k6-utils/1.2.0/index.js';

    const BASE_URL = __ENV.API_URL || 'http://profile-api:8080';

    // Test configuration
    export const options = {
      stages: [
        { duration: '2m', target: 100 },   // Ramp up to 100 users
        { duration: '5m', target: 100 },   // Stay at 100 users
        { duration: '2m', target: 200 },   // Ramp up to 200 users
        { duration: '5m', target: 200 },   // Stay at 200 users
        { duration: '2m', target: 300 },   // Ramp up to 300 users
        { duration: '5m', target: 300 },   // Stay at 300 users
        { duration: '2m', target: 0 },     // Ramp down to 0 users
      ],
      thresholds: {
        http_req_duration: ['p(95)<2000'], // 95% of requests should be below 2s
        http_req_failed: ['rate<0.2'],     // Less than 20% of requests should fail
      },
    };

    // Helper function to generate valid profile data
    function generateProfileData() {
      return {
        firstName: randomString(8),
        lastName: randomString(8),
        email: `${randomString(8)}@example.com`,
        phone: `+1${Math.floor(Math.random() * 1000000000)}`,
        address: {
          street: `${Math.floor(Math.random() * 1000)} Main St`,
          city: 'Test City',
          state: 'TS',
          zipCode: `${Math.floor(Math.random() * 100000)}`,
          country: 'US'
        }
      };
    }

    export default function () {
      // Create profile
      const createPayload = generateProfileData();
      const createRes = http.post(`${BASE_URL}/profiles`, JSON.stringify(createPayload), {
        headers: { 'Content-Type': 'application/json' },
      });
      
      check(createRes, {
        'create status is 201': (r) => r.status === 201,
        'create has profile id': (r) => r.json('id') !== undefined,
      });

      if (createRes.status === 201) {
        const profileId = createRes.json('id');
        sleep(1);

        // Get profile
        const getRes = http.get(`${BASE_URL}/profiles/${profileId}`);
        check(getRes, {
          'get status is 200': (r) => r.status === 200,
          'get returns correct profile': (r) => r.json('id') === profileId,
        });
        sleep(1);

        // Update profile
        const updatePayload = generateProfileData();
        const updateRes = http.put(`${BASE_URL}/profiles/${profileId}`, JSON.stringify(updatePayload), {
          headers: { 'Content-Type': 'application/json' },
        });
        
        check(updateRes, {
          'update status is 200': (r) => r.status === 200,
          'update returns updated profile': (r) => r.json('id') === profileId,
        });
        sleep(1);

        // Delete profile
        const deleteRes = http.del(`${BASE_URL}/profiles/${profileId}`);
        check(deleteRes, {
          'delete status is 204': (r) => r.status === 204,
        });
      }

      sleep(1);
    }
