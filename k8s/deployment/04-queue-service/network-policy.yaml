apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq
  namespace: default
  labels:
    app: rabbitmq
    component: message-broker
    environment: kind-production
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow queue-service to connect
    - from:
        - podSelector:
            matchLabels:
              app: queue-service
      ports:
        - port: 5672
          protocol: TCP
        - port: 15672
          protocol: TCP
        - port: 15692
          protocol: TCP
    # Allow worker services to connect
    - from:
        - podSelector:
            matchLabels:
              app: email-worker
        - podSelector:
            matchLabels:
              app: image-worker
      ports:
        - port: 5672
          protocol: TCP
        - port: 15672
          protocol: TCP
    # Allow self-access for metrics
    - from:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 15692
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
