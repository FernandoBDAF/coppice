# =============================================================================
# RABBITMQ STATEFULSET FOR QUEUE SERVICE - KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# RabbitMQ serves as the message broker backend for the Queue Service,
# providing reliable message queuing, routing, and persistence capabilities.
# This StatefulSet ensures RabbitMQ maintains state across pod restarts.
#
# 🏗️ ARCHITECTURE:
# Queue Service → RabbitMQ (AMQP 5672) → Message Queues → Worker Services
#                      ↓
#               Management UI (15672) → Monitoring & Administration
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Single replica for development simplicity
# - Persistent storage using local-storage StorageClass
# - Management UI enabled for educational purposes
# - Reduced resource requests for local development
# - Development-friendly logging configuration
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use clustered RabbitMQ (3+ nodes)
# - Network-attached storage for persistence
# - TLS encryption for connections
# - RBAC and advanced security configurations
# =============================================================================

# 🔗 RABBITMQ SERVICE: Internal cluster communication
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  labels:
    app: rabbitmq
    component: message-broker
    environment: kind-production
spec:
  type: ClusterIP
  ports:
    # 🐰 AMQP PORT: Message broker protocol
    - name: amqp
      port: 5672
      targetPort: amqp
      protocol: TCP
    # 🌐 MANAGEMENT UI: Web interface for monitoring
    - name: management
      port: 15672
      targetPort: management
      protocol: TCP
    # 📊 METRICS PORT: Prometheus metrics endpoint
    - name: metrics
      port: 15692
      targetPort: metrics
      protocol: TCP
  selector:
    app: rabbitmq

---
# 🗄️ RABBITMQ STATEFULSET: Persistent message broker
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
    component: message-broker
    environment: kind-production
spec:
  serviceName: rabbitmq-service
  # 🎯 KIND OPTIMIZATION: Single replica for development
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
        component: message-broker
        environment: kind-production
      annotations:
        # 📊 PROMETHEUS MONITORING: Enable metrics scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "15692"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: rabbitmq
          # 🐰 RABBITMQ IMAGE: Management-enabled version for development
          image: rabbitmq:3.13.7-management
          # 🚀 KIND OPTIMIZATION: Skip image pull for local development
          imagePullPolicy: IfNotPresent

          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
            - name: metrics
              containerPort: 15692
              protocol: TCP

          # 💾 RESOURCE CONFIGURATION: Conservative for Kind development
          resources:
            requests:
              cpu: "100m" # Minimal CPU for startup
              memory: "256Mi" # Sufficient memory for message storage
            limits:
              cpu: "300m" # Allow bursts for message processing
              memory: "512Mi" # Prevent OOM during high message volume

          # 🔧 ENVIRONMENT CONFIGURATION
          # Using shell command pattern for environment variable substitution
          command:
            - /bin/bash
          args:
            - -c
            - |
              # 🔐 SETUP RABBITMQ CREDENTIALS
              # Create rabbitmq.conf with substituted environment variables
              cat > /etc/rabbitmq/rabbitmq.conf << EOF
              # RabbitMQ Configuration for Kind Development
              default_user = ${RABBITMQ_DEFAULT_USER}
              default_pass = ${RABBITMQ_DEFAULT_PASS}
              default_vhost = ${RABBITMQ_DEFAULT_VHOST}

              # Management Plugin Configuration
              management.tcp.port = 15672
              management.tcp.ip = 0.0.0.0

              # Prometheus Metrics
              prometheus.tcp.port = 15692
              prometheus.tcp.ip = 0.0.0.0

              # Development Optimizations
              vm_memory_high_watermark.relative = 0.6
              disk_free_limit.relative = 0.1

              # Logging Configuration
              log.console = true
              log.console.level = info
              log.file = false

              # Queue and Message Defaults
              queue_master_locator = min-masters
              EOF

              # 🎓 EDUCATIONAL: Log the configuration (without passwords)
              echo "=== RabbitMQ Configuration ==="
              echo "User: ${RABBITMQ_DEFAULT_USER}"
              echo "VHost: ${RABBITMQ_DEFAULT_VHOST}"
              echo "Management UI: http://localhost:15672"
              echo "Metrics: http://localhost:15692/metrics"
              echo "=============================="

              # 🚀 START RABBITMQ
              exec docker-entrypoint.sh rabbitmq-server

          env:
            # 🔐 AUTHENTICATION CREDENTIALS (from secrets)
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: queue-service-secret
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: queue-service-secret
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_DEFAULT_VHOST
              valueFrom:
                secretKeyRef:
                  name: queue-service-secret
                  key: RABBITMQ_VHOST

            # 🎓 EDUCATIONAL: Enable plugins for development
            - name: RABBITMQ_ENABLED_PLUGINS_FILE
              value: "/etc/rabbitmq/enabled_plugins"

            # 📊 MONITORING: Enable Prometheus metrics
            - name: RABBITMQ_PROMETHEUS_PLUGIN
              value: "rabbitmq_prometheus"

          # 💾 PERSISTENT STORAGE: Message durability
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
              # 🎓 EDUCATIONAL: This ensures messages survive pod restarts
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins

          # 🏥 HEALTH CHECKS: Ensure RabbitMQ reliability
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - check_port_connectivity
            initialDelaySeconds: 60 # RabbitMQ needs time to start
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # 🚀 STARTUP PROBE: Handle slow RabbitMQ initialization
          startupProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15 # Allow up to 150 seconds for startup

      # 📁 CONFIGURATION VOLUME
      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-plugins-config

  # 💾 PERSISTENT VOLUME CLAIM TEMPLATE
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
        labels:
          app: rabbitmq
          component: message-broker
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-storage # Kind's storage class
        resources:
          requests:
            storage: 2Gi # Sufficient for development message storage

---
# 🔌 RABBITMQ PLUGINS CONFIGURATION
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-plugins-config
  labels:
    app: rabbitmq
    component: message-broker
    environment: kind-production
data:
  # 🎓 EDUCATIONAL: Enable plugins for development and monitoring
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_prometheus,rabbitmq_management_agent].
