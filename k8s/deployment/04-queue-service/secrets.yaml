# =============================================================================
# QUEUE SERVICE SECRETS FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This file contains sensitive configuration for the Queue Service, primarily
# RabbitMQ connection credentials. In production, these would be managed by
# external secret management systems like HashiCorp Vault or AWS Secrets Manager.
#
# 🏗️ ARCHITECTURE:
# Queue Service → RabbitMQ Authentication → Message Broker Access
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Development credentials for local testing
# - Base64 encoded values for Kubernetes secret format
# - Simple username/password authentication (no TLS certs needed)
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use external secret management
# - TLS certificates for encrypted connections
# - Rotating credentials with proper lifecycle management
# - Role-based access control (RBAC) for RabbitMQ
#
# 🔐 SECURITY NOTE:
# These are development credentials only. Never use these values in production!
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: queue-service-secret
  labels:
    app: queue-service
    component: messaging
    environment: kind-production
type: Opaque
data:
  # 🐰 RABBITMQ AUTHENTICATION CREDENTIALS
  # Username for RabbitMQ connection
  # Value: "queue_user" (base64 encoded)
  RABBITMQ_USERNAME: cXVldWVfdXNlcg==

  # Password for RabbitMQ connection
  # Value: "queue_dev_password" (base64 encoded)
  RABBITMQ_PASSWORD: cXVldWVfZGV2X3Bhc3N3b3Jk

  # RabbitMQ Virtual Host (namespace for queues and exchanges)
  # Value: "queue_vhost" (base64 encoded)
  RABBITMQ_VHOST: cXVldWVfdmhvc3Q=

---
# 📋 DEVELOPMENT CONFIGURATION MAP
# Additional non-sensitive development settings that complement the secrets
apiVersion: v1
kind: ConfigMap
metadata:
  name: queue-service-dev-config
  labels:
    app: queue-service
    component: messaging
    environment: kind-production
    config-type: development
data:
  # 🎓 EDUCATIONAL NOTES
  README: |
    Queue Service Development Configuration
    =====================================

    This ConfigMap provides additional development-specific settings
    that are not sensitive but are useful for Kind cluster deployment.

    RabbitMQ Connection Details:
    - Host: rabbitmq-service (internal Kubernetes service name)
    - Port: 5672 (AMQP protocol)
    - Management UI: 15672 (accessible via port-forward)
    - Username: queue_user (from secret)
    - Password: queue_dev_password (from secret)
    - Virtual Host: queue_vhost (from secret)

    Testing the Connection:
    1. Port-forward to RabbitMQ management UI:
       kubectl port-forward svc/rabbitmq-service 15672:15672
    2. Access http://localhost:15672 with the credentials above
    3. Check queues, exchanges, and message flow

    Message Publishing Test:
    curl -X POST http://localhost:30084/api/v1/queue/messages \
      -H "Content-Type: application/json" \
      -d '{
        "type": "profile_update",
        "routing_key": "profile.task", 
        "payload": {"user_id": "123", "action": "update"},
        "metadata": {"source": "test"}
      }'

  # 🔧 DEVELOPMENT ENVIRONMENT INDICATORS
  ENVIRONMENT_TYPE: "development"
  CLUSTER_TYPE: "kind"
  DEBUG_MODE: "enabled"

  # 📊 MONITORING ENDPOINTS
  HEALTH_CHECK_URL: "http://queue-service:8080/health"
  METRICS_URL: "http://queue-service-metrics:9090/metrics"

  # 🎯 ROUTING KEY EXAMPLES
  EXAMPLE_ROUTING_KEYS: |
    profile.task - Profile management operations
    email.send - Email notification tasks  
    image.process - Image processing jobs

  # 🚨 TROUBLESHOOTING COMMANDS
  TROUBLESHOOTING_COMMANDS: |
    # Check Queue Service logs
    kubectl logs -l app=queue-service -f

    # Check RabbitMQ logs  
    kubectl logs -l app=rabbitmq -f

    # Test RabbitMQ connectivity from Queue Service pod
    kubectl exec -it deployment/queue-service -- wget -qO- http://rabbitmq-service:15672/api/overview

    # Check RabbitMQ queues and exchanges
    kubectl port-forward svc/rabbitmq-service 15672:15672
    # Then visit http://localhost:15672

    # Test message publishing
    curl -X POST http://localhost:30084/api/v1/queue/messages \
      -H "Content-Type: application/json" \
      -d '{"type": "test", "routing_key": "profile.task", "payload": {"test": true}}'
