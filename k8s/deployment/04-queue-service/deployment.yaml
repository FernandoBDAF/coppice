# =============================================================================
# QUEUE SERVICE DEPLOYMENT FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# The Queue Service acts as a central message publisher for asynchronous
# communication between microservices. It provides reliable message delivery
# using RabbitMQ as the message broker with support for multiple worker types.
#
# 🏗️ ARCHITECTURE:
# Client Services → Queue Service HTTP API → RabbitMQ Exchange → Worker Queues
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Single replica for development simplicity
# - Reduced resource requests/limits for local development
# - IfNotPresent image pull policy for faster deployments
# - Debug logging enabled for educational purposes
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use multiple replicas with HPA
# - Higher resource allocations and stricter limits
# - Proper secret management and TLS encryption
# - Production logging levels and structured monitoring
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-service
  labels:
    app: queue-service
    component: messaging
    environment: kind-production
    tier: application
spec:
  # 🎯 KIND OPTIMIZATION: Single replica for development
  replicas: 1
  selector:
    matchLabels:
      app: queue-service
  template:
    metadata:
      labels:
        app: queue-service
        component: messaging
        environment: kind-production
      annotations:
        # 📊 PROMETHEUS MONITORING: Enable metrics scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # 🔐 POD-LEVEL SECURITY CONTEXT
      # Run as non-root user for security compliance
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # nobody user
        runAsGroup: 65534 # nobody group
        fsGroup: 65534 # File system group

      containers:
        - name: queue-service
          image: queue-service:latest
          # 🚀 KIND OPTIMIZATION: Skip image pull for local development
          imagePullPolicy: IfNotPresent

          # 🔐 CONTAINER-LEVEL SECURITY CONTEXT
          # Messaging service requires careful capability management
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Queue service needs temp space for message buffering
            capabilities:
              drop:
                - ALL # Drop all capabilities

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # 💾 RESOURCE CONFIGURATION: Conservative for Kind development
          resources:
            requests:
              cpu: "100m" # Minimal CPU for startup
              memory: "128Mi" # Sufficient memory for RabbitMQ connections
            limits:
              cpu: "200m" # Allow bursts for message processing
              memory: "256Mi" # Prevent OOM during high message volume

          # 🔧 ENVIRONMENT CONFIGURATION
          env:
            # Service Configuration
            - name: SERVICE_PORT
              value: "8080"
            - name: SERVICE_ENV
              value: "kind-production"
            - name: LOG_LEVEL
              value: "debug" # Educational: Enable detailed logging
            - name: LOG_FORMAT
              value: "json"

            # RabbitMQ Connection Configuration
            - name: RABBITMQ_NODES
              value: "rabbitmq-service:5672" # Internal service name
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: queue-service-secret
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: queue-service-secret
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: queue-service-secret
                  key: RABBITMQ_VHOST

            # Metrics Configuration
            - name: METRICS_ENABLED
              value: "true"
            - name: METRICS_PORT
              value: "9090"

            # RabbitMQ Operational Configuration
            - name: RABBITMQ_PREFETCH_COUNT
              valueFrom:
                configMapKeyRef:
                  name: queue-service-config
                  key: RABBITMQ_PREFETCH_COUNT
            - name: RABBITMQ_RECONNECT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: queue-service-config
                  key: RABBITMQ_RECONNECT_INTERVAL
            - name: RABBITMQ_MAX_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: queue-service-config
                  key: RABBITMQ_MAX_RETRIES

          # 🏥 HEALTH CHECKS: Ensure service reliability
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30 # Allow time for RabbitMQ connection
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # 🚀 STARTUP PROBE: Handle slow RabbitMQ connection establishment
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10 # Allow up to 100 seconds for startup

  # 🔄 DEPLOYMENT STRATEGY: Ensure zero-downtime updates
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
