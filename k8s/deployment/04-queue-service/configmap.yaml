# =============================================================================
# QUEUE SERVICE CONFIGURATION FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This ConfigMap provides non-sensitive configuration for the Queue Service,
# including RabbitMQ operational settings, connection parameters, and
# message handling configuration optimized for development and learning.
#
# 🏗️ ARCHITECTURE:
# Queue Service reads these values to configure:
# - RabbitMQ connection behavior (retries, timeouts)
# - Message handling (TTL, dead letter queues)
# - Queue and exchange durability settings
# - Performance tuning parameters
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Conservative resource settings for local development
# - Shorter timeouts for faster feedback during testing
# - Debug-friendly TTL values for message inspection
# - Development-optimized retry strategies
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use longer TTL values
# - Higher prefetch counts for better throughput
# - More aggressive retry strategies
# - Environment-specific queue configurations
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: queue-service-config
  labels:
    app: queue-service
    component: messaging
    environment: kind-production
data:
  # 🔧 RABBITMQ CONNECTION CONFIGURATION
  # Number of unacknowledged messages a consumer can handle
  RABBITMQ_PREFETCH_COUNT: "5" # Lower for development to prevent overwhelming

  # How long to wait before attempting reconnection
  RABBITMQ_RECONNECT_INTERVAL: "3s" # Faster reconnection for development

  # Maximum number of connection retry attempts
  RABBITMQ_MAX_RETRIES: "5" # Reasonable for development debugging

  # 📨 MESSAGE CONFIGURATION
  # How long messages stay in queues before expiring
  RABBITMQ_MESSAGE_TTL: "1h" # Shorter TTL for development (vs 24h production)

  # How long queues stay active without consumers
  RABBITMQ_QUEUE_TTL: "24h" # Reasonable for development sessions

  # How long messages stay in dead letter queue
  RABBITMQ_DLQ_TTL: "6h" # Shorter for development debugging

  # 🏗️ EXCHANGE AND QUEUE CONFIGURATION
  # Dead letter exchange for failed messages
  RABBITMQ_DEAD_LETTER_EXCHANGE: "dlx-tasks"

  # Dead letter queue for message inspection
  RABBITMQ_DEAD_LETTER_QUEUE: "dlq-tasks"

  # Whether messages survive broker restarts
  RABBITMQ_PERSISTENT_MESSAGES: "true" # Important for development consistency

  # Whether queues survive broker restarts
  RABBITMQ_QUEUE_DURABLE: "true" # Preserve queues during development

  # Whether exchanges survive broker restarts
  RABBITMQ_EXCHANGE_DURABLE: "true" # Preserve routing during development

  # 🎯 ROUTING CONFIGURATION
  # Supported routing keys for multi-worker architecture
  RABBITMQ_ROUTING_KEYS: "profile.task,email.send,image.process"

  # Default routing key for legacy compatibility
  RABBITMQ_DEFAULT_ROUTING_KEY: "profile.task"

  # 📊 MONITORING CONFIGURATION
  # Enable detailed RabbitMQ metrics collection
  RABBITMQ_METRICS_ENABLED: "true"

  # Metrics collection interval
  RABBITMQ_METRICS_INTERVAL: "30s"

  # 🔄 PERFORMANCE TUNING
  # Connection pool size for RabbitMQ connections
  RABBITMQ_CONNECTION_POOL_SIZE: "3" # Small pool for development

  # Channel pool size per connection
  RABBITMQ_CHANNEL_POOL_SIZE: "10" # Reasonable for development workloads

  # Publisher confirm timeout
  RABBITMQ_PUBLISHER_CONFIRM_TIMEOUT: "5s" # Fast feedback for development

  # 🚨 ERROR HANDLING CONFIGURATION
  # Maximum number of message delivery retries
  MAX_DELIVERY_RETRIES: "3"

  # Backoff strategy for failed deliveries (exponential, linear, fixed)
  RETRY_BACKOFF_STRATEGY: "exponential"

  # Initial retry delay
  INITIAL_RETRY_DELAY: "1s"

  # Maximum retry delay
  MAX_RETRY_DELAY: "30s"

  # 🎓 EDUCATIONAL SETTINGS
  # Enable verbose logging for learning purposes
  VERBOSE_LOGGING: "true"

  # Log message payloads (be careful with sensitive data)
  LOG_MESSAGE_PAYLOADS: "false" # Disabled by default for security

  # Enable connection event logging
  LOG_CONNECTION_EVENTS: "true"

  # Enable queue operation logging
  LOG_QUEUE_OPERATIONS: "true"
