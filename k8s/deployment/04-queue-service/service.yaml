# =============================================================================
# QUEUE SERVICE SERVICES FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# Three service types provide different access patterns:
# 1. NodePort: External access for testing and development
# 2. ClusterIP: Internal metrics access for monitoring
# 3. Headless: Direct pod access for service discovery
#
# 🏗️ ARCHITECTURE:
# External Traffic → NodePort (30084) → Queue Service Pod
# Internal Services → ClusterIP → Queue Service Pod
# Service Discovery → Headless Service → Individual Pods
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - NodePort 30084 for external access (matches our port allocation strategy)
# - Separate metrics service for monitoring isolation
# - Headless service for direct pod communication
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use LoadBalancer or Ingress instead of NodePort
# - Additional services for different environments (staging, prod)
# - Service mesh integration for advanced traffic management
# =============================================================================

# 🌐 NODEPORT SERVICE: External access for development and testing
apiVersion: v1
kind: Service
metadata:
  name: queue-service
  labels:
    app: queue-service
    component: messaging
    environment: kind-production
    service-type: external
spec:
  type: NodePort
  ports:
    # 🔌 HTTP API PORT: Main service endpoint
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30084 # External access port (matches our allocation strategy)
      protocol: TCP
  selector:
    app: queue-service

---
# 📊 CLUSTERIP SERVICE: Internal metrics access
apiVersion: v1
kind: Service
metadata:
  name: queue-service-metrics
  labels:
    app: queue-service
    component: messaging
    environment: kind-production
    service-type: metrics
spec:
  type: ClusterIP
  ports:
    # 📈 METRICS PORT: Prometheus scraping endpoint
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: queue-service

---
# 🔍 HEADLESS SERVICE: Service discovery and direct pod access
apiVersion: v1
kind: Service
metadata:
  name: queue-service-headless
  labels:
    app: queue-service
    component: messaging
    environment: kind-production
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None # Headless service - returns pod IPs directly
  ports:
    # 🔌 HTTP API PORT: Direct pod access
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    # 📈 METRICS PORT: Direct pod metrics access
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: queue-service
