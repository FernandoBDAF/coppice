# =============================================================================
# AUTH SERVICE CONFIGMAP - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This ConfigMap provides non-sensitive configuration for the Auth Service.
# It includes service URLs, timeouts, security settings, and operational
# parameters optimized for Kind development clusters.
#
# 🏗️ ARCHITECTURE:
# The Auth Service acts as an orchestration layer, integrating with:
# - Storage Service: For user data and authentication
# - Cache Service: For session management and token blacklisting
# - No direct database: Pure microservices orchestration
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Debug logging enabled for educational purposes
# - Reduced timeouts for faster development cycles
# - Service discovery via Kubernetes DNS
# - Development-friendly security settings
#
# ⚠️ PRODUCTION DIFFERENCES:
# Production would have:
# - Stricter security settings
# - Longer timeouts for reliability
# - External service discovery
# - Production logging levels
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  labels:
    app: auth-service
    component: authentication
    environment: kind-production
data:
  # 🌐 SERVICE INTEGRATION CONFIGURATION
  # These URLs use Kubernetes DNS for service discovery
  STORAGE_SERVICE_URL: "http://storage-service:8080"
  CACHE_SERVICE_URL: "http://cache-service:8080"
  SERVICE_TIMEOUT: "5000"
  SERVICE_RETRIES: "3"
  
  # 🔄 CIRCUIT BREAKER CONFIGURATION
  # Protects against cascade failures when dependencies are unavailable
  CIRCUIT_BREAKER_TIMEOUT: "3000"
  CIRCUIT_BREAKER_ERROR_THRESHOLD: "50"
  CIRCUIT_BREAKER_RESET_TIMEOUT: "30000"
  
  # 🔒 SECURITY CONFIGURATION
  # Rate limiting to prevent brute force attacks
  RATE_LIMIT_WINDOW_MS: "900000"        # 15 minutes
  RATE_LIMIT_MAX_REQUESTS: "5"          # 5 attempts per window
  ACCOUNT_LOCKOUT_ATTEMPTS: "5"         # 5 failed attempts
  ACCOUNT_LOCKOUT_DURATION_MS: "1800000" # 30 minutes
  
  # 🏥 HEALTH CHECK CONFIGURATION
  HEALTH_CHECK_INTERVAL: "30s"
  HEALTH_CHECK_TIMEOUT: "5s"
  
  # 📊 LOGGING CONFIGURATION
  LOG_LEVEL: "debug"                    # Debug for Kind development
  LOG_FORMAT: "json"
  NODE_ENV: "kind-production"           # Kind-specific environment
  
  # 🖥️ SERVER CONFIGURATION
  PORT: "8080"
  HOST: "0.0.0.0"
  METRICS_PORT: "8081"
  
  # 🔑 JWT CONFIGURATION (Non-sensitive)
  JWT_ALGORITHM: "RS256"
  JWT_ISSUER: "auth-service"
  JWT_AUDIENCE: "microservices-ecosystem"
  ACCESS_TOKEN_EXPIRY: "1h"             # 1 hour for development
  REFRESH_TOKEN_EXPIRY: "7d"            # 7 days for development
  
  # 📈 METRICS CONFIGURATION
  METRICS_ENABLED: "true"
  METRICS_PREFIX: "auth_service_"
