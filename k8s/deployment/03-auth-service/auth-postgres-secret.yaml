# =============================================================================
# AUTH SERVICE POSTGRESQL SECRET - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This Secret contains sensitive database credentials for the Auth Service's
# dedicated PostgreSQL database. Secrets are base64 encoded and should be
# managed securely in production.
#
# 🔒 SECURITY CONSIDERATIONS:
# - Base64 encoding (not encryption) - for Kind development only
# - Production should use external secret management (Vault, etc.)
# - Credentials should be rotated regularly
# - Access should be limited via RBAC
#
# 🔧 KIND-SPECIFIC:
# - Simple password for development
# - Educational base64 encoding shown
# - Not suitable for production use
#
# ⚠️ PRODUCTION DIFFERENCES:
# Production would have:
# - External secret management system
# - Strong, generated passwords
# - Regular credential rotation
# - Encrypted at rest
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: auth-postgres-secret
  labels:
    service: auth-service
    component: database
    environment: kind-production
type: Opaque
data:
  # Password: "auth_password" (base64 encoded)
  # Command used: echo -n "auth_password" | base64
  password: YXV0aF9wYXNzd29yZA==
