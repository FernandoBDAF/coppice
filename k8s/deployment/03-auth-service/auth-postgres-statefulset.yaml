# =============================================================================
# AUTH SERVICE POSTGRESQL STATEFULSET - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This StatefulSet provides a dedicated PostgreSQL database for the Auth Service.
# The Auth Service now owns user data and authentication, requiring its own
# isolated database instance.
#
# 🏗️ ARCHITECTURE CHANGE:
# - Previous: Auth Service used Storage Service for user data
# - Current: Auth Service has dedicated PostgreSQL database
# - Benefit: True microservices separation, cleaner boundaries
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Single replica for development simplicity
# - Local path storage for Kind clusters
# - Development-friendly resource limits
# - Educational logging and probes
#
# ⚠️ PRODUCTION DIFFERENCES:
# Production would have:
# - Multiple replicas with proper replication
# - External persistent storage
# - Higher resource limits
# - Backup and recovery strategies
# =============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-postgres
  labels:
    app: auth-postgres
    component: database
    service: auth-service
    environment: kind-production
spec:
  serviceName: auth-postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: auth-postgres
  template:
    metadata:
      labels:
        app: auth-postgres
        component: database
        service: auth-service
        environment: kind-production
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "auth_db"
            - name: POSTGRES_USER
              value: "auth_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-postgres-secret
                  key: password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: auth-postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "auth_user", "-d", "auth_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "auth_user", "-d", "auth_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: auth-postgres-data
        labels:
          app: auth-postgres
          component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
# =============================================================================
# AUTH POSTGRESQL SERVICE - CLUSTER INTERNAL ACCESS
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This Service provides internal cluster access to the Auth PostgreSQL database.
# Only the Auth Service should connect to this database, maintaining proper
# microservices boundaries.
#
# 🔒 SECURITY:
# - ClusterIP type: Internal access only
# - No external exposure
# - Database credentials via secrets
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: auth-postgres-service
  labels:
    app: auth-postgres
    component: database
    service: auth-service
    environment: kind-production
spec:
  selector:
    app: auth-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
