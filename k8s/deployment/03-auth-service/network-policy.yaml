---
# Auth Service Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service
  namespace: default
  labels:
    app: auth-service
    component: authentication
    environment: kind-production
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: profile-service
        - podSelector:
            matchLabels:
              app: worker-service
      ports:
        - port: 8080
          protocol: TCP
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow connection to auth database
    - to:
        - podSelector:
            matchLabels:
              app: auth-postgres
      ports:
        - port: 5432
          protocol: TCP
    # Allow connection to cache service
    - to:
        - podSelector:
            matchLabels:
              app: cache-service
      ports:
        - port: 8080
          protocol: TCP
    # Allow connection to storage service
    - to:
        - podSelector:
            matchLabels:
              app: storage-service
      ports:
        - port: 8080
          protocol: TCP
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP

---
# Auth PostgreSQL Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-postgres
  namespace: default
  labels:
    app: auth-postgres
    component: database
    service: auth-service
    environment: kind-production
spec:
  podSelector:
    matchLabels:
      app: auth-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - protocol: TCP
          port: 5432
