# =============================================================================
# AUTH SERVICE SERVICES - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This file defines three types of Kubernetes Services for the Auth Service:
# 1. NodePort Service - External access for testing and development
# 2. ClusterIP Service - Internal metrics access
# 3. Headless Service - Direct pod communication for advanced use cases
#
# 🏗️ ARCHITECTURE:
# - NodePort (30083): External access for client authentication
# - ClusterIP (metrics): Internal monitoring and observability
# - Headless: Service discovery without load balancing
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - NodePort enables direct host access (localhost:30083)
# - Port mapping configured in kind-config.yaml
# - Internal services use Kubernetes DNS
#
# ⚠️ PRODUCTION DIFFERENCES:
# Production would use:
# - LoadBalancer or Ingress instead of NodePort
# - Service mesh for advanced traffic management
# - External load balancers with SSL termination
# =============================================================================

---
# 🌐 NODEPORT SERVICE - External Access
# Enables external access to the Auth Service for client applications
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
    component: authentication
    service-type: external
    environment: kind-production
  annotations:
    # 📝 Educational annotations
    education.microservices/purpose: "External access for authentication API"
    education.microservices/port-mapping: "localhost:30083 -> pod:8080"
    education.microservices/clients: "profile-service,external-apps"
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080        # Service port (internal)
      targetPort: 8080  # Container port
      nodePort: 30083   # External port (host access)
      protocol: TCP
  selector:
    app: auth-service

---
# 📊 CLUSTERIP SERVICE - Internal Metrics Access
# Provides internal access to metrics endpoint for monitoring
apiVersion: v1
kind: Service
metadata:
  name: auth-service-metrics
  labels:
    app: auth-service
    component: authentication
    service-type: metrics
    environment: kind-production
  annotations:
    # 📊 Prometheus discovery annotations
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
    
    # 📝 Educational annotations
    education.microservices/purpose: "Internal metrics collection"
    education.microservices/access: "prometheus,monitoring-tools"
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8081        # Service port
      targetPort: 8081  # Container metrics port
      protocol: TCP
  selector:
    app: auth-service

---
# 🔗 HEADLESS SERVICE - Direct Pod Communication
# Enables direct pod-to-pod communication without load balancing
apiVersion: v1
kind: Service
metadata:
  name: auth-service-headless
  labels:
    app: auth-service
    component: authentication
    service-type: headless
    environment: kind-production
  annotations:
    # 📝 Educational annotations
    education.microservices/purpose: "Direct pod access for service discovery"
    education.microservices/use-cases: "health-checks,debugging,service-mesh"
spec:
  type: ClusterIP
  clusterIP: None  # This makes it headless
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: auth-service
