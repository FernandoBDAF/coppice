# =============================================================================
# AUTH SERVICE SECRETS - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This Secret contains sensitive configuration for the Auth Service,
# including JWT signing keys and service authentication tokens.
#
# 🔐 SECURITY ARCHITECTURE:
# - JWT keys for token signing and verification
# - Service API keys for inter-service authentication
# - All values are base64 encoded for Kubernetes Secret storage
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Development-grade security (not production-ready)
# - Simplified key management for educational purposes
# - Pre-generated keys for consistent testing
#
# ⚠️ PRODUCTION DIFFERENCES:
# Production would have:
# - HSM-generated keys or external key management
# - Key rotation policies
# - Separate secrets per environment
# - Encrypted at rest with customer-managed keys
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  labels:
    app: auth-service
    component: authentication
    environment: kind-production
type: Opaque
data:
  # JWT Configuration (base64 encoded for development)
  # Original: development-jwt-secret
  JWT_SECRET: ZGV2ZWxvcG1lbnQtand0LXNlY3JldA==
  # Original: development-refresh-secret
  JWT_REFRESH_SECRET: ZGV2ZWxvcG1lbnQtcmVmcmVzaC1zZWNyZXQ=
  # Original: 3600 (1 hour)
  JWT_EXPIRATION: MzYwMA==
  # Original: 604800 (7 days)
  JWT_REFRESH_EXPIRATION: NjA0ODAw

  # Service Integration API Keys (base64 encoded)
  # Original: storage-api-key
  STORAGE_SERVICE_API_KEY: c3RvcmFnZS1hcGkta2V5
  # Original: cache-api-key
  CACHE_SERVICE_API_KEY: Y2FjaGUtYXBpLWtleQ==

  # Additional JWT Configuration for RS256
  # Original: auth-service-api-key
  SERVICE_API_KEY: YXV0aC1zZXJ2aWNlLWFwaS1rZXk=

  # JWT Algorithm specific secrets
  # Original: jwt-signing-key-dev
  JWT_SIGNING_KEY: and0LXNpZ25pbmcta2V5LWRldg==
  # Original: jwt-verification-key-dev
  JWT_VERIFICATION_KEY: and0LXZlcmlmaWNhdGlvbi1rZXktZGV2

---
# =============================================================================
# DEVELOPMENT CONFIGURATION MAP
# =============================================================================
# Additional non-sensitive configuration for development convenience

apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-dev-config
  labels:
    app: auth-service
    component: authentication
    environment: kind-production
data:
  # 🔧 DEVELOPMENT HELPERS
  ENABLE_REQUEST_LOGGING: "true"
  ENABLE_RESPONSE_LOGGING: "true"
  ENABLE_DEBUG_HEADERS: "true"

  # 🧪 TESTING CONFIGURATION
  ENABLE_TEST_ENDPOINTS: "true"
  TEST_USER_EMAIL: "test@example.com"
  TEST_USER_PASSWORD: "testpassword123"

  # 📝 DOCUMENTATION
  API_DOCS_ENABLED: "true"
  API_DOCS_PATH: "/docs"

  # 🔍 OBSERVABILITY
  ENABLE_DISTRIBUTED_TRACING: "false" # Disabled for Kind simplicity
  TRACE_SAMPLE_RATE: "0.1"
