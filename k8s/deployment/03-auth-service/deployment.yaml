# =============================================================================
# AUTH SERVICE DEPLOYMENT - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This Deployment manages the Auth Service pods, which provide JWT-based
# authentication and session management for the microservices ecosystem.
# The Auth Service acts as an orchestration layer, integrating with Storage
# and Cache services via HTTP APIs.
#
# 🏗️ ARCHITECTURE:
# The Auth Service is stateless and horizontally scalable:
# - No direct database connections (pure orchestration)
# - Integrates with Storage Service for user data
# - Uses Cache Service for session management
# - Implements circuit breaker patterns for resilience
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Single replica for simplicity (vs 3+ in production)
# - Reduced resource requests/limits for development
# - IfNotPresent image pull policy (faster deployments)
# - Debug logging enabled for educational purposes
# - Relaxed security context for development ease
#
# ⚠️ PRODUCTION DIFFERENCES:
# Production would have:
# - Multiple replicas with anti-affinity rules
# - Higher resource limits and requests
# - Stricter security contexts (non-root, read-only filesystem)
# - Production-grade health checks and monitoring
# - Horizontal Pod Autoscaler (HPA) configuration
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
    component: authentication
    tier: backend
    version: v1
    environment: kind-production
spec:
  # 🔄 REPLICA CONFIGURATION
  # Single replica for Kind development (vs 3+ for production HA)
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # Ensure zero-downtime updates

  # 🎯 POD SELECTION
  selector:
    matchLabels:
      app: auth-service

  # 📦 POD TEMPLATE
  template:
    metadata:
      labels:
        app: auth-service
        component: authentication
        tier: backend
        version: v1
        environment: kind-production
      annotations:
        # 📊 Prometheus metrics scraping configuration
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"

        # 📝 Educational annotations
        education.microservices/purpose: "JWT authentication and session management"
        education.microservices/dependencies: "storage-service,cache-service"
        education.microservices/architecture: "stateless-orchestration-layer"

    spec:
      # 🔐 POD-LEVEL SECURITY CONTEXT
      # Production-ready security context for authentication service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # nobody user
        runAsGroup: 65534 # nobody group
        fsGroup: 65534 # File system group

      # 📦 CONTAINERS
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent # Kind optimization

          # 🔐 CONTAINER-LEVEL SECURITY CONTEXT
          # Critical: Authentication service needs strict security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Auth service needs temp space for JWT processing
            capabilities:
              drop:
                - ALL # Drop all capabilities

          # 🌐 PORTS
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP

          # 🔧 ENVIRONMENT VARIABLES
          env:
            # 🗄️ Database Configuration
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-postgres-secret
                  key: password

            # 🌐 Service Integration Configuration
            - name: STORAGE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: STORAGE_SERVICE_URL
            - name: SERVICE_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SERVICE_TIMEOUT
            - name: SERVICE_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SERVICE_RETRIES

            # 🔄 Circuit Breaker Configuration
            - name: CIRCUIT_BREAKER_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: CIRCUIT_BREAKER_TIMEOUT
            - name: CIRCUIT_BREAKER_ERROR_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: CIRCUIT_BREAKER_ERROR_THRESHOLD
            - name: CIRCUIT_BREAKER_RESET_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: CIRCUIT_BREAKER_RESET_TIMEOUT

            # 🔒 Security Configuration
            - name: RATE_LIMIT_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: RATE_LIMIT_WINDOW_MS
            - name: RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: RATE_LIMIT_MAX_REQUESTS
            - name: ACCOUNT_LOCKOUT_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: ACCOUNT_LOCKOUT_ATTEMPTS
            - name: ACCOUNT_LOCKOUT_DURATION_MS
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: ACCOUNT_LOCKOUT_DURATION_MS

            # 🖥️ Server Configuration
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: HOST
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: LOG_LEVEL

            # 🔑 JWT Configuration
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_ALGORITHM
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_ISSUER
            - name: JWT_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_AUDIENCE
            - name: ACCESS_TOKEN_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: ACCESS_TOKEN_EXPIRY
            - name: REFRESH_TOKEN_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: REFRESH_TOKEN_EXPIRY

            # 🔐 JWT Secrets (Sensitive)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_REFRESH_SECRET
            - name: JWT_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_EXPIRATION
            - name: JWT_REFRESH_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_REFRESH_EXPIRATION

            # 🔐 Service Integration API Keys
            - name: STORAGE_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: STORAGE_SERVICE_API_KEY

            # 🔐 Service Authentication
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SERVICE_API_KEY
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_SIGNING_KEY
            - name: JWT_VERIFICATION_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_VERIFICATION_KEY

            # 📊 Metrics Configuration
            - name: METRICS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: METRICS_ENABLED
            - name: METRICS_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: METRICS_PREFIX
            - name: METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: METRICS_PORT

          # 🏥 HEALTH CHECKS
          # Kubernetes uses these to manage pod lifecycle
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 15 # Allow up to 30 seconds for startup
            successThreshold: 1

          # 💾 RESOURCE MANAGEMENT
          # Conservative limits for Kind development
          resources:
            requests:
              cpu: "100m" # 0.1 CPU cores
              memory: "128Mi" # 128 MB RAM
            limits:
              cpu: "200m" # 0.2 CPU cores max
              memory: "256Mi" # 256 MB RAM max

      # 🔄 POD MANAGEMENT
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

      # 📍 NODE SCHEDULING
      # Allow scheduling on any worker node
      nodeSelector:
        kubernetes.io/os: linux

      # 🏷️ TOLERATIONS
      # No special tolerations needed for auth service
      tolerations: []
