# =============================================================================
# POSTGRESQL STATEFULSET FOR STORAGE SERVICE
# =============================================================================
# 📚 EDUCATIONAL OVERVIEW:
# This PostgreSQL StatefulSet provides persistent data storage for the storage service.
# It includes user authentication data, application data, and other persistent information
# required by the microservices ecosystem.
#
# 🏗️ COMPONENTS:
# - ConfigMap: Database configuration and initialization scripts
# - StatefulSet: PostgreSQL database with persistent storage
# - ClusterIP Service: Internal database access for storage service
# - Headless Service: Direct pod access for administration
#
# 🔧 KIND OPTIMIZATIONS:
# - Single replica for development
# - Reduced resource requirements
# - Local persistent storage
# - Development-friendly configuration
# =============================================================================

# 📊 DATABASE CONFIGURATION
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  labels:
    app: postgres
    component: storage-backend
    environment: kind-production
data:
  POSTGRES_DB: profile_storage
  POSTGRES_USER: profile_user
  PGDATA: /var/lib/postgresql/data/pgdata

---
# 🗄️ DATABASE INITIALIZATION SCRIPT
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    app: postgres
    component: storage-backend
    environment: kind-production
data:
  init.sql: |
    -- Storage Service Database Schema
    -- This script initializes the database with tables for user authentication
    -- and profile management

    -- Create users table for authentication
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) NOT NULL UNIQUE,
        password_hash VARCHAR(255) NOT NULL,
        first_name VARCHAR(100),
        last_name VARCHAR(100),
        is_active BOOLEAN DEFAULT true,
        is_verified BOOLEAN DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Create user sessions table
    CREATE TABLE IF NOT EXISTS user_sessions (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        session_token VARCHAR(255) NOT NULL UNIQUE,
        expires_at TIMESTAMP WITH TIME ZONE NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Create profiles table (for profile management)
    CREATE TABLE IF NOT EXISTS profiles (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        first_name VARCHAR(100) NOT NULL,
        last_name VARCHAR(100) NOT NULL,
        email VARCHAR(255) NOT NULL UNIQUE,
        phone VARCHAR(20),
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Create addresses table
    CREATE TABLE IF NOT EXISTS addresses (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        profile_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
        street VARCHAR(255) NOT NULL,
        city VARCHAR(100) NOT NULL,
        state VARCHAR(100) NOT NULL,
        country VARCHAR(100) NOT NULL,
        postal_code VARCHAR(20) NOT NULL,
        is_primary BOOLEAN DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Create contacts table
    CREATE TABLE IF NOT EXISTS contacts (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        profile_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
        type VARCHAR(50) NOT NULL,
        value VARCHAR(255) NOT NULL,
        is_primary BOOLEAN DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Create application data table (generic key-value storage)
    CREATE TABLE IF NOT EXISTS app_data (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        key VARCHAR(255) NOT NULL,
        value JSONB,
        user_id UUID REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(key, user_id)
    );

    -- Create indexes for performance
    CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);
    CREATE INDEX IF NOT EXISTS idx_users_active ON users(is_active);
    CREATE INDEX IF NOT EXISTS idx_sessions_token ON user_sessions(session_token);
    CREATE INDEX IF NOT EXISTS idx_sessions_user_id ON user_sessions(user_id);
    CREATE INDEX IF NOT EXISTS idx_sessions_expires ON user_sessions(expires_at);
    CREATE INDEX IF NOT EXISTS idx_profiles_email ON profiles(email);
    CREATE INDEX IF NOT EXISTS idx_addresses_profile_id ON addresses(profile_id);
    CREATE INDEX IF NOT EXISTS idx_contacts_profile_id ON contacts(profile_id);
    CREATE INDEX IF NOT EXISTS idx_app_data_key ON app_data(key);
    CREATE INDEX IF NOT EXISTS idx_app_data_user_id ON app_data(user_id);

    -- Insert sample data for development/testing
    INSERT INTO users (email, password_hash, first_name, last_name, is_verified) 
    VALUES 
        ('admin@example.com', '$2a$10$example.hash.for.development', 'Admin', 'User', true),
        ('test@example.com', '$2a$10$example.hash.for.development', 'Test', 'User', true)
    ON CONFLICT (email) DO NOTHING;

    -- Insert sample profiles
    INSERT INTO profiles (first_name, last_name, email, phone) 
    VALUES 
        ('Admin', 'User', 'admin@example.com', '+1-555-0100'),
        ('Test', 'User', 'test@example.com', '+1-555-0101')
    ON CONFLICT (email) DO NOTHING;

    -- Grant permissions
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO profile_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO profile_user;

---
# 🗃️ POSTGRESQL STATEFULSET
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: postgres
    component: storage-backend
    environment: kind-production
spec:
  serviceName: postgres-headless
  replicas: 1 # Kind-optimized for development
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        component: storage-backend
        environment: kind-production
        version: "15"
      annotations:
        prometheus.io/scrape: "false" # PostgreSQL doesn't expose metrics by default
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent # Kind optimization
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            # Database configuration from ConfigMap
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: PGDATA
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: PGDATA
            # Password from secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: storage-service-secret
                  key: POSTGRES_PASSWORD
          # 🔍 HEALTH CHECKS
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          # 💾 RESOURCE LIMITS (Kind-optimized)
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          # 📁 VOLUME MOUNTS
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      # 📦 VOLUMES
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
  # 💾 PERSISTENT VOLUME CLAIM TEMPLATE
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
          component: storage-backend
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-storage # Kind local storage
        resources:
          requests:
            storage: 2Gi # Sufficient for development

---
# 🌐 POSTGRESQL CLUSTERIP SERVICE
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: postgres
    component: storage-backend
    environment: kind-production
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres

---
# 🔗 POSTGRESQL HEADLESS SERVICE
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  labels:
    app: postgres
    component: storage-backend
    environment: kind-production
spec:
  type: ClusterIP
  clusterIP: None # Headless service for StatefulSet
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres
