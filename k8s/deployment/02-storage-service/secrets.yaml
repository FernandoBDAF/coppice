# =============================================================================
# STORAGE SERVICE SECRETS - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
# 📚 EDUCATIONAL OVERVIEW:
# This file contains development secrets for the storage service.
# These are NOT production secrets - they are designed for Kind development
# clusters and educational purposes.
#
# 🔐 SECURITY NOTES:
# - All secrets use development values
# - PostgreSQL credentials match the StatefulSet configuration
# - JWT keys are for development only
# - Production deployments should use external secret management
#
# 🔧 KIND OPTIMIZATIONS:
# - Clear development values for debugging
# - Matches PostgreSQL configuration exactly
# - Includes comprehensive secret set for all service needs
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: storage-service-secret
  labels:
    app: storage-service
    component: storage
    environment: kind-production
type: Opaque
data:
  # 🗄️ POSTGRESQL CONFIGURATION
  # Database URL: postgresql://profile_user:profile_password@postgres-service:5432/profile_storage
  STORAGE_DATABASE_URL: cG9zdGdyZXNxbDovL3Byb2ZpbGVfdXNlcjpwcm9maWxlX3Bhc3N3b3JkQHBvc3RncmVzLXNlcnZpY2U6NTQzMi9wcm9maWxlX3N0b3JhZ2U=

  # Database password: profile_password
  POSTGRES_PASSWORD: cHJvZmlsZV9wYXNzd29yZA==

  # Database user: profile_user (matches StatefulSet config)
  POSTGRES_USER: cHJvZmlsZV91c2Vy

  # Database name: profile_storage (matches StatefulSet config)
  POSTGRES_DB: cHJvZmlsZV9zdG9yYWdl

  # 🔐 JWT AUTHENTICATION
  # JWT secret key: storage-service-jwt-secret-key-kind-dev-2024
  JWT_SECRET_KEY: c3RvcmFnZS1zZXJ2aWNlLWp3dC1zZWNyZXQta2V5LWtpbmQtZGV2LTIwMjQ=

  # API key for internal service communication: storage-api-key-kind-dev-12345
  API_KEY: c3RvcmFnZS1hcGkta2V5LWtpbmQtZGV2LTEyMzQ1

  # 🔒 ENCRYPTION KEYS
  # Encryption key for sensitive data: storage-encryption-key-kind-dev-2024
  ENCRYPTION_KEY: c3RvcmFnZS1lbmNyeXB0aW9uLWtleS1raW5kLWRldi0yMDI0

  # 🌐 SERVICE INTEGRATION
  # Cache service URL for integration (when auth service needs caching)
  CACHE_SERVICE_URL: aHR0cDovL2NhY2hlLXNlcnZpY2U6ODA4MA==

---
# 🛠️ ADDITIONAL CONFIGURATION FOR DEVELOPMENT
# This ConfigMap provides non-sensitive development configuration
# that complements the secrets above
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-service-dev-config
  labels:
    app: storage-service
    component: storage
    environment: kind-production
data:
  # 🔧 DEVELOPMENT SETTINGS
  ENVIRONMENT: "kind-production"
  LOG_LEVEL: "debug"
  DEBUG_MODE: "true"

  # 🌐 SERVICE DISCOVERY
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"

  # 📊 PERFORMANCE SETTINGS (Kind-optimized)
  DB_MAX_CONNECTIONS: "10"
  DB_CONNECTION_TIMEOUT: "30s"
  DB_IDLE_TIMEOUT: "300s"

  # 🔍 HEALTH CHECK CONFIGURATION
  HEALTH_CHECK_INTERVAL: "30s"
  READINESS_CHECK_TIMEOUT: "5s"

  # 📝 ADDITIONAL DEVELOPMENT CONFIG
  ENABLE_QUERY_LOGGING: "true"
  ENABLE_METRICS: "true"
  METRICS_PORT: "8081"
