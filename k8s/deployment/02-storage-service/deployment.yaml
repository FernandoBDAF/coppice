# =============================================================================
# STORAGE SERVICE DEPLOYMENT - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
# 📚 EDUCATIONAL OVERVIEW:
# This deployment runs the storage service optimized for Kind development clusters.
# The storage service provides persistent data storage capabilities including
# user authentication data, application data, and database operations.
#
# 🏗️ ARCHITECTURE:
# - Single replica for development efficiency
# - PostgreSQL backend integration
# - RESTful API on port 8080
# - gRPC API on port 9090
# - Metrics endpoint on port 8081
#
# 🔧 KIND OPTIMIZATIONS:
# - Reduced resource requirements
# - IfNotPresent image pull policy
# - Debug logging enabled
# - Development-friendly configuration
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  labels:
    app: storage-service
    component: storage
    environment: kind-production
    version: v1.0.0
spec:
  replicas: 1 # Kind-optimized for development
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
        component: storage
        environment: kind-production
        version: v1.0.0
      annotations:
        # 📊 PROMETHEUS METRICS ANNOTATIONS
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
        # 🔄 RESTART POLICY
        kubectl.kubernetes.io/restartedAt: ""
    spec:
      # 🔐 SERVICE ACCOUNT (using default for Kind simplicity)
      serviceAccountName: default

      # 🔐 POD-LEVEL SECURITY CONTEXT
      # Run as non-root user for security compliance
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # nobody user
        runAsGroup: 65534 # nobody group
        fsGroup: 65534 # File system group

      # 🚀 CONTAINERS
      containers:
        - name: storage-service
          image: storage-service:latest
          imagePullPolicy: IfNotPresent # Kind optimization

          # 🌐 PORTS
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP

          # 🌍 ENVIRONMENT VARIABLES
          env:
            # 🔧 BASIC SERVICE CONFIGURATION
            - name: ENV
              value: "kind-production"
            - name: LOG_LEVEL
              value: "debug"
            - name: LOG_ENVIRONMENT
              value: "development"
            - name: SERVICE_NAME
              value: "storage-service"

            # 📊 SERVER CONFIGURATION
            - name: SERVER_PORT
              value: "8080"

            # 🗄️ DATABASE CONFIGURATION (Correct variable names)
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "profile_storage"
            - name: DB_USER
              value: "profile_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: storage-service-secret
                  key: POSTGRES_PASSWORD

            # 🔐 AUTHENTICATION CONFIGURATION
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: storage-service-secret
                  key: JWT_SECRET_KEY
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: storage-service-secret
                  key: API_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: storage-service-secret
                  key: ENCRYPTION_KEY

            # 🌐 SERVICE INTEGRATION
            - name: CACHE_SERVICE_URL
              value: "http://cache-service:8080"
            - name: ENABLE_CACHE_INTEGRATION
              value: "true"

            # 📊 DATABASE CONNECTION POOL (Kind-optimized)
            - name: DB_MAX_OPEN_CONNS
              value: "10"
            - name: DB_MAX_IDLE_CONNS
              value: "2"
            - name: DB_CONN_MAX_LIFETIME
              value: "30m"
            - name: DB_CONN_MAX_IDLE_TIME
              value: "5m"

            # 🔍 HEALTH CHECK CONFIGURATION
            - name: HEALTH_CHECK_INTERVAL
              value: "30s"
            - name: HEALTH_CHECK_TIMEOUT
              value: "5s"

            # 🚫 DISABLE QUEUE FOR NOW (since we haven't deployed RabbitMQ yet)
            - name: QUEUE_ENABLED
              value: "false"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@localhost:5672/" # Placeholder

          # 🔍 HEALTH CHECKS
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
            successThreshold: 1

          # 💾 RESOURCE LIMITS (Kind-optimized)
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          # 🔐 CONTAINER-LEVEL SECURITY CONTEXT
          # Enhanced security context for data storage service
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Storage service needs writable filesystem for data operations
            runAsNonRoot: true
            runAsUser: 65534 # nobody user (standardized)
            capabilities:
              drop:
                - ALL # Drop all capabilities

      # 🔄 POD RESTART POLICY
      restartPolicy: Always

      # 📍 NODE SELECTION (optional for Kind)
      nodeSelector:
        node-type: application # Prefer application nodes if available

      # 🕒 TERMINATION GRACE PERIOD
      terminationGracePeriodSeconds: 30
