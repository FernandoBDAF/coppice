# =============================================================================
# STORAGE SERVICE CONFIGMAP - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
# 📚 EDUCATIONAL OVERVIEW:
# This ConfigMap provides configuration for the storage service optimized
# for Kind development clusters. It includes database connection settings,
# server configuration, and debugging options.
#
# 🔧 KIND OPTIMIZATIONS:
# - Debug logging enabled for development
# - Reduced connection pools for resource efficiency
# - Development-friendly timeouts
# - PostgreSQL-specific settings for StatefulSet integration
#
# 🌐 SERVICE INTEGRATION:
# - Configured to connect to postgres-service
# - Prepared for cache service integration
# - Metrics enabled for monitoring
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-service-config
  labels:
    app: storage-service
    component: storage
    environment: kind-production
data:
  # 📊 MAIN SERVICE CONFIGURATION
  config.yaml: |
    # 🌐 SERVER CONFIGURATION
    server:
      host: "0.0.0.0"
      port: 8080
      grpc_port: 9090
      read_timeout: 30s
      write_timeout: 30s
      idle_timeout: 120s
      shutdown_timeout: 30s
      max_header_bytes: 1048576  # 1MB

    # 🗄️ DATABASE CONFIGURATION (PostgreSQL)
    database:
      host: "postgres-service"
      port: 5432
      database: "storage"
      user: "storage_user"
      # password comes from secret
      max_connections: 10        # Kind-optimized (reduced from production)
      idle_connections: 2        # Kind-optimized
      max_lifetime: 1800s        # 30 minutes
      connection_timeout: 30s
      query_timeout: 30s
      migration_timeout: 300s    # 5 minutes for schema migrations
      ssl_mode: "disable"        # Development only - enable in production
      log_queries: true          # Debug logging enabled

    # 🔍 HEALTH CHECK CONFIGURATION
    health:
      check_interval: 30s
      timeout: 5s
      database_ping_timeout: 10s
      
    # 📊 METRICS CONFIGURATION
    metrics:
      enabled: true
      port: 8081                 # Separate port for metrics
      path: "/metrics"
      collection_interval: 15s
      include_database_metrics: true
      include_request_metrics: true

    # 📝 LOGGING CONFIGURATION
    logging:
      level: "debug"             # Kind development logging
      format: "json"
      output: "stdout"
      include_caller: true
      development: true
      
    # 🌐 SERVICE DISCOVERY
    services:
      cache_service:
        url: "http://cache-service:8080"
        timeout: 10s
        max_retries: 3
        
    # 🔧 DEVELOPMENT SETTINGS
    development:
      enable_cors: true
      cors_origins: ["*"]        # Development only
      enable_debug_endpoints: true
      log_requests: true
      pretty_json: true

  # 🗄️ DATABASE ENVIRONMENT VARIABLES
  STORAGE_SERVER_HTTP_PORT: "8080"
  STORAGE_SERVER_GRPC_PORT: "9090"
  STORAGE_POSTGRES_HOST: "postgres-service"
  STORAGE_POSTGRES_PORT: "5432"
  STORAGE_POSTGRES_DATABASE: "storage"
  STORAGE_POSTGRES_USER: "storage_user"
  STORAGE_LOGGING_LEVEL: "debug"
  STORAGE_LOGGING_DEVELOPMENT: "true"
  STORAGE_METRICS_ENABLED: "true"
  STORAGE_METRICS_PORT: "8081"

  # 🌐 SERVICE INTEGRATION SETTINGS
  CACHE_SERVICE_URL: "http://cache-service:8080"
  ENABLE_CACHE_INTEGRATION: "true"

  # 🔧 KIND-SPECIFIC OPTIMIZATIONS
  DB_MAX_CONNECTIONS: "10"
  DB_IDLE_CONNECTIONS: "2"
  ENABLE_QUERY_LOGGING: "true"
  CORS_ENABLED: "true"
