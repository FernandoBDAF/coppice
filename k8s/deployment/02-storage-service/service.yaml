# =============================================================================
# STORAGE SERVICE SERVICES - KIND DEVELOPMENT ENVIRONMENT
# =============================================================================
# 📚 EDUCATIONAL OVERVIEW:
# This file defines multiple services for the storage service to handle
# different types of access patterns:
# - NodePort: External access for testing and development
# - ClusterIP: Internal metrics access
# - Headless: Direct pod access for advanced use cases
#
# 🌐 SERVICE ARCHITECTURE:
# - NodePort 30082: External HTTP/gRPC API access
# - ClusterIP metrics: Internal monitoring access
# - Headless: Service discovery and direct pod access
#
# 🔧 KIND OPTIMIZATIONS:
# - NodePort mapping for localhost access
# - Separate metrics service for monitoring
# - Educational annotations and labels
# =============================================================================

# 🌐 STORAGE SERVICE NODEPORT (External Access)
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  labels:
    app: storage-service
    component: storage
    environment: kind-production
    service-type: nodeport
  annotations:
    description: "Storage service external access via NodePort 30082"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb" # For future cloud deployment
spec:
  type: NodePort
  ports:
    # 🌐 HTTP API PORT
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30082 # Fixed NodePort for storage service
      protocol: TCP
    # 📡 GRPC API PORT
    - name: grpc
      port: 9090
      targetPort: 50052
      nodePort: 30092 # Additional NodePort for gRPC
      protocol: TCP
  selector:
    app: storage-service

---
# 📊 STORAGE SERVICE METRICS (Internal Access)
apiVersion: v1
kind: Service
metadata:
  name: storage-service-metrics
  labels:
    app: storage-service
    component: storage
    environment: kind-production
    service-type: metrics
  annotations:
    description: "Storage service metrics endpoint (ClusterIP only)"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    # 📊 METRICS PORT
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: storage-service

---
# 🔗 STORAGE SERVICE HEADLESS (Direct Pod Access)
apiVersion: v1
kind: Service
metadata:
  name: storage-service-headless
  labels:
    app: storage-service
    component: storage
    environment: kind-production
    service-type: headless
  annotations:
    description: "Storage service headless service for direct pod access"
spec:
  type: ClusterIP
  clusterIP: None # Headless service
  ports:
    # 🌐 HTTP API PORT
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    # 📡 GRPC API PORT
    - name: grpc
      port: 9090
      targetPort: 50052
      protocol: TCP
    # 📊 METRICS PORT
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: storage-service

---
