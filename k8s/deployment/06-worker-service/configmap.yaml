apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-service-config
  labels:
    app: worker-service
    component: worker
    environment: kind-production
  annotations:
    description: "Configuration for Worker Service (Email and Image workers)"
data:
  # 🎯 MULTI-WORKER CONFIGURATION

  # Email Worker Configuration
  EMAIL_WORKER_ENABLED: "true"
  EMAIL_QUEUE_NAME: "email-processing"
  EMAIL_EXCHANGE_NAME: "email-tasks"
  EMAIL_ROUTING_KEY: "email.send"
  EMAIL_PREFETCH_COUNT: "5" # Higher throughput for burst processing
  EMAIL_BATCH_SIZE: "10" # Process multiple emails in batch
  EMAIL_RETRY_ATTEMPTS: "3"
  EMAIL_RETRY_DELAY: "5s"

  # Image Worker Configuration
  IMAGE_WORKER_ENABLED: "true"
  IMAGE_QUEUE_NAME: "image-processing"
  IMAGE_EXCHANGE_NAME: "image-tasks"
  IMAGE_ROUTING_KEY: "image.process"
  IMAGE_PREFETCH_COUNT: "1" # Resource-intensive: one at a time
  IMAGE_BATCH_SIZE: "1" # Process one image at a time
  IMAGE_RETRY_ATTEMPTS: "2"
  IMAGE_RETRY_DELAY: "10s"

  # 🔗 RABBITMQ CONNECTION CONFIGURATION
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  RABBITMQ_CONNECTION_TIMEOUT: "30s"
  RABBITMQ_HEARTBEAT: "60s"
  RABBITMQ_RECONNECT_DELAY: "5s"
  RABBITMQ_MAX_RECONNECT_ATTEMPTS: "10"

  # 📧 EMAIL SERVICE CONFIGURATION
  SMTP_HOST: "smtp.example.com" # Development SMTP server
  SMTP_PORT: "587"
  SMTP_USE_TLS: "true"
  SMTP_USE_STARTTLS: "true"
  SMTP_TIMEOUT: "30s"
  SMTP_FROM_NAME: "Kind Microservices"
  SMTP_FROM_EMAIL: "noreply@kind-microservices.local"

  # Email Templates
  EMAIL_TEMPLATE_DIR: "/app/templates"
  EMAIL_DEFAULT_TEMPLATE: "default"
  EMAIL_WELCOME_TEMPLATE: "welcome"
  EMAIL_NOTIFICATION_TEMPLATE: "notification"
  EMAIL_ALERT_TEMPLATE: "alert"

  # 🖼️ IMAGE PROCESSING CONFIGURATION
  MAX_IMAGE_SIZE: "10485760" # 10MB in bytes
  SUPPORTED_FORMATS: "jpg,jpeg,png,gif,webp,bmp,tiff"
  IMAGE_QUALITY: "85" # JPEG quality (1-100)
  IMAGE_COMPRESSION: "true"

  # Image Processing Limits
  MAX_WIDTH: "4096"
  MAX_HEIGHT: "4096"
  MIN_WIDTH: "1"
  MIN_HEIGHT: "1"

  # Image Operations
  RESIZE_ALGORITHM: "lanczos" # lanczos, bilinear, bicubic
  THUMBNAIL_SIZES: "150x150,300x300,600x600"
  WATERMARK_ENABLED: "false"

  # 📊 MONITORING AND METRICS CONFIGURATION
  METRICS_ENABLED: "true"
  METRICS_PORT: "8080"
  METRICS_PATH: "/metrics"
  METRICS_NAMESPACE: "worker_service"

  # Health Check Configuration
  HEALTH_CHECK_ENABLED: "true"
  HEALTH_CHECK_PORT: "8080"
  HEALTH_CHECK_PATH: "/health"
  READINESS_CHECK_PATH: "/ready"

  # 📝 LOGGING CONFIGURATION
  LOG_LEVEL: "debug" # Kind-optimized: Debug logging
  LOG_FORMAT: "json" # Structured logging
  LOG_OUTPUT: "stdout" # Console output for kubectl logs
  LOG_TIMESTAMP_FORMAT: "rfc3339"

  # Log Rotation (for file logging if enabled)
  LOG_MAX_SIZE: "100" # 100MB
  LOG_MAX_BACKUPS: "3"
  LOG_MAX_AGE: "7" # 7 days
  LOG_COMPRESS: "true"

  # 🔧 PERFORMANCE TUNING

  # Worker Pool Configuration
  EMAIL_WORKER_POOL_SIZE: "5" # Number of goroutines for email processing
  IMAGE_WORKER_POOL_SIZE: "2" # Number of goroutines for image processing

  # Queue Consumer Configuration
  CONSUMER_TIMEOUT: "30s"
  CONSUMER_CANCEL_ON_TIMEOUT: "true"
  PREFETCH_GLOBAL: "false" # Per-consumer prefetch

  # Memory Management
  GC_PERCENT: "100" # Go garbage collection target
  MAX_MEMORY_USAGE: "80" # Percentage of container limit

  # 🛡️ SECURITY CONFIGURATION

  # TLS Configuration
  TLS_ENABLED: "false" # Kind-optimized: Disable TLS for development
  TLS_CERT_FILE: "/certs/tls.crt"
  TLS_KEY_FILE: "/certs/tls.key"
  TLS_CA_FILE: "/certs/ca.crt"

  # Authentication
  API_KEY_REQUIRED: "false" # Kind-optimized: Disable API key for development
  JWT_VALIDATION_ENABLED: "false" # Kind-optimized: Disable JWT validation

  # 🔄 GRACEFUL SHUTDOWN CONFIGURATION
  SHUTDOWN_TIMEOUT: "30s" # Maximum time to wait for graceful shutdown
  SHUTDOWN_DELAY: "5s" # Delay before starting shutdown
  DRAIN_TIMEOUT: "20s" # Time to drain existing connections

  # Signal Handling
  HANDLE_SIGTERM: "true"
  HANDLE_SIGINT: "true"
  HANDLE_SIGUSR1: "true" # Custom signal for log rotation

  # 🧪 KIND-SPECIFIC DEVELOPMENT SETTINGS

  # Development Features
  DEV_MODE: "true" # Enable development features
  DEBUG_ENDPOINTS: "true" # Enable debug HTTP endpoints
  PPROF_ENABLED: "true" # Enable Go profiling endpoints
  PPROF_PORT: "6060"

  # Mock Services (for testing without external dependencies)
  MOCK_SMTP_ENABLED: "true" # Use mock SMTP for development
  MOCK_IMAGE_PROCESSING: "false" # Use real image processing

  # Testing Configuration
  TEST_MODE: "false"
  TEST_QUEUE_CLEANUP: "true" # Clean up test queues on startup

  # 📈 SCALING CONFIGURATION

  # Auto-scaling Hints (for future HPA implementation)
  TARGET_CPU_UTILIZATION: "70"
  TARGET_MEMORY_UTILIZATION: "80"
  MIN_REPLICAS: "1" # Kind-optimized: Minimum replicas
  MAX_REPLICAS: "3" # Kind-optimized: Maximum replicas

  # Queue-based scaling thresholds
  EMAIL_QUEUE_THRESHOLD: "50" # Scale up when queue has 50+ messages
  IMAGE_QUEUE_THRESHOLD: "10" # Scale up when queue has 10+ messages

  # 🎨 FEATURE FLAGS

  # Email Features
  EMAIL_HTML_ENABLED: "true"
  EMAIL_ATTACHMENTS_ENABLED: "true"
  EMAIL_TRACKING_ENABLED: "false" # Disable tracking for development
  EMAIL_BOUNCE_HANDLING: "false" # Disable bounce handling for development

  # Image Features
  IMAGE_FACE_DETECTION: "false" # Disable AI features for development
  IMAGE_OCR_ENABLED: "false" # Disable OCR for development
  IMAGE_METADATA_EXTRACTION: "true"
  IMAGE_EXIF_STRIPPING: "true" # Strip EXIF data for privacy

  # 📍 SERVICE DISCOVERY

  # Internal Service URLs
  QUEUE_SERVICE_URL: "http://queue-service:8080"
  PROFILE_SERVICE_URL: "http://profile-service:8080"
  CACHE_SERVICE_URL: "http://cache-service:8080"
  STORAGE_SERVICE_URL: "http://storage-service:8080"

  # External Service URLs (for notifications)
  WEBHOOK_BASE_URL: "http://localhost:30085" # Profile service for callbacks

  # 🔍 OBSERVABILITY

  # Tracing Configuration
  TRACING_ENABLED: "false" # Kind-optimized: Disable tracing
  JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
  TRACE_SAMPLE_RATE: "0.1" # 10% sampling rate

  # Metrics Labels
  SERVICE_NAME: "worker-service"
  SERVICE_VERSION: "v1.0.0"
  ENVIRONMENT: "kind-production"
  CLUSTER_NAME: "microservices-kind"
