apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-email-worker
  labels:
    app: email-worker
    component: worker
    environment: kind-production
spec:
  podSelector:
    matchLabels:
      app: email-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow health check traffic
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
    # Allow connection to RabbitMQ
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672
          protocol: TCP
        - port: 15672
          protocol: TCP
    # Allow connection to Queue Service
    - to:
        - podSelector:
            matchLabels:
              app: queue-service
      ports:
        - port: 8080
          protocol: TCP
    # Allow connection to Cache Service (for caching)
    - to:
        - podSelector:
            matchLabels:
              app: cache-service
      ports:
        - port: 8080
          protocol: TCP
    # Allow connection to Storage Service (for data)
    - to:
        - podSelector:
            matchLabels:
              app: storage-service
      ports:
        - port: 8080
          protocol: TCP

