apiVersion: v1
kind: Service
metadata:
  name: email-worker-service
  labels:
    app: email-worker
    component: worker
    worker-type: email
    environment: kind-production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
    description: "Email worker service for health checks and metrics"
spec:
  type: NodePort
  selector:
    app: email-worker
    worker-type: email
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30086 # External access port for Email Worker
      protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: image-worker-service
  labels:
    app: image-worker
    component: worker
    worker-type: image
    environment: kind-production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
    description: "Image worker service for health checks and metrics"
spec:
  type: NodePort
  selector:
    app: image-worker
    worker-type: image
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30087 # External access port for Image Worker (using next available port)
      protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: worker-service-metrics
  labels:
    app: worker-service
    component: worker
    service-type: metrics
    environment: kind-production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
    description: "Aggregated metrics service for all workers"
spec:
  type: ClusterIP
  selector:
    component: worker # Selects both email and image workers
  ports:
    - name: metrics
      port: 8081
      targetPort: 8080
      protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: worker-service-headless
  labels:
    app: worker-service
    component: worker
    service-type: headless
    environment: kind-production
  annotations:
    description: "Headless service for worker service discovery"
spec:
  type: ClusterIP
  clusterIP: None # Headless service
  selector:
    component: worker # Selects both email and image workers
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  publishNotReadyAddresses: true # Include not-ready pods for discovery
