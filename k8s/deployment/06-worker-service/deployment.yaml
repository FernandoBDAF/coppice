apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-worker
  labels:
    app: email-worker
    component: worker
    worker-type: email
    environment: kind-production
    version: v1.0.0
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Email processing worker for asynchronous email notifications"
spec:
  replicas: 1 # Kind-optimized: Single replica for development
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: email-worker
      worker-type: email
  template:
    metadata:
      labels:
        app: email-worker
        component: worker
        worker-type: email
        environment: kind-production
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        description: "Email worker pod processing email notification tasks"
    spec:
      # Security context for non-root execution
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Restart policy
      restartPolicy: Always

      # DNS policy for service discovery
      dnsPolicy: ClusterFirst

      containers:
        - name: email-worker
          image: email-worker:latest
          imagePullPolicy: IfNotPresent # Kind-optimized: Local images

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Environment variables for worker configuration
          env:
            # Worker-specific configuration
            - name: WORKER_TYPE
              value: "email"
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # Queue configuration
            - name: QUEUE_NAME
              value: "email-processing"
            - name: EXCHANGE_NAME
              value: "email-tasks"
            - name: ROUTING_KEY
              value: "email.send"
            - name: PREFETCH_COUNT
              value: "5" # Higher throughput for email processing

            # RabbitMQ connection (via Queue Service)
            - name: RABBITMQ_HOST
              value: "rabbitmq-service"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_VHOST
              value: "queue_vhost"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: worker-service-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worker-service-secrets
                  key: RABBITMQ_PASSWORD

            # HTTP server configuration
            - name: HTTP_PORT
              value: "8080"
            - name: HTTP_HOST
              value: "0.0.0.0"

            # Logging configuration
            - name: LOG_LEVEL
              value: "debug" # Kind-optimized: Debug logging
            - name: LOG_FORMAT
              value: "json"
            - name: ENV
              value: "kind-production"

            # Monitoring and metrics
            - name: METRICS_ENABLED
              value: "true"
            - name: METRICS_PORT
              value: "8080"
            - name: METRICS_PATH
              value: "/metrics"

            # Email service configuration (for processing)
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: worker-service-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: worker-service-config
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: worker-service-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worker-service-secrets
                  key: SMTP_PASSWORD

          # Resource management (Kind-optimized)
          resources:
            requests:
              memory: "64Mi" # Minimal for email processing
              cpu: "50m" # Low CPU for I/O-bound tasks
            limits:
              memory: "128Mi" # Conservative limit
              cpu: "100m" # Burst capacity

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
            successThreshold: 1

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop:
                - ALL

          # Volume mounts for temporary files
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-tmp
              mountPath: /var/tmp

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var-tmp
          emptyDir: {}

      # Node affinity (optional for Kind)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values: ["application"]

      # Tolerations for node taints
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30

