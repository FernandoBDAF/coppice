# =============================================================================
# PROFILE SERVICE SERVICES FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This file defines three types of services for the Profile Service:
# 1. NodePort service for external access (development/testing)
# 2. ClusterIP service for metrics collection (Prometheus)
# 3. Headless service for service discovery and direct pod communication
#
# 🏗️ ARCHITECTURE:
# External Clients → NodePort (30085) → Profile Service Pods
# Prometheus → ClusterIP (8081) → Metrics Endpoint
# Service Discovery → Headless Service → Direct Pod IPs
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - NodePort 30085 mapped in Kind cluster configuration
# - Metrics service separated for monitoring isolation
# - Headless service enables direct pod-to-pod communication
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use LoadBalancer or Ingress instead of NodePort
# - Additional security policies and service mesh integration
# - Advanced traffic routing and canary deployment support
# =============================================================================

# 🌐 NODEPORT SERVICE: External access for development and testing
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  labels:
    app: profile-service
    component: orchestrator
    environment: kind-production
  annotations:
    # 📊 SERVICE MONITORING: Enable service-level metrics
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: NodePort
  selector:
    app: profile-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30085 # External access port for Profile Service
      protocol: TCP
  sessionAffinity: None

---
# 📊 METRICS SERVICE: Dedicated ClusterIP for Prometheus metrics collection
apiVersion: v1
kind: Service
metadata:
  name: profile-service-metrics
  labels:
    app: profile-service
    component: metrics
    environment: kind-production
  annotations:
    # 📈 METRICS CONFIGURATION: Prometheus scraping configuration
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: profile-service
  ports:
    - name: metrics
      port: 8081
      targetPort: 8080 # Profile service exposes metrics on main port
      protocol: TCP

---
# 🔍 HEADLESS SERVICE: Service discovery and direct pod communication
apiVersion: v1
kind: Service
metadata:
  name: profile-service-headless
  labels:
    app: profile-service
    component: discovery
    environment: kind-production
spec:
  type: ClusterIP
  clusterIP: None # Headless service for direct pod access
  selector:
    app: profile-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: 8080
      protocol: TCP
  publishNotReadyAddresses: false # Only route to ready pods
