# =============================================================================
# PROFILE SERVICE CONFIGURATION FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This ConfigMap provides non-sensitive configuration for the Profile Service,
# including multi-worker routing configuration, service integration settings,
# task processing parameters, and performance tuning optimized for Kind development.
#
# 🏗️ ARCHITECTURE:
# Profile Service reads these values to configure:
# - Multi-worker task routing (profile.task, email.send, image.process)
# - Service integration timeouts and retry policies
# - Caching strategies and TTL values
# - Performance and monitoring settings
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Shorter timeouts for faster development feedback
# - Reduced resource limits for local development
# - Debug-friendly TTL values for task inspection
# - Development-optimized retry strategies
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use longer timeouts and higher resource limits
# - More aggressive retry strategies and circuit breaker settings
# - Production-grade monitoring and alerting configuration
# - Environment-specific service discovery settings
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-service-config
  labels:
    app: profile-service
    component: orchestrator
    environment: kind-production
data:
  # 🎯 MULTI-WORKER ROUTING CONFIGURATION
  # Routing keys for different worker types in the ecosystem
  ROUTING_KEY_PROFILE_UPDATE: "profile.task"
  ROUTING_KEY_EMAIL_NOTIFICATION: "email.send"
  ROUTING_KEY_IMAGE_PROCESSING: "image.process"
  ROUTING_KEY_DEFAULT_FALLBACK: "profile.task"

  # Task type configuration for validation
  SUPPORTED_TASK_TYPES: "profile_update,email_notification,image_processing"
  TASK_VALIDATION_ENABLED: "true"
  TASK_PAYLOAD_VALIDATION_ENABLED: "true"

  # 📊 PERFORMANCE CONFIGURATION (Kind-optimized)
  # Targets adjusted for development environment
  API_RESPONSE_TIME_THRESHOLD: "100ms" # Relaxed for development
  QUEUE_COMMUNICATION_THRESHOLD: "200ms" # Relaxed for development
  ERROR_RATE_THRESHOLD: "0.05" # 5% error rate acceptable in development
  THROUGHPUT_TARGET: "100" # Lower target for Kind environment

  # 🔄 QUEUE SERVICE INTEGRATION
  # Configuration for Queue Service communication
  QUEUE_SERVICE_HEALTH_CHECK_INTERVAL: "30s"
  QUEUE_SERVICE_CONNECTION_POOL_SIZE: "5" # Reduced for development
  QUEUE_SERVICE_KEEP_ALIVE_ENABLED: "true"
  QUEUE_SERVICE_MAX_RETRIES: "3"
  QUEUE_SERVICE_RETRY_DELAY: "1s"

  # 📨 MESSAGE FORMAT CONFIGURATION
  MESSAGE_FORMAT_VERSION: "v2.0"
  MESSAGE_PAYLOAD_TYPE: "json.RawMessage"
  MESSAGE_TIMESTAMP_FORMAT: "RFC3339"
  MESSAGE_METADATA_ENABLED: "true"

  # 🔧 MULTI-WORKER TASK PROCESSING
  TASK_PROCESSING_ENABLED: "true"
  TASK_ROUTING_ENABLED: "true"
  TASK_FALLBACK_ENABLED: "true"

  # Profile Worker Configuration
  PROFILE_WORKER_ENABLED: "true"
  PROFILE_WORKER_QUEUE: "profile-processing"
  PROFILE_WORKER_ROUTING_KEY: "profile.task"
  PROFILE_WORKER_TIMEOUT: "2m" # Reduced for Kind
  PROFILE_WORKER_RETRY_ATTEMPTS: "3"

  # Email Worker Configuration
  EMAIL_WORKER_ENABLED: "true"
  EMAIL_WORKER_QUEUE: "email-processing"
  EMAIL_WORKER_ROUTING_KEY: "email.send"
  EMAIL_WORKER_TIMEOUT: "1m" # Reduced for Kind
  EMAIL_WORKER_RETRY_ATTEMPTS: "3"
  EMAIL_TEMPLATES_SUPPORTED: "welcome,profile_updated,password_reset,notification"

  # Image Worker Configuration
  IMAGE_WORKER_ENABLED: "true"
  IMAGE_WORKER_QUEUE: "image-processing"
  IMAGE_WORKER_ROUTING_KEY: "image.process"
  IMAGE_WORKER_TIMEOUT: "3m" # Reduced for Kind
  IMAGE_WORKER_RETRY_ATTEMPTS: "2"
  IMAGE_FORMATS_SUPPORTED: "jpeg,jpg,png,webp,gif"
  IMAGE_MAX_SIZE: "5MB" # Reduced for development
  IMAGE_OPERATIONS_SUPPORTED: "resize,compress,convert,crop"

  # 🏥 HEALTH CHECK CONFIGURATION
  HEALTH_CHECK_ENABLED: "true"
  HEALTH_CHECK_DEPENDENCIES_ENABLED: "true"
  HEALTH_CHECK_QUEUE_SERVICE_ENABLED: "true"
  HEALTH_CHECK_STORAGE_SERVICE_ENABLED: "true"
  HEALTH_CHECK_AUTH_SERVICE_ENABLED: "true"
  HEALTH_CHECK_CACHE_SERVICE_ENABLED: "true"
  HEALTH_CHECK_TIMEOUT: "5s"
  HEALTH_CHECK_INTERVAL: "30s"

  # 📈 MONITORING AND METRICS
  PROMETHEUS_METRICS_ENABLED: "true"
  PROMETHEUS_METRICS_PORT: "8080"
  PROMETHEUS_METRICS_PATH: "/metrics"
  METRICS_TASK_DISTRIBUTION_ENABLED: "true"
  METRICS_ROUTING_KEY_DISTRIBUTION_ENABLED: "true"
  METRICS_QUEUE_COMMUNICATION_ENABLED: "true"
  METRICS_API_PERFORMANCE_ENABLED: "true"

  # 📝 STRUCTURED LOGGING
  LOG_STRUCTURED_ENABLED: "true"
  LOG_INCLUDE_TRACE_ID: "true"
  LOG_INCLUDE_CORRELATION_ID: "true"
  LOG_INCLUDE_ROUTING_KEY: "true"
  LOG_INCLUDE_TASK_TYPE: "true"
  LOG_INCLUDE_PERFORMANCE_METRICS: "true"

  # 🔒 SECURITY CONFIGURATION
  # Rate limiting configuration (relaxed for development)
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_GLOBAL_RPM: "1000" # Requests per minute
  RATE_LIMIT_PER_USER_RPM: "100"
  RATE_LIMIT_TASK_SUBMISSION_RPM: "50"
  RATE_LIMIT_BURST_SIZE: "20"

  # JWT Configuration (non-sensitive)
  JWT_ALGORITHM: "RS256"
  JWT_ISSUER: "profile-service"
  JWT_AUDIENCE: "microservices-ecosystem"
  JWT_ACCESS_TOKEN_EXPIRY: "1h"
  JWT_REFRESH_TOKEN_EXPIRY: "24h"

  # 🎛️ CIRCUIT BREAKER CONFIGURATION
  # Circuit breaker settings for service dependencies
  CIRCUIT_BREAKER_ENABLED: "true"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_RESET_TIMEOUT: "30s"
  CIRCUIT_BREAKER_TIMEOUT: "10s"
  CIRCUIT_BREAKER_MAX_REQUESTS: "3"

  # Service-specific circuit breaker settings
  QUEUE_SERVICE_CIRCUIT_BREAKER_ENABLED: "true"
  STORAGE_SERVICE_CIRCUIT_BREAKER_ENABLED: "true"
  AUTH_SERVICE_CIRCUIT_BREAKER_ENABLED: "true"
  CACHE_SERVICE_CIRCUIT_BREAKER_ENABLED: "true"

  # 📦 CACHING CONFIGURATION
  # Cache settings for different data types
  CACHE_ENABLED: "true"
  CACHE_DEFAULT_TTL: "30m"
  CACHE_PROFILE_TTL: "30m" # Shorter for development
  CACHE_SESSION_TTL: "2h" # Shorter for development
  CACHE_TASK_TTL: "15m" # Shorter for development
  CACHE_AUTH_TOKEN_TTL: "15m" # Shorter for development

  # Cache invalidation settings
  CACHE_INVALIDATION_ENABLED: "true"
  CACHE_INVALIDATION_ON_UPDATE: "true"
  CACHE_INVALIDATION_ON_DELETE: "true"

  # 🔄 RETRY CONFIGURATION
  # Retry policies for different operations
  RETRY_ENABLED: "true"
  RETRY_MAX_ATTEMPTS: "3"
  RETRY_INITIAL_DELAY: "1s"
  RETRY_MAX_DELAY: "10s"
  RETRY_BACKOFF_MULTIPLIER: "2"

  # Service-specific retry settings
  QUEUE_SERVICE_RETRY_ENABLED: "true"
  STORAGE_SERVICE_RETRY_ENABLED: "true"
  AUTH_SERVICE_RETRY_ENABLED: "true"
  CACHE_SERVICE_RETRY_ENABLED: "true"

  # 🎓 EDUCATIONAL SETTINGS
  # Enable verbose logging and debugging for learning
  VERBOSE_LOGGING: "true"
  DEBUG_MODE: "true"
  LOG_SERVICE_CALLS: "true"
  LOG_TASK_LIFECYCLE: "true"
  LOG_CACHE_OPERATIONS: "true"
  LOG_CIRCUIT_BREAKER_EVENTS: "true"

  # Development helpers
  ENABLE_TEST_ENDPOINTS: "true"
  ENABLE_DEBUG_ENDPOINTS: "true"
  ENABLE_METRICS_DEBUG: "true"
