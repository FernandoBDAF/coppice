# =============================================================================
# PROFILE SERVICE DEPLOYMENT FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# The Profile Service acts as the primary entry point and orchestrator for the
# microservices task processing ecosystem. It provides comprehensive profile
# management capabilities and multi-worker task processing integration with
# Queue, Cache, Storage, and Auth services.
#
# 🏗️ ARCHITECTURE:
# Client Applications → Profile Service → Queue Service → Multi-Worker Processing
#                    ↓                 ↓
#               Cache/Storage      RabbitMQ Exchange
#                    ↓                 ↓
#               Auth Service      Worker Queues (Profile/Email/Image)
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Single replica for development simplicity
# - Reduced resource requests/limits for local development
# - IfNotPresent image pull policy for faster deployments
# - Debug logging enabled for educational purposes
# - Simplified security context for Kind compatibility
#
# ⚠️ PRODUCTION DIFFERENCES:
# - Production would use multiple replicas with HPA (3-10 replicas)
# - Higher resource allocations and stricter limits
# - ReadOnlyRootFilesystem and strict security policies
# - Production logging levels and structured monitoring
# - Pod anti-affinity and node selection constraints
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  labels:
    app: profile-service
    component: orchestrator
    environment: kind-production
    tier: application
spec:
  # 🎯 KIND OPTIMIZATION: Single replica for development
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
        component: orchestrator
        environment: kind-production
      annotations:
        # 📊 PROMETHEUS MONITORING: Enable metrics scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # 🔐 POD-LEVEL SECURITY CONTEXT
      # Run as non-root user for security compliance
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # nobody user
        runAsGroup: 65534 # nobody group
        fsGroup: 65534 # File system group

      containers:
        - name: profile-service
          image: profile-service:latest
          # 🚀 KIND OPTIMIZATION: Skip image pull for local development
          imagePullPolicy: IfNotPresent

          # 🔐 CONTAINER-LEVEL SECURITY CONTEXT
          # Critical: Orchestrator service needs comprehensive security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Profile service needs temp space for task processing
            capabilities:
              drop:
                - ALL # Drop all capabilities

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP

          # 💾 RESOURCE CONFIGURATION: Conservative for Kind development
          resources:
            requests:
              cpu: "100m" # Sufficient for profile orchestration
              memory: "128Mi" # Adequate for service integration
            limits:
              cpu: "200m" # Allow bursts for multi-service calls
              memory: "256Mi" # Prevent OOM during high task volume

          # 🔧 ENVIRONMENT CONFIGURATION
          env:
            # Service Configuration
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8080"
            - name: SERVICE_ENV
              value: "kind-production"
            - name: LOG_LEVEL
              value: "debug" # Educational: Enable detailed logging
            - name: LOG_FORMAT
              value: "json"

            # Service Dependencies - Internal Kubernetes Service Names
            - name: QUEUE_SERVICE_URL
              value: "http://queue-service:8080"
            - name: STORAGE_SERVICE_HOST
              value: "storage-service"
            - name: STORAGE_SERVICE_PORT
              value: "8080"
            - name: AUTH_SERVICE_HOST
              value: "auth-service"
            - name: AUTH_SERVICE_PORT
              value: "8080"
            - name: CACHE_SERVICE_HOST
              value: "cache-service"
            - name: CACHE_SERVICE_PORT
              value: "8080"

            # Service Integration Timeouts (Kind-optimized)
            - name: QUEUE_SERVICE_TIMEOUT
              value: "10s" # Shorter for development feedback
            - name: STORAGE_SERVICE_TIMEOUT
              value: "10s"
            - name: AUTH_SERVICE_TIMEOUT
              value: "5s"
            - name: CACHE_SERVICE_TIMEOUT
              value: "5s"
            - name: QUEUE_SERVICE_RETRIES
              value: "3"
            - name: CACHE_SERVICE_RETRIES
              value: "3"

            # Multi-Worker Task Configuration
            - name: PROFILE_TASK_TIMEOUT
              value: "2m" # Reduced for Kind development
            - name: EMAIL_TASK_TIMEOUT
              value: "1m" # Reduced for development
            - name: IMAGE_TASK_TIMEOUT
              value: "3m" # Reduced for development

            # Circuit Breaker Configuration (Development settings)
            - name: CIRCUIT_BREAKER_ENABLED
              value: "true"
            - name: CIRCUIT_BREAKER_THRESHOLD
              value: "5"
            - name: CIRCUIT_BREAKER_TIMEOUT
              value: "30s"

            # Performance Configuration (Kind-optimized)
            - name: HTTP_MAX_IDLE_CONNS
              value: "20" # Reduced for development
            - name: HTTP_MAX_IDLE_CONNS_PER_HOST
              value: "10" # Reduced for development
            - name: HTTP_IDLE_CONN_TIMEOUT
              value: "30s" # Shorter for development

            # Caching Configuration
            - name: CACHE_ENABLED
              value: "true"
            - name: CACHE_PROFILE_TTL
              value: "30m" # Shorter TTL for development
            - name: CACHE_SESSION_TTL
              value: "2h" # Shorter TTL for development
            - name: CACHE_TASK_TTL
              value: "15m" # Shorter TTL for development

            # Monitoring Configuration
            - name: METRICS_ENABLED
              value: "true"
            - name: PROMETHEUS_METRICS_ENABLED
              value: "true"
            - name: PROMETHEUS_METRICS_PORT
              value: "8080"
            - name: PROMETHEUS_METRICS_PATH
              value: "/metrics"

            # Rate Limiting (Relaxed for development)
            - name: RATE_LIMIT_ENABLED
              value: "true"
            - name: RATE_LIMIT_PROFILE_OPS
              value: "1000" # Higher limit for development testing
            - name: RATE_LIMIT_TASK_SUBMISSIONS
              value: "500" # Higher limit for development testing

          # Load configuration from ConfigMap and Secrets
          envFrom:
            - configMapRef:
                name: profile-service-config
            - secretRef:
                name: profile-service-secrets

          # 🔐 EXPLICIT SECRET REFERENCES for Service Integration
          env:
            # Service-to-Service Authentication
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: API_KEY
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: SERVICE_TOKEN
            
            # External Service API Keys
            - name: AUTH_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: AUTH_SERVICE_API_KEY
            - name: CACHE_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: CACHE_SERVICE_API_KEY
            - name: STORAGE_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: STORAGE_SERVICE_API_KEY
            - name: QUEUE_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: QUEUE_SERVICE_API_KEY
            
            # JWT and Encryption Secrets
            - name: PROFILE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: PROFILE_JWT_SECRET
            - name: PROFILE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: profile-service-secrets
                  key: PROFILE_ENCRYPTION_KEY

          # 🏥 HEALTH CHECKS: Ensure service reliability
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30 # Allow time for service dependencies
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # 🚀 STARTUP PROBE: Handle slow service integration startup
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12 # Allow up to 120 seconds for startup

  # 🔄 DEPLOYMENT STRATEGY: Ensure zero-downtime updates
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
