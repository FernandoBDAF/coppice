# =============================================================================
# PROFILE SERVICE SECRETS FOR KIND CLUSTER
# =============================================================================
#
# 📚 EDUCATIONAL OVERVIEW:
# This file contains development-specific secrets for the Profile Service,
# including JWT signing keys, service authentication tokens, and database
# credentials. All values are base64 encoded for Kubernetes Secret requirements.
#
# 🔧 KIND-SPECIFIC OPTIMIZATIONS:
# - Development-grade security (not for production)
# - Simplified authentication for local development
# - Debug-friendly secret values for educational purposes
#
# 🔐 SECRET GENERATION COMMANDS:
# echo -n "your-secret-value" | base64
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: profile-service-secrets
  labels:
    app: profile-service
    component: orchestrator
    environment: kind-production
type: Opaque
data:
  # Service-to-Service Authentication (base64 encoded)
  # Original: profile-api-key
  API_KEY: cHJvZmlsZS1hcGkta2V5
  # Original: profile-service-token
  SERVICE_TOKEN: cHJvZmlsZS1zZXJ2aWNlLXRva2Vu

  # External Service Credentials (base64 encoded)
  # Original: auth-api-key
  AUTH_SERVICE_API_KEY: YXV0aC1hcGkta2V5
  # Original: cache-api-key
  CACHE_SERVICE_API_KEY: Y2FjaGUtYXBpLWtleQ==
  # Original: storage-api-key
  STORAGE_SERVICE_API_KEY: c3RvcmFnZS1hcGkta2V5
  # Original: queue-api-key
  QUEUE_SERVICE_API_KEY: cXVldWUtYXBpLWtleQ==

  # Additional service integration secrets
  # Original: profile-jwt-secret
  PROFILE_JWT_SECRET: cHJvZmlsZS1qd3Qtc2VjcmV0
  # Original: profile-encryption-key
  PROFILE_ENCRYPTION_KEY: cHJvZmlsZS1lbmNyeXB0aW9uLWtleQ==

  # Metrics and monitoring secrets
  # Original: profile-metrics-token
  METRICS_AUTH_TOKEN: cHJvZmlsZS1tZXRyaWNzLXRva2Vu

---
# 📝 ADDITIONAL CONFIGMAP FOR NON-SENSITIVE DEVELOPMENT SETTINGS
apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-service-dev-config
  labels:
    app: profile-service
    component: development
    environment: kind-production
data:
  # 🎓 DEVELOPMENT ENVIRONMENT SETTINGS
  DEVELOPMENT_MODE: "true"
  DEBUG_ENDPOINTS_ENABLED: "true"
  TEST_DATA_ENABLED: "true"
  MOCK_SERVICES_ENABLED: "false" # Use real services for integration

  # 📧 EMAIL CONFIGURATION (Development)
  SMTP_HOST: "mailhog" # Local mail testing service
  SMTP_PORT: "1025"
  SMTP_TLS_ENABLED: "false"

  # 🔍 SERVICE DISCOVERY SETTINGS
  SERVICE_DISCOVERY_ENABLED: "true"

  # 📊 MONITORING DEVELOPMENT SETTINGS
  TRACING_ENABLED: "true"
  METRICS_EXPORT_INTERVAL: "30s"

  # 🎯 FEATURE FLAGS FOR DEVELOPMENT
  FEATURE_MULTI_WORKER_ROUTING: "true"
  FEATURE_CACHE_INTEGRATION: "true"
  FEATURE_CIRCUIT_BREAKERS: "true"
  FEATURE_RATE_LIMITING: "true"
  FEATURE_METRICS_COLLECTION: "true"
