# Cache Service Configuration for Kind Clusters
# Debug configuration optimized for development and testing
# Based on production config but with Kind-specific optimizations
apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-service-config
  namespace: default
  labels:
    app: cache-service
    component: config
    environment: kind-production
data:
  # Server Configuration - Kind optimized
  CACHE_SERVER_HTTP_PORT: "8080"
  CACHE_SERVER_GRPC_PORT: "9090"
  CACHE_SERVER_READ_TIMEOUT: "30s"
  CACHE_SERVER_WRITE_TIMEOUT: "30s"
  CACHE_SERVER_SHUTDOWN_TIMEOUT: "10s"

  # Redis Configuration - Pointing to Redis StatefulSet
  CACHE_REDIS_HOST: "redis-service"
  CACHE_REDIS_PORT: "6379"
  CACHE_REDIS_DB: "0"
  CACHE_REDIS_MAX_RETRIES: "3"
  CACHE_REDIS_DIAL_TIMEOUT: "5s"
  CACHE_REDIS_READ_TIMEOUT: "3s"
  CACHE_REDIS_WRITE_TIMEOUT: "3s"
  # Kind optimization: Reduced pool sizes for development
  CACHE_REDIS_POOL_SIZE: "20"
  CACHE_REDIS_MIN_IDLE_CONNS: "5"
  CACHE_REDIS_MAX_IDLE_CONNS: "10"
  CACHE_REDIS_CONN_MAX_LIFETIME: "300s"
  CACHE_REDIS_ENABLED: "true"

  # Logging Configuration - Debug mode for Kind
  CACHE_LOGGING_LEVEL: "debug"
  CACHE_LOGGING_FORMAT: "json"
  CACHE_LOGGING_DEVELOPMENT: "true" # Kind-specific: Enable development logging

  # Metrics Configuration - Enabled for monitoring
  CACHE_METRICS_ENABLED: "true"
  CACHE_METRICS_PATH: "/metrics"
  CACHE_METRICS_PORT: "8081"

  # Circuit Breaker Configuration - Relaxed for development
  CACHE_CIRCUIT_BREAKER_MAX_REQUESTS: "50"
  CACHE_CIRCUIT_BREAKER_INTERVAL: "10s"
  CACHE_CIRCUIT_BREAKER_TIMEOUT: "30s"
  CACHE_CIRCUIT_BREAKER_READY_TO_TRIP: "3"

  # Cache Configuration - Kind-optimized TTLs
  CACHE_CACHE_DEFAULT_TTL: "30m" # Shorter for development
  CACHE_CACHE_PROFILE_TTL: "15m" # Shorter for development
  CACHE_CACHE_TASK_TTL: "10m" # Shorter for development
  CACHE_CACHE_SESSION_TTL: "15m" # Shorter for development
  CACHE_CACHE_QUEUE_METRICS_TTL: "1m"
  CACHE_CACHE_WORKER_STATUS_TTL: "5m"
  CACHE_CACHE_MAX_KEY_SIZE: "512"
  CACHE_CACHE_MAX_VALUE_SIZE: "1048576"
  CACHE_CACHE_BATCH_SIZE: "50" # Smaller batches for Kind
  CACHE_CACHE_JSON_COMPRESSION: "false"

  # Health Check Configuration
  CACHE_HEALTH_CHECK_INTERVAL: "10s"
  CACHE_HEALTH_CHECK_TIMEOUT: "5s"
  CACHE_HEALTH_CHECK_ENABLED: "true"

  # Performance Configuration - Kind optimizations
  CACHE_PERFORMANCE_MAX_CONCURRENT_REQUESTS: "100"
  CACHE_PERFORMANCE_REQUEST_TIMEOUT: "30s"
  CACHE_PERFORMANCE_IDLE_TIMEOUT: "60s"

  # Security Configuration - Development settings
  CACHE_SECURITY_CORS_ENABLED: "true"
  CACHE_SECURITY_CORS_ORIGINS: "*" # Permissive for development
  CACHE_SECURITY_RATE_LIMIT_ENABLED: "false" # Disabled for testing

  # Kind-specific Environment Variables
  ENV: "kind-production"
  DEPLOYMENT_TYPE: "kind"
  DEBUG_MODE: "true"

  # Service Discovery
  SERVICE_NAME: "cache-service"
  SERVICE_VERSION: "v1.0.0"
  SERVICE_ENVIRONMENT: "kind-production"

  # Monitoring and Observability
  TRACING_ENABLED: "false" # Simplified for Kind
  PROFILING_ENABLED: "true"
  PROFILING_PORT: "6060"
