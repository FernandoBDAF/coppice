# Cache Service NodePort Service for Kind Clusters
# External access via NodePort 30081 for HTTP traffic
# Includes gRPC and metrics endpoints
apiVersion: v1
kind: Service
metadata:
  name: cache-service
  namespace: default
  labels:
    app: cache-service
    component: service
    environment: kind-production
  annotations:
    # Service discovery and monitoring annotations
    service.kubernetes.io/service-proxy-name: "cache-service"
    prometheus.io/scrape: "false" # Main service doesn't expose metrics directly
spec:
  # Kind optimization: NodePort for external access
  type: NodePort
  ports:
    # Primary HTTP API port - mapped to NodePort 30081
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
      nodePort: 30081
    # gRPC API port for internal service communication
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
      nodePort: 30091 # Additional NodePort for gRPC
  selector:
    app: cache-service
  # Session affinity for Kind development consistency
  sessionAffinity: None
---
# Separate service for metrics endpoint
# Used by monitoring systems like Prometheus
apiVersion: v1
kind: Service
metadata:
  name: cache-service-metrics
  namespace: default
  labels:
    app: cache-service
    component: metrics
    environment: kind-production
  annotations:
    # Prometheus monitoring configuration
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
    # Service discovery for metrics collection
    service.kubernetes.io/service-proxy-name: "cache-service-metrics"
spec:
  # ClusterIP for internal metrics collection
  type: ClusterIP
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: cache-service
---
# Headless service for service discovery
# Enables direct pod-to-pod communication when needed
apiVersion: v1
kind: Service
metadata:
  name: cache-service-headless
  namespace: default
  labels:
    app: cache-service
    component: headless
    environment: kind-production
  annotations:
    service.kubernetes.io/service-proxy-name: "cache-service-headless"
spec:
  # Headless service for direct pod access
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: cache-service
