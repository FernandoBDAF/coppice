# Cache Service Development Secrets for Kind Clusters
# Contains development credentials - NOT for production use
# Base64 encoded values for Redis and JWT authentication
apiVersion: v1
kind: Secret
metadata:
  name: cache-service-secret
  namespace: default
  labels:
    app: cache-service
    component: secret
    environment: kind-production
type: Opaque
data:
  # Redis password for development
  # Value: "redis-dev-password" -> cmVkaXMtZGV2LXBhc3N3b3Jk
  CACHE_REDIS_PASSWORD: cmVkaXMtZGV2LXBhc3N3b3Jk

  # JWT signing key for token validation in development
  # Value: "jwt-dev-secret-key-for-kind-cluster" -> and0LWRldi1zZWNyZXQta2V5LWZvci1raW5kLWNsdXN0ZXI=
  JWT_SECRET_KEY: and0LWRldi1zZWNyZXQta2V5LWZvci1raW5kLWNsdXN0ZXI=

  # Development API key for external service integration
  # Value: "dev-api-key-12345" -> ZGV2LWFwaS1rZXktMTIzNDU=
  EXTERNAL_API_KEY: ZGV2LWFwaS1rZXktMTIzNDU=

  # Database connection string for metrics (if needed)
  # Value: "" (empty for Kind)
  METRICS_DB_CONNECTION: ""

  # TLS certificates (empty for development)
  TLS_CERT: ""
  TLS_KEY: ""

  # Additional secrets for development
  # Value: "cache-service-secret" -> Y2FjaGUtc2VydmljZS1zZWNyZXQ=
  SERVICE_SECRET: Y2FjaGUtc2VydmljZS1zZWNyZXQ=

  # Session encryption key
  # Value: "session-encrypt-key-dev" -> c2Vzc2lvbi1lbmNyeXB0LWtleS1kZXY=
  SESSION_ENCRYPT_KEY: c2Vzc2lvbi1lbmNyeXB0LWtleS1kZXY=

---
# Additional ConfigMap for non-sensitive development configuration
# This complements the main ConfigMap with Kind cluster specific settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-service-dev-config
  namespace: default
  labels:
    app: cache-service
    component: dev-config
    environment: kind-production
data:
  # Development specific configuration
  CACHE_DEV_MODE: "true"
  CACHE_DEBUG_REDIS: "true"
  CACHE_VERBOSE_LOGGING: "true"

  # Testing configuration
  CACHE_TEST_MODE: "false"
  CACHE_LOAD_TEST_DATA: "false"

  # Performance monitoring for development
  CACHE_PROFILE_MEMORY: "true"
  CACHE_PROFILE_CPU: "true"

  # Development endpoints
  CACHE_DEBUG_ENDPOINTS: "true"
  CACHE_ADMIN_ENDPOINTS: "true"

---
# Instructions for secret management in Kind development
#
# To generate new development secrets:
# 1. Redis Password:
#    echo -n "your-redis-password" | base64
#
# 2. JWT Secret:
#    echo -n "your-jwt-secret-key" | base64
#
# 3. Apply secrets:
#    kubectl apply -f secrets.yaml
#
# 4. Verify secrets:
#    kubectl get secret cache-service-secret -o yaml
#
# 5. Decode secret (for debugging):
#    kubectl get secret cache-service-secret -o jsonpath='{.data.CACHE_REDIS_PASSWORD}' | base64 -d
#
# Note: These are development secrets only!
# Production deployments should use proper secret management solutions.
