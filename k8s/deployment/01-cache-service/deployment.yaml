# Cache Service Deployment for Kind Clusters
# Kind-optimized: Single replica, reduced resources, debug configuration
# Dependencies: Redis StatefulSet
# NodePort: 30081
# Last Updated: December 29, 2024
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-service
  namespace: default
  labels:
    app: cache-service
    version: v1.0.0
    component: cache
    environment: kind-production
spec:
  # Kind optimization: Single replica for simplicity
  replicas: 1
  selector:
    matchLabels:
      app: cache-service
  template:
    metadata:
      labels:
        app: cache-service
        version: v1.0.0
        component: cache
        environment: kind-production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      # 🔐 POD-LEVEL SECURITY CONTEXT
      # Run as non-root user for security compliance
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # nobody user
        runAsGroup: 65534 # nobody group
        fsGroup: 65534 # File system group

      containers:
        - name: cache-service
          # Use local image for Kind development
          image: cache-service:latest
          # Kind optimization: IfNotPresent for local development
          imagePullPolicy: IfNotPresent

          # 🔐 CONTAINER-LEVEL SECURITY CONTEXT
          # Container-level security restrictions
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Cache service needs writable temp space
            capabilities:
              drop:
                - ALL # Drop all capabilities

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP

          # Kind optimization: Reduced resource requirements for development
          # Production environments should scale these values appropriately
          resources:
            requests:
              # Memory: 128Mi sufficient for Redis connection pooling and basic caching
              memory: "128Mi"
              # CPU: 100m adequate for HTTP API processing and Redis operations
              cpu: "100m"
            limits:
              # Memory: 256Mi provides 2x headroom for cache growth and GC
              memory: "256Mi"
              # CPU: 200m allows burst capacity for concurrent requests
              cpu: "200m"

          env:
            # Kind-specific environment configuration
            - name: ENV
              value: "kind-production"
            - name: LOG_LEVEL
              value: "debug"
            # Server Configuration
            - name: CACHE_SERVER_HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_SERVER_HTTP_PORT
            - name: CACHE_SERVER_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_SERVER_GRPC_PORT
            # Redis Configuration
            - name: CACHE_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_REDIS_HOST
            - name: CACHE_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_REDIS_PORT
            - name: CACHE_REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_REDIS_DB
            # Metrics Configuration
            - name: CACHE_METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cache-service-config
                  key: CACHE_METRICS_PORT
          # Secret Environment Variables
          envFrom:
            - configMapRef:
                name: cache-service-config
            - secretRef:
                name: cache-service-secret

          # Health checks optimized for Kind environment
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

      # Kind optimization: Restart policy for development
      restartPolicy: Always
      # Tolerate node issues for Kind stability
      tolerations:
        - operator: Exists
          effect: NoSchedule
      # Prefer worker nodes for application workloads
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values: ["application"]
