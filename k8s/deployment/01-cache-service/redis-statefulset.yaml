# Redis StatefulSet for Cache Service Backend
# Kind-optimized: Single replica, persistent storage, reduced resources
# Provides reliable caching backend for the cache service
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: default
  labels:
    app: redis
    component: cache-backend
    version: "7.0"
    environment: kind-production
spec:
  serviceName: redis-headless
  # Kind optimization: Single replica for simplicity
  replicas: 1
  selector:
    matchLabels:
      app: redis
      component: cache-backend
  template:
    metadata:
      labels:
        app: redis
        component: cache-backend
        version: "7.0"
        environment: kind-production
      annotations:
        prometheus.io/scrape: "false" # Redis metrics handled separately if needed
    spec:
      containers:
        - name: redis
          # Use Redis 7.0 Alpine for smaller size
          image: redis:7.0-alpine
          imagePullPolicy: IfNotPresent
          # FIX: Use shell command to substitute environment variables in config
          # before starting Redis (fixes WRONGPASS authentication error)
          command:
            - /bin/sh
          args:
            - -c
            - |
              # Substitute REDIS_PASSWORD environment variable in the config file
              # Use sed instead of envsubst (which may not be available in Alpine)
              sed "s/\${REDIS_PASSWORD}/${REDIS_PASSWORD}/g" /usr/local/etc/redis/redis.conf > /tmp/redis.conf
              # Verify the substitution worked
              echo "Redis config with substituted password:"
              grep "requirepass" /tmp/redis.conf
              # Start Redis with the processed config
              exec redis-server /tmp/redis.conf
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cache-service-secret
                  key: CACHE_REDIS_PASSWORD
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DATA_DIR
              value: "/data"
          # Kind optimization: Reduced resource requirements
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /usr/local/etc/redis
              readOnly: true
            - name: tmp
              mountPath: /tmp
          # Health checks for Redis
          livenessProbe:
            exec:
              command:
                - redis-cli
                - --no-auth-warning
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - --no-auth-warning
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - redis-cli
                - --no-auth-warning
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            defaultMode: 0644
        - name: tmp
          emptyDir: {}
      # Prefer infrastructure nodes for database workloads
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values: ["infrastructure"]
  # Persistent volume claim template for Redis data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app: redis
          component: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        # Use local-storage class configured in infrastructure
        storageClassName: local-storage
        resources:
          requests:
            # Kind optimization: Smaller storage for development
            storage: 1Gi
---
# Redis Service for internal communication
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
  labels:
    app: redis
    component: service
    environment: kind-production
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: redis
    component: cache-backend
---
# Redis Headless Service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: default
  labels:
    app: redis
    component: headless
    environment: kind-production
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: redis
    component: cache-backend
---
# Redis Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: default
  labels:
    app: redis
    component: config
    environment: kind-production
data:
  redis.conf: |
    # Redis configuration for Kind development environment

    # Network configuration
    bind 0.0.0.0
    port 6379
    protected-mode yes

    # Authentication
    requirepass ${REDIS_PASSWORD}

    # Persistence configuration - optimized for Kind
    save 60 1000
    save 300 100
    save 900 1

    # Database configuration
    databases 16

    # Memory configuration - Kind optimized
    maxmemory 200mb
    maxmemory-policy allkeys-lru

    # Logging configuration
    loglevel notice
    logfile ""

    # Performance configuration for development
    tcp-keepalive 300
    timeout 0
    tcp-backlog 511

    # Disable potentially dangerous commands in development
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
    rename-command SHUTDOWN SHUTDOWN_RENAME

    # Enable AOF for better persistence
    appendonly yes
    appendfsync everysec

    # Disable cluster mode for single instance
    cluster-enabled no
