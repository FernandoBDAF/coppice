# Per-queue metric series (rabbitmq_queue_messages{queue="..."}) instead of
# aggregated totals — the Grafana queue-depth panels depend on this.
prometheus.return_per_object_metrics = true

# Load the broker-owned topology at boot (ADR-008.4). Single source of truth is
# scripts/rabbitmq/generate-definitions.py → deploy/rabbitmq/definitions.json,
# mounted at the same path in compose (bind volume) and kind (configMap subPath).
# load_definitions skips default-user creation, so definitions.json declares the
# guest user itself (see the generator's --password note for kind rotation).
definitions.import_backend = local_filesystem
definitions.local.path = /etc/rabbitmq/definitions.json
