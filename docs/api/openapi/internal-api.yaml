openapi: 3.0.3
info:
  title: Profile Service Internal API
  description: |
    Internal API for service-to-service communication within the Profile Service Microservices architecture.
    This API provides endpoints for internal services to interact with the Profile Service.
  version: 1.0.0
  contact:
    name: API Support
    email: support@profileservice.com

servers:
  - url: http://profile-service:8080/v1
    description: Internal service URL
  - url: http://profile-service-staging:8080/v1
    description: Staging service URL

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for service-to-service authentication

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message

    Profile:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the profile
        name:
          type: string
          description: User's name
        email:
          type: string
          format: email
          description: User's email address
        bio:
          type: string
          description: User's biography
        image_urls:
          type: array
          items:
            type: string
          description: URLs of user's profile images
        created_at:
          type: string
          format: date-time
          description: Profile creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Profile last update timestamp
        get_from:
          type: string
          description: Source of the profile data

    CreateProfileRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          description: User's name
        email:
          type: string
          format: email
          description: User's email address
        bio:
          type: string
          description: User's biography

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          description: User's name
        email:
          type: string
          format: email
          description: User's email address
        bio:
          type: string
          description: User's biography

    ProfileResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/Profile"
        source:
          type: string
          description: Source of the profile data

    DelayedTask:
      type: object
      required:
        - id
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Task identifier
        created_at:
          type: string
          format: date-time
          description: Task creation timestamp

    Event:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          description: Event type
        payload:
          type: object
          description: Event payload
        timestamp:
          type: string
          format: date-time
          description: Event timestamp

paths:
  /internal/profiles:
    get:
      summary: List profiles
      description: Retrieve a list of all profiles (internal)
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create profile
      description: Create a new user profile (internal)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileRequest"
      responses:
        "201":
          description: Profile created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/profiles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Profile ID

    get:
      summary: Get profile
      description: Retrieve a specific profile by ID (internal)
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update profile
      description: Update an existing profile (internal)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete profile
      description: Delete a profile (internal)
      security:
        - ApiKeyAuth: []
      responses:
        "204":
          description: Profile deleted successfully
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/events:
    post:
      summary: Publish event
      description: Publish an event to the event bus
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Event"
      responses:
        "202":
          description: Event accepted for processing
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/tasks:
    post:
      summary: Process delayed task
      description: Process a delayed task for profile operations
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DelayedTask"
      responses:
        "202":
          description: Task accepted for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskID:
                    type: string
                    format: uuid
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /internal/health:
    get:
      summary: Health check
      description: Check the health status of the service
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded]
                  version:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
