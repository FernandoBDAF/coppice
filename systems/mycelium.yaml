# mycelium (formerly KnowledgeManager) guest registration. Port block 42xx
# (HOST_CONTRACT.md). Lab-side onboarding HAS LANDED (guests/mycelium/ + the
# `mycelium` broker vhost, phase v7 lab-side pass) and was re-verified against
# the present mycelium repo (/home/fbarroso/forest/mycelium@06d2651, recon
# 2026-07-20): consolidated FastAPI (stages :8080 + graph :8081), single Next.js
# StagesUI (GraphDash retired), Mongo+Neo4j+Redis, arq/Redis run-queue. The
# targets/links below are live config. STILL NOT LAUNCHABLE END-TO-END: images
