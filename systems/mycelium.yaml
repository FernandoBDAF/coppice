# mycelium (formerly KnowledgeManager) guest registration. Port block 42xx
# (HOST_CONTRACT.md). Lab-side onboarding HAS LANDED (guests/mycelium/ + the
# `mycelium` broker vhost, phase v7 lab-side pass) — the targets/links below
# are live config. STILL NOT LAUNCHABLE END-TO-END: the container images are
# built guest-side (KM-1 fake mode + KM-2 containerize, PRs pending), so
# `guest-up`/`apply -k` will not pull until those land. controld should
# surface it as "planned" until the images exist. See
# documentation/phases/v7-DEFERRED.md.
name: mycelium
description: GraphRAG ingestion pipeline (YouTube → knowledge graphs) — guest
port_block: 42xx
targets:
  compose:
    up: make guest-up G=mycelium
    down: make guest-down G=mycelium
    status: make guest-status G=mycelium
  kind:
    up: kubectl apply -k guests/mycelium/k8s/base
    down: kubectl delete -k guests/mycelium/k8s/base
    status: kubectl -n mycelium get pods
links:
  compose:
    stages-ui: http://localhost:4210
  kind:
    stages-ui: https://mycelium.lab.local
experiments: guests/mycelium/
