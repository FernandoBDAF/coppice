# loam guest registration. Port block 43xx (HOST_CONTRACT.md). The knowledge
# UI is the long-running service; agent runs execute as k8s Jobs in namespace
# `loam` (ADR-007.5) and are NOT a systems-registry target — they arrive via
# the loam-side runner adapter (v7-HANDOFF.md §5 spec).
# Lab-side onboarding HAS LANDED (guests/loam/ — ns, UI+control deploy,
# quotas, netpols, placeholder Secret, phase v7 lab-side pass) and was
# re-verified against the present loam repo (/home/fbarroso/forest/loam@29044d8,
# recon 2026-07-20): UI :4400 + control API :4500 (both loopback-default,
# host-driven agent runs via @ai-hero/sandcastle docker at 9 call sites).
# targets/links below are live config. STILL NOT LAUNCHABLE END-TO-END: the loam
# image + the k8s-Jobs adapter are built guest-side (L-1 callsite indirection,
# L-2 Jobs adapter incl. a HOST-bind/non-loopback-serve fix, PRs pending), so
# `guest-up`/`apply -k` will not pull until those land. See
# documentation/phases/v7-DEFERRED.md.
name: loam
description: loam knowledge UI (service) + agent runs as k8s Jobs — guest
port_block: 43xx
targets:
  compose:
    up: make guest-up G=loam
    down: make guest-down G=loam
    status: make guest-status G=loam
  kind:
    up: kubectl apply -k guests/loam/k8s/base
    down: kubectl delete -k guests/loam/k8s/base
    status: kubectl -n loam get pods,jobs
links:
  compose:
    knowledge-ui: http://localhost:4310
  kind:
    knowledge-ui: https://loam.lab.local
experiments: guests/loam/
