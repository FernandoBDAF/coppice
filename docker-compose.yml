name: microservices

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/compose/init-postgres.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
      - ./scripts/compose/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./scripts/compose/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/20-lab.conf:ro
      # broker-owned topology loaded at boot (ADR-008.4); rabbitmq.conf points
      # definitions.local.path here. Single-sourced into kind via configMapGenerator.
      - ./deploy/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      # check_port_connectivity (not ping): the node answers ping before the
      # AMQP listener accepts, so dependents crash-loop at boot (EXP-01 run)
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      # host 27018: local dev machines commonly run their own mongod on 27017
      - "27018:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping: 1}).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  # One-shot: create the documents bucket (api-service also ensures it at startup)
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin
      && (mc mb --ignore-existing local/documents-raw || true)"
    restart: "no"

  # ── One-shot database migrations ──────────────────────────────────────────
  api-migrate:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./api-service/migrations:/migrations:ro
    entrypoint: >
      sh -c 'for f in $$(ls /migrations/*.up.sql | sort); do
      echo "applying $$f";
      psql -h postgres -U postgres -d api_db -v ON_ERROR_STOP=1 -f "$$f" || exit 1;
      done'
    restart: "no"

  auth-migrate:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: auth_password
    volumes:
      - ./auth-service/migrations:/migrations:ro
    entrypoint: >
      sh -c 'for f in $$(ls /migrations/*.sql | sort); do
      echo "applying $$f";
      psql -h postgres -U auth_user -d auth_db -v ON_ERROR_STOP=1 -f "$$f" || exit 1;
      done'
    restart: "no"

  # ── Application services ──────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: auth_db
      DATABASE_USER: auth_user
      DATABASE_PASSWORD: auth_password
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-32chars!!}
      # RS256 keypair (base64(PEM), single line) seeded into .env by
      # scripts/compose/gen-jwt-keys.sh — `make up` runs it first. Empty → auth
      # falls back to HS256 with JWT_SECRET (designed). ADR-009.1.
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      # dev admin bootstrap (ADR-009.7); cluster values come from init-secrets
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@lab.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin-dev-password}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # api-service introspects the token once per authenticated request, so
      # validate-endpoint throttling becomes a full API outage via the breaker
      # (see documentation/review/CONCEPTUAL_REVIEW.md §2). Lab-sized limits;
      # .env-overridable so EXPERIMENTS.md EXP-08 can reproduce the incident.
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100000}
      TOKEN_VALIDATION_RATE_LIMIT_MAX: ${TOKEN_VALIDATION_RATE_LIMIT_MAX:-100000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: auth-service
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api-service:
    build: ./api-service
    environment:
      API_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/api_db?sslmode=disable
      API_REDIS_HOST: redis
      API_REDIS_PORT: "6379"
      API_RABBITMQ_HOSTS: rabbitmq:5672
      API_RABBITMQ_PASSWORD: guest
      API_AUTH_URL: http://auth-service:3000
      # JWKS local verify by default (ADR-009.1); true → HTTP introspection via
      # the breaker (EXP-43 cascade comparison)
      API_AUTH_STRICT_INTROSPECTION: ${API_AUTH_STRICT_INTROSPECTION:-false}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: documents-raw
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: api-service
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
    restart: unless-stopped

  graphrag-service:
    build: ./graph-worker/graphrag-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # idempotency guard (ADR-008.2), same key shape as the Go workers
      REDIS_ADDR: redis:6379
      MONGODB_URI: mongodb://admin:password@mongodb:27017
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      HEALTH_PORT: "8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: graphrag-service
    ports:
      - "8082:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  email-worker:
    build:
      context: ./graph-worker/operational-workers
      dockerfile: Dockerfile.email
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # idempotency guard (ADR-008.2); empty → in-memory guard + warn
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: email-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  image-worker:
    build:
      context: ./graph-worker/operational-workers
      dockerfile: Dockerfile.image
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # idempotency guard (ADR-008.2); empty → in-memory guard + warn
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: image-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  profile-worker:
    build:
      context: ./graph-worker/operational-workers
      dockerfile: Dockerfile.profile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # idempotency guard (ADR-008.2); empty → in-memory guard + warn
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: profile-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability ─────────────────────────────────────────────────────────
  tempo:
    # Same Tempo version the kind lab runs (chart grafana/tempo 1.24.4 → 2.9.0)
    image: grafana/tempo:2.9.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      # no /var/tempo volume: traces are disposable
      - ./scripts/compose/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200" # HTTP API (Grafana datasource http://tempo:3200)
      - "4317:4317" # OTLP grpc
      - "4318:4318" # OTLP http
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=3d
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      # host 3001: auth-service owns 3000
      - "3001:3000"
    volumes:
      - ./scripts/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./scripts/compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
  miniodata:
  rabbitmqdata:
  promdata:
  grafanadata:
